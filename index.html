// 기본 훈수 (호버 없을 때) — 수치 없이 감만
function chunhyangHint() {
  if (!state.drunk || (state.screen !== 'play' && state.screen !== 'gostop')) return null;
  const env = scoreEnv();
  const best = evaluateHand(state.hand, env);
  if (!best) return { mood: '😐', text: '어머, 패가 없네요…' };
  const pace = Math.max(1, state.target - state.roundScore) / Math.max(1, state.playsLeft);
  const tier = HANDS.findIndex((h) => h.id === best.handId);
  if (tier >= 0 && tier <= 6)
    return { mood: '😍', text: `${HAND_BY_ID[best.handId].name}이 손에 있어요! 지금이 찬스예요!` };
  if (best.score >= pace * 1.5)
    return { mood: '😊', text: '이 손패면 넉넉해요~ 자신 있게 나가봐요.' };
  if (best.score >= pace * 0.9)
    return { mood: '🙂', text: '나쁘지 않아요. 한 수 한 수 차근차근!' };
  if (state.discardsLeft > 0 && state.deck.length > 0) {
    const keep = new Set(best.cards.map((c) => c.uid));
    const junk = state.hand
      .filter((c) => !keep.has(c.uid) && !c.faceDown)
      .sort((a, b) => cardChip(a, env) - cardChip(b, env))
      .slice(0, 3);
    if (junk.length) {
      const incoming = state.deck.slice(-junk.length);
      const trial = [...state.hand.filter((c) => !junk.includes(c)), ...incoming];
      const tb = evaluateHand(trial, env);
      if (tb && tb.score > best.score * 1.1)
        return { mood: '🤔', text: '음… 버리면 좋은 패가 올 것 같은 촉이 와요!' };
    }
  }
  return { mood: '😰', text: '패가 안 좋아요… 조심해서 내야겠어요.' };
}

// 선택 패로 내기/버리기 호버 시 — 덱 위를 엿봐 표정 변화 (수치 비공개)
function chunhyangHoverPredict(action) {
  if (!state.drunk || state.screen !== 'play' || state.juicing) return null;
  const sel = selectedCards();
  if (sel.length < 1) return null;
  const env = scoreEnv();
  const n = sel.length;
  const selSet = new Set(sel.map((c) => c.uid));
  const rest = state.hand.filter((c) => !selSet.has(c.uid));
  const incoming = state.deck.slice(-n);
  const pace = Math.max(1, state.target - state.roundScore) / Math.max(1, state.playsLeft);

  if (action === 'play') {
    if (sel.some((c) => c.faceDown)) return { mood: '🫣', text: '뒷면이 있어서… 뚜껑 열어봐야 알겠어요.' };
    const play = computeScore(sel, env);
    const trial = [...rest, ...incoming];
    const after = evaluateHand(trial, env);
    const afterScore = after ? after.score : 0;
    if (play.score >= pace * 1.4)
      return { mood: '🤩', text: '지금 내면 든든해요! 좋아요!' };
    if (play.score >= pace * 0.85)
      return { mood: '😊', text: '괜찮은 수예요. 내도 될 듯!' };
    if (afterScore > play.score * 1.25 && state.discardsLeft > 0)
      return { mood: '🤔', text: '음… 버리기가 더 나을지도?' };
    if (play.score < pace * 0.5)
      return { mood: '😰', text: '지금은 좀 약해요…' };
    return { mood: '🙂', text: '그럭저럭이에요. 선택은 당신 몫~' };
  }

  // discard
  if (state.discardsLeft <= 0 || state.boss === 'bibaram')
    return { mood: '😅', text: '이번엔 버리기를 못 해요…' };
  if (state.deck.length === 0) return { mood: '😐', text: '덱이 비었어요.' };
  const trial = [...rest, ...incoming];
  const before = evaluateHand(state.hand, env);
  const after = evaluateHand(trial, env);
  const b = before ? before.score : 0;
  const a = after ? after.score : 0;
  if (a >= b * 1.35 && a >= pace * 0.9)
    return { mood: '😍', text: '버리세요! 좋은 패가 올 촉이에요!' };
  if (a > b * 1.1)
    return { mood: '😊', text: '버리면 조금 나아질 것 같아요~' };
  if (a < b * 0.85)
    return { mood: '😱', text: '잠깐! 버리면 더 안 좋아질지도…' };
  return { mood: '🤔', text: '비슷해요… 취향껏!' };
}

function setChunhyangHover(action) {
  state.hoverReact = chunhyangHoverPredict(action);
  renderChunhyang();
}
function clearChunhyangHover() {
  if (!state.hoverReact) return;
  state.hoverReact = null;
  renderChunhyang();
}

function isTouchUI() {
  return window.matchMedia('(max-width: 720px), (hover: none)').matches;
}

function setTouchHint(mode) {
  if (mode !== 'play' && mode !== 'discard') return;
  state.touchHintMode = mode;
  renderChunhyang();
}

function bindActionLongPress(btn, action) {
  if (!btn || btn.dataset.lpBound) return;
  btn.dataset.lpBound = '1';
  let timer = null;
  let long = false;
  const clear = () => { if (timer) { clearTimeout(timer); timer = null; } };
  btn.addEventListener('pointerdown', (e) => {
    if (!isTouchUI() || !state.drunk || state.screen !== 'play') return;
    if (e.pointerType === 'mouse') return;
    long = false;
    clear();
    timer = setTimeout(() => {
      long = true;
      setTouchHint(action);
      try { if (navigator.vibrate) navigator.vibrate(12); } catch (_) {}
    }, 380);
  });
  const end = () => { clear(); };
  btn.addEventListener('pointerup', end);
  btn.addEventListener('pointercancel', end);
  btn.addEventListener('pointerleave', end);
  btn.addEventListener('click', (e) => {
    if (!long) return;
    long = false;
    e.preventDefault();
    e.stopImmediatePropagation();
  }, true);
}

/* ================================================================
   렌더링 (상태 → DOM 단방향)
   ================================================================ */
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
const fmt = (n) => n.toLocaleString('ko-KR');
const fmtMult = (m) => (Number.isInteger(m) ? m : m.toFixed(2).replace(/0+$/, '').replace(/\.$/, ''));

const TTI_LABEL = { hongdan: '홍단', cheongdan: '청단', chodan: '초단', bi_tti: '비단' };

function auraCardCls(opts, uid) {
  if (!opts.selectable || !opts.auraUids || !opts.auraUids.has(uid)) return '';
  return opts.auraKind === 'junk' ? ' coach-aura-junk' : ' coach-aura';
}

function cardHTML(card, opts = {}) {
  const M = MONTHS[card.month - 1];
  const discarding = state.discardAnimUids && state.discardAnimUids.includes(card.uid);
  const dd = discarding ? state.discardAnimUids.indexOf(card.uid) : -1;
  if (card.faceDown && !opts.reveal) {
    const selCls = opts.selectable && state.selected.includes(card.uid) && !discarding ? ' sel' : '';
    const dealCls = state.dealInUids && state.dealInUids.includes(card.uid) ? ' deal-in' : '';
    const discCls = discarding ? ' discarding' : '';
    const styleBits = [];
    if (dealCls) styleBits.push(`--di:${state.dealInUids.indexOf(card.uid)}`);
    if (discarding) styleBits.push(`--dd:${dd}`);
    const styleAttr = styleBits.length ? ` style="${styleBits.join(';')}"` : '';
    const auraCls = auraCardCls(opts, card.uid);
    const click = opts.selectable && !discarding ? ` onclick="toggleSelect(${card.uid})"` : '';
    return `<div class="card facedown${selCls}${dealCls}${discCls}${auraCls}${opts.selectable && !discarding ? '' : ' static'}" data-uid="${card.uid}"${styleAttr}${click}><div class="back-q">?</div></div>`;
  }
  const t = effType(card);
  let cls = `card ${t === 'ssangpi' && card.type === 'yeol' ? 'ssangpi' : card.type}`;
  let body = '', tag = '', badge = '';
  if (card.type === 'kwang') {
    if (card.tags.includes('bikwang')) cls += ' rain';
    body = `<div class="art">${M.gwangArt}</div><div class="gwangmark">光</div>`;
    tag = card.tags.includes('bikwang') ? '비광' : '광';
  } else if (card.type === 'yeol') {
    body = `<div class="art">${M.yeolArt}</div>`;
    if (card.tags.includes('dual')) {
      tag = card.asPi ? '국진→쌍피' : '국진·열끗';
      badge = `<div class="gukjin-mode">${card.asPi ? '쌍피' : '열끗'}</div>`;
      if (card.asPi) cls = 'card ssangpi';
    } else {
      tag = card.tags.includes('godori') ? '열끗·새' : '열끗';
    }
  } else if (card.type === 'tti') {
    const color = card.tags.find((x) => TTI_LABEL[x]) || 'bi_tti';
    cls += ' ' + color;
    body = `<div class="ribbon">${color === 'chodan' ? '' : TTI_LABEL[color]}</div>`;
    tag = TTI_LABEL[color];
  } else {
    body = `<div class="art">${M.flower}</div>`;
    tag = card.type === 'ssangpi' ? '쌍피' : '피';
  }
  const chip = cardChip(card, scoreEnv());
  if (card.month === state.round) cls += ' season'; // 이달의 패 강조
  const selCls = opts.selectable && state.selected.includes(card.uid) && !discarding ? ' sel' : '';
  const dealCls = state.dealInUids && state.dealInUids.includes(card.uid) ? ' deal-in' : '';
  const discCls = discarding ? ' discarding' : '';
  const auraCls = auraCardCls(opts, card.uid);
  const styleBits = [];
  if (dealCls) styleBits.push(`--di:${state.dealInUids.indexOf(card.uid)}`);
  if (discarding) styleBits.push(`--dd:${dd}`);
  const styleAttr = styleBits.length ? ` style="${styleBits.join(';')}"` : '';
  const click = opts.selectable && !discarding ? ` onclick="toggleSelect(${card.uid})"` : '';
  return `<div class="${cls}${selCls}${dealCls}${discCls}${auraCls}${opts.selectable && !discarding ? '' : ' static'}" data-uid="${card.uid}"${styleAttr}${click}>
    <div class="chipbadge">+${chip}</div>
    <div class="month">${card.month}月</div>
    <div class="mname">${M.name}</div>
    ${body}${badge}
    <div class="tag">${tag}</div>
  </div>`;
}

function renderChunhyang() {
  const root = $('chunhyang');
  if (!CHUNHYANG_ENABLED) {
    if (root) root.style.display = 'none';
    return;
  }
  if (root) root.style.display = '';
  const hint = chunhyangHint();
  const face = $('ch-face');
  const bubble = $('ch-bubble');
  const tabs = $('ch-hint-tabs');
  const touchUI = isTouchUI();
  const canTouchHint = touchUI && state.drunk && state.screen === 'play' && state.selected.length >= 1;
  const selPredict = canTouchHint
    ? chunhyangHoverPredict(state.touchHintMode || 'play')
    : null;

  if (tabs) {
    if (canTouchHint) {
      tabs.hidden = false;
      tabs.querySelectorAll('button').forEach((b) => {
        b.classList.toggle('on', b.dataset.hint === (state.touchHintMode || 'play'));
      });
    } else {
      tabs.hidden = true;
    }
  }

  if (state.tempReact && Date.now() < state.tempReact.expires) {
    face.textContent = state.tempReact.mood;
    bubble.textContent = state.tempReact.text;
  } else if (state.hoverReact) {
    face.textContent = state.hoverReact.mood;
    bubble.textContent = state.hoverReact.text;
  } else if (selPredict) {
    const tag = state.touchHintMode === 'discard' ? '버리기' : '내기';
    face.textContent = selPredict.mood;
    bubble.textContent = `[${tag}] ${selPredict.text}`;
  } else if (hint) {
    face.textContent = hint.mood;
    bubble.textContent = hint.text;
  } else if (state.drunk) {
    face.textContent = '😊';
    bubble.textContent = touchUI
      ? '패를 고르면 감이 와요. 버튼 길게 누르거나 아래 탭으로 내기/버리기 감을 바꿔요.'
      : '이번 달 훈수 중이에요. 패 고르고 버튼에 올려보세요~';
  } else if (state.screen === 'prep' || state.screen === 'shop') {
    face.textContent = state.chunhyangNext ? '😄' : '😴';
    bubble.textContent = state.chunhyangNext
      ? '다음 달 훈수 예약됐어요! 잘 부탁드려요~'
      : '다음 달 훈수는 3냥이에요. 시작 전에 예약해 주세요.';
  } else {
    face.textContent = '😴';
    bubble.textContent = touchUI ? '' : '이번 달은 훈수 없어요… (상점에서 다음 달 예약)';
  }
  const btn = $('ch-btn');
  if (state.screen === 'prep' || state.screen === 'shop') {
    btn.style.display = '';
    if (state.chunhyangNext) {
      btn.textContent = '✓ 다음 달 훈수 예약됨';
      btn.disabled = true;
    } else {
      btn.textContent = `🍶 다음 달 훈수 예약 (3냥)`;
      btn.disabled = state.money < 3;
    }
  } else if (state.drunk) {
    btn.style.display = '';
    btn.textContent = `🍶 ${state.round}월 훈수 중`;
    btn.disabled = true;
  } else {
    btn.style.display = '';
    btn.textContent = '🍶 훈수 없음';
    btn.disabled = true;
  }
}

function renderTable() {
  const pa = $('playedarea');
  if (state.juicing) {
    // playedarea는 juice/discard 시퀀스가 소유 — 손패·버튼만 갱신
  } else if (state.lastPlay) {
    // 카드 선택마다 innerHTML을 다시 그리면 점수 애니/깜빡임이 반복되므로 시그니처로 스킵
    const r = state.lastPlay.result;
    const sig = `${r.handId}:${r.score}:${state.lastPlay.cards.map((c) => c.uid).join(',')}`;
    if (pa.dataset.playSig !== sig) {
      pa.dataset.playSig = sig;
      pa.classList.remove('juice-stage', 'play-fade-out');
      pa.innerHTML =
        state.lastPlay.cards.map((c) => cardHTML(c, { reveal: true })).join('') +
        `<div id="playresult">
          <div class="r-hand">${HAND_BY_ID[r.handId].name}</div>
          <div class="r-formula"><span class="c">${fmt(r.chips)}칩</span> × <span class="m">${fmtMult(r.mult)}배</span>${r.flat ? ` + ${fmt(r.flat)}` : ''}</div>
          <div class="r-score">+${fmt(r.score)}점</div>
        </div>`;
    }
  } else {
    pa.dataset.playSig = '';
    pa.classList.remove('juice-stage', 'play-fade-out');
    pa.innerHTML = `<div class="hint">카드를 고르고 <b>내기</b>를 누르세요</div>`;
  }

  const isJunkAura = state.coachStep === 'junk';
  const junkUids = isJunkAura ? new Set(getJanJunkSuggest()) : null;
  const aura = isJunkAura ? null : getJanAuraBest();
  const auraUids = junkUids || (aura ? new Set(aura.uids) : null);
  const auraKind = isJunkAura ? 'junk' : 'play';
  $('handarea').innerHTML = state.hand.map((c) => cardHTML(c, { selectable: true, auraUids, auraKind })).join('');

  // 1월 오라 잔여 안내 (코치 중이 아닐 때 살짝)
  let auraHint = $('jan-aura-hint');
  if (!auraHint) {
    auraHint = document.createElement('div');
    auraHint.id = 'jan-aura-hint';
    $('handarea').parentNode.insertBefore(auraHint, $('handarea'));
  }
  if (state.coachStep === 'junk') {
    auraHint.hidden = false;
    auraHint.classList.add('junk');
    auraHint.textContent = '🗑️ 빨간 빛 — 버릴 약한 패 (눌러 고르고 버리기, 최대 5장)';
  } else if (state.round === 1 && state.screen === 'play' && state.janAuraLeft > 0 && aura) {
    auraHint.hidden = false;
    auraHint.classList.remove('junk');
    auraHint.textContent = aura.handId === 'none'
      ? `✨ 조합 힌트 ${state.janAuraLeft}회 · 빛나는 패를 누르면 칩 최고 패가 골라져요`
      : `✨ 조합 힌트 ${state.janAuraLeft}회 · 빛나는 패를 누르면 ${aura.name}이 한 번에 골라져요`;
  } else {
    auraHint.hidden = true;
    auraHint.classList.remove('junk');
    auraHint.textContent = '';
  }

  const n = state.selected.length;
  const canAct = state.screen === 'play' && !state.juicing && !state.dealing;
  const shortAct = window.matchMedia('(max-width: 720px)').matches;
  $('btn-play').textContent = shortAct ? `내기 (${state.playsLeft})` : `내기 (${state.playsLeft}회 남음)`;
  $('btn-play').disabled = !canAct || n < 1 || n > 5 || state.playsLeft <= 0 || state.coachStep === 'junk';
  $('btn-discard').textContent = shortAct ? `버리기 (${state.discardsLeft})` : `버리기 (${state.discardsLeft}회 남음)`;
  $('btn-discard').disabled = !canAct || n < 1 || n > 5 || state.discardsLeft <= 0;
  if (CHUNHYANG_ENABLED) {
    $('btn-play').onmouseenter = () => setChunhyangHover('play');
    $('btn-play').onmouseleave = () => clearChunhyangHover();
    $('btn-discard').onmouseenter = () => setChunhyangHover('discard');
    $('btn-discard').onmouseleave = () => clearChunhyangHover();
    bindActionLongPress($('btn-play'), 'play');
    bindActionLongPress($('btn-discard'), 'discard');
  } else {
    $('btn-play').onmouseenter = null;
    $('btn-play').onmouseleave = null;
    $('btn-discard').onmouseenter = null;
    $('btn-discard').onmouseleave = null;
  }

  const g = state.hand.find((c) => c.tags.includes('dual') && !c.faceDown);
  const bg = $('btn-gukjin');
  if (g && canAct) {
    bg.classList.add('on');
    bg.textContent = `국진 모드: ${g.asPi ? '쌍피' : '열끗'} (전환)`;
  } else {
    bg.classList.remove('on');
  }
}

function renderCoach() {
  const root = $('coach-root');
  if (!root) return;
  const step = state.coachStep;
  const isShop = step === 'shop' || (step && String(step).startsWith('shop'));
  const isGoStop = step === 'gostop';
  const ok =
    step &&
    ((isShop && state.screen === 'shop') ||
      (isGoStop && state.screen === 'gostop') ||
      (!isShop && !isGoStop && state.screen === 'play' && state.round === 1));
  if (!ok) {
    root.classList.remove('on');
    root.setAttribute('aria-hidden', 'true');
    root.innerHTML = '';
    return;
  }

  const aura = (!isShop && !isGoStop) ? getJanAuraBest() : null;
  const handText = aura
    ? (aura.handId === 'none'
      ? `<b>연두 빛</b>이 도는 패를 눌러 보세요. 조합이 없으면 칩 최고 패가 골라집니다.<br><span style="color:#94a3b8;font-size:12px">1월 한정 · ${JAN_AURA_USES}회</span>`
      : `<b>연두 빛</b>이 도는 패를 눌러 보세요. <b>${aura.name}</b>이 한 번에 골라집니다.<br><span style="color:#94a3b8;font-size:12px">1월 한정 · ${JAN_AURA_USES}회</span>`)
    : `연두 빛 패를 눌러 조합을 골라 보세요. <b>1월 한정</b>이에요.`;

  const playRes = state.lastPlay && state.lastPlay.result;
  const scoredBody = playRes
    ? `방금 <b>${HAND_BY_ID[playRes.handId].name}</b>으로 <b>+${fmt(playRes.score)}점</b>!<br>
       점수 = (<b>족보 칩 ${fmt(playRes.chips)}</b> × <b>${fmtMult(playRes.mult)}배</b>)${playRes.flat ? ` + <b>${fmt(playRes.flat)}</b>` : ''}.<br>
       목표까지 <b>남은 점수 ${fmt(Math.max(0, state.target - state.roundScore))}</b> · 게이지를 확인하세요.`
    : `점수가 쌓였어요! 점수 = <b>족보 칩</b> × <b>배수</b> + 나머지.`;

  // next: null → 액션으로만 진행 (다음 버튼 없음). 확인이 필요할 때만 라벨.
  const junkHasSel = state.selected.length > 0;
  const steps = {
    hand: {
      sel: '#handarea', pad: 10, title: '✨ 조합 힌트', body: handText, next: null,
    },
    play: {
      sel: '#btn-play', pad: 8, title: '🎯 내기',
      body: `골랐으면 <b>내기</b>를 눌러 점수를 쌓아 보세요.`,
      next: null,
    },
    junk: {
      sel: junkHasSel ? '#btn-discard' : '#handarea',
      pad: 8,
      title: '🗑️ 버리기',
      body: junkHasSel
        ? `<b>버리기</b>를 눌러 패를 갈아끼우세요 (한 번에 최대 5장). 버린 만큼 덱에서 보충됩니다.`
        : `조합이 약할 땐 <b>피</b>처럼 약한 패를 버리세요. <b style="color:#fca5a5">빨간 빛</b> 패를 누르면 추천분이 한 번에 골라져요 (최대 5장).`,
      next: null,
    },
    scored: {
      sel: '#playedarea', pad: 10, title: '✨ 점수 획득!',
      body: scoredBody,
      next: '알겠어요',
    },
    gostop: {
      sel: '#gs-actions', pad: 10, title: '🔥 고 / 스톱',
      body: `<b>스톱</b>은 지금 정산하고 다음 달로.<br><b>고</b>는 목표를 올리고 더 내지만, 실패하면 <b>고박 = 런 종료</b>!<br><span style="color:#94a3b8;font-size:12px">하나를 골라 보세요.</span>`,
      next: null,
    },
    shop: {
      sel: '#shop-offers', pad: 10, title: '🏪 상점',
      body: CHUNHYANG_ENABLED
        ? `특수패를 사고, 마음에 안 들면 <b>리롤</b>하세요. 준비되면 <b>다음 판으로</b>!<br><span style="color:#94a3b8;font-size:12px">춘향 훈수도 여기서 예약할 수 있어요.</span>`
        : `특수패를 사고, 마음에 안 들면 <b>리롤</b>하세요. 준비되면 <b>다음 판으로</b>!`,
      next: '알겠어요',
    },
  };
  const cfg = steps[step];
  if (!cfg) {
    root.classList.remove('on');
    return;
  }
  const target = document.querySelector(cfg.sel);
  if (!target) {
    root.classList.remove('on');
    return;
  }

  const r = target.getBoundingClientRect();
  const pad = cfg.pad;
  const x = Math.max(6, r.left - pad);
  const y = Math.max(6, r.top - pad);
  const w = Math.min(window.innerWidth - x - 6, r.width + pad * 2);
  const h = Math.min(window.innerHeight - y - 6, r.height + pad * 2);

  const spaceBelow = window.innerHeight - (y + h);
  const panelTop = spaceBelow > 140 ? (y + h + 14) : Math.max(12, y - 130);
  const panelLeft = Math.min(Math.max(12, x), window.innerWidth - 360);

  const actions = cfg.next
    ? `<button type="button" class="coach-skip" onclick="coachSkip()">건너뛰기</button>
        <button type="button" class="coach-next" onclick="coachNext()">${cfg.next}</button>`
    : `<button type="button" class="coach-skip" onclick="coachSkip()">건너뛰기</button>`;

  root.classList.add('on');
  root.setAttribute('aria-hidden', 'false');
  root.innerHTML = `
    <div class="coach-block" style="left:0;top:0;width:100%;height:${y}px"></div>
    <div class="coach-block" style="left:0;top:${y + h}px;width:100%;height:${Math.max(0, window.innerHeight - y - h)}px"></div>
    <div class="coach-block" style="left:0;top:${y}px;width:${x}px;height:${h}px"></div>
    <div class="coach-block" style="left:${x + w}px;top:${y}px;width:${Math.max(0, window.innerWidth - x - w)}px;height:${h}px"></div>
    <div class="coach-ring" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px"></div>
    <div class="coach-panel" style="left:${panelLeft}px;top:${panelTop}px">
      <div class="coach-title">${cfg.title}</div>
      <div>${cfg.body}</div>
      <div class="coach-actions">${actions}</div>
    </div>`;
}

function renderModal() {
  const ov = $('modal-overlay');
  const m = $('modal');
  const screens = {
    welcome: welcomeHTML, prep: prepHTML, gostop: gostopHTML, settle: settleHTML, shop: shopHTML,
    gameover: gameoverHTML, victory: victoryHTML, help: helpHTML,
  };
  const fn = screens[state.screen];
  if (!fn) {
    m.classList.remove('gostop-modal');
    m.dataset.modalSig = '';
    ov.classList.remove('show', 'gostop-open');
    return;
  }

  const isGoStop = state.screen === 'gostop';
  // 고/스톱은 render가 연달아 두 번 와도 DOM을 다시 안 그림 → 버튼 연출 중복 방지
  if (isGoStop) {
    const n = goLevelReached(state.baseTarget, state.roundScore, state.goLevel) + 1;
    const sig = `gostop:${state.goLevel}:${n}:${state.roundScore}:${state.playsLeft}:${cardsRemaining()}`;
    m.classList.add('gostop-modal');
    ov.classList.add('show', 'gostop-open');
    if (m.dataset.modalSig === sig) return;
    m.dataset.modalSig = sig;
    m.innerHTML = gostopHTML();
    const stage = $('go-btn-stage');
    if (stage) {
      const to = +stage.dataset.to || n;
      // 버튼 연출은 항상 1→N 전체
      playGoBtnCascade(0, to);
    }
    return;
  }

  m.dataset.modalSig = state.screen;
  m.classList.remove('gostop-modal', 'shop-modal');
  if (state.screen === 'shop') m.classList.add('shop-modal');
  ov.classList.remove('gostop-open');
  m.innerHTML = fn();
  ov.classList.add('show');
}

function gostopHTML() {
  // 밀치기 고: 이미 넘은 문턱은 소급 인정 → 선언 단계 = 아직 못 넘은 첫 문턱
  const n = goLevelReached(state.baseTarget, state.roundScore, state.goLevel) + 1;
  const jump = n - state.goLevel; // 1이면 일반 고, 2 이상이면 밀치기
  const newTarget = goThreshold(state.baseTarget, n);
  const stopTip = state.goLevel > 0
    ? `지금 정산하고 다음 판으로<br>(${state.goLevel}고 보너스 <b>+${goBonus(state.goLevel)}냥</b> 확보)`
    : '지금 정산하고 안전하게 다음 판으로';
  const goTip = (jump > 1 ? `한 방으로 <b style="color:#fde68a">${jump}단계 밀치기</b><br>` : '')
    + `새 목표 <b>${fmt(newTarget)}점</b> (×${goMult(n)})<br>`
    + `내기 <b>+1</b> · 손패 보충 · 성공 시 <b>+${goBonus(n)}냥</b><br>`
    + `실패 시 <b>고박 = 런 종료</b>`;
  const goTitle = n <= 1
    ? `<div class="t">1고</div>`
    : `<div class="t go-btn-stage" id="go-btn-stage" data-from="0" data-to="${n}"></div>`;
  return `
    <h2>🎉 목표 달성!</h2>
    <div class="sub">${fmt(state.roundScore)} / ${fmt(state.target)}점 · 내기 ${state.playsLeft} · 패 ${cardsRemaining()}</div>
    <div class="modal-actions" id="gs-actions">
      <button class="choicebtn btn-stop gs-simple" onclick="chooseStop()">
        <div class="t">✋ 스톱</div>
        <div class="gs-tip">${stopTip}</div>
      </button>
      <button class="choicebtn btn-go gs-simple" onclick="chooseGo()">
        ${goTitle}
        <div class="gs-tip">${goTip}</div>
      </button>
    </div>`;
}

function settleHTML() {
  const d = state.settleData;
  const rows = [
    [`이자 (보유 ${d.moneyBefore}냥 → 5냥당 1냥, 최대 5냥)`, d.interest],
    [`기본 상금${isBossRound(state.round) ? ' (박 라운드)' : ''}`, d.base],
    [`남은 내기 ${d.playBonus}회`, d.playBonus],
  ];
  if (d.goBonus) rows.push([`고 보너스 (${state.goLevel}고)`, d.goBonus]);
  if (d.insBonus) rows.push(['피박보험', d.insBonus]);
  return `
    <h2>💰 ${state.round}월 (${MONTHS[state.round - 1].name}) 클리어!</h2>
    <table class="settle-table">
      ${rows.map(([k, v]) => `<tr><td>${k}</td><td>+${v}냥</td></tr>`).join('')}
      <tr class="total"><td>합계</td><td>+${d.total}냥 → 보유 ${state.money}냥</td></tr>
    </table>
    <div class="modal-actions"><button class="choicebtn btn-stop" style="text-align:center" onclick="openShop()"><div class="t">🏪 상점으로</div></button></div>`;

function shopHTML() {
  const rarityKo = { common: '커먼', uncommon: '언커먼', rare: '레어' };
  const offers = state.shopOffers.map((o, i) => {
    const j = o.joker;
    const cant = state.money < j.price || state.jokers.length >= 5;
    return `<div class="offer${o.sold ? ' sold' : ''}">
      <div class="o-icon">${j.icon}</div>
      <div class="o-name">${esc(j.name)}</div>
      <div class="o-meta">
        <span class="o-rarity r-${j.rarity}">${rarityKo[j.rarity]}</span>
        <span class="o-kind">${esc(j.kind || '')}</span>

/* ================================================================
   주스 연출 (오버레이 — state 중간값 오염 금지, lastPlay 스냅샷만 재생)
   ================================================================ */
const JUICE = {
  skip: false,
  running: false,
  onSkip: null,
};

function juiceWait(ms) {
  return new Promise((resolve) => {
    if (JUICE.skip) { resolve(); return; }
    const t = setTimeout(resolve, ms);
    const prev = JUICE.onSkip;
    JUICE.onSkip = () => { clearTimeout(t); prev && prev(); resolve(); };
  });
}

function juiceTier(handId) {
  const i = HANDS.findIndex((h) => h.id === handId);
  if (i <= 1) return 'S';
  if (i <= 5) return 'A';
  if (i <= 8) return 'B';
  if (i <= 11) return 'C';
  return 'D';
}

function juiceBreakdown(snap) {
  const { cards, result, env } = snap;
  let { handId, core } = detectHandInfo(cards);
  if (env.boss === 'no_shake' && ['month2', 'month3', 'chongtong'].includes(handId)) {
    handId = 'none';
    core = [...cards];
  }
  const coreSet = new Set(core);
  const steps = cards.map((c) => ({
    card: c,
    chip: cardChip(c, env),
    isCore: coreSet.has(c),
  }));
  const coreSum = steps.filter((s) => s.isCore).reduce((a, s) => a + s.chip, 0);
  const cardFlat = steps.filter((s) => !s.isCore).reduce((a, s) => a + s.chip, 0);
  const jokerChips = Math.max(0, result.flat - cardFlat);
  return { handBase: 0, steps, jokerChips, flatSum: result.flat, mult: result.mult, score: result.score, handId: result.handId };
}

// ── Web Audio 신스 (파일 없음) ─────────────────────────────
let _audioCtx = null;
function audioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function beep(freq, dur, type = 'square', gain = 0.04, slideTo = null) {
  try {
    const ctx = audioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    if (slideTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), ctx.currentTime + dur);
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch (_) { /* autoplay 정책 등 */ }
}
function sfxChip() { beep(660 + Math.random() * 80, 0.07, 'square', 0.035); }
function sfxMult() { beep(180, 0.22, 'sawtooth', 0.05, 420); setTimeout(() => beep(520, 0.12, 'square', 0.04), 80); }
function sfxScore() { beep(392, 0.1, 'triangle', 0.04); setTimeout(() => beep(523, 0.12, 'triangle', 0.045), 70); setTimeout(() => beep(659, 0.18, 'triangle', 0.05), 140); }
function sfxScoreLand() {
  beep(620, 0.06, 'triangle', 0.035);
  setTimeout(() => beep(880, 0.1, 'sine', 0.04), 40);
}
function sfxBanner(tier) {
  const base = { S: 520, A: 440, B: 370, C: 330, D: 260 }[tier] || 300;
  beep(base, 0.15, 'sawtooth', 0.045); setTimeout(() => beep(base * 1.5, 0.2, 'triangle', 0.04), 90);
}
function sfxOverflow() { beep(200, 0.15, 'square', 0.04, 800); setTimeout(() => beep(900, 0.2, 'triangle', 0.05), 100); }
function sfxCoin() { beep(980, 0.06, 'square', 0.03); setTimeout(() => beep(1310, 0.08, 'square', 0.025), 40); }
function sfxDiscard() {
  beep(420, 0.08, 'triangle', 0.03, 180);
  setTimeout(() => beep(280, 0.1, 'sawtooth', 0.025, 120), 50);
}
function sfxPlayLift() {
  beep(380, 0.07, 'triangle', 0.03);

}
function sfxGoStep(step, final) {
  const f = 392 * Math.pow(1.122, step); // 밀칠 때마다 반음씩 상승
  beep(f, 0.12, 'sawtooth', 0.045);
  setTimeout(() => beep(f * 1.5, final ? 0.22 : 0.12, 'triangle', 0.05), 60);
  if (final) setTimeout(() => beep(f * 2, 0.3, 'triangle', 0.045), 150);
}

function handBannerAnchor() {
  const mobile = window.matchMedia('(max-width: 720px)').matches;
  if (mobile) {
    const hand = $('handarea');
    const hr = hand && hand.getBoundingClientRect();
    const cy = (hr && hr.top > 70) ? Math.max(72, hr.top - 36) : window.innerHeight * 0.26;
    return { cx: window.innerWidth / 2, cy };
  }
  const pa = $('playedarea');
  const visible = pa && getComputedStyle(pa).display !== 'none' && pa.getBoundingClientRect().height > 8;
  const r = (visible ? pa : ($('table') || document.body)).getBoundingClientRect();
  return { cx: r.left + r.width / 2, cy: r.top + Math.min(48, Math.max(28, r.height * 0.28)) };
}

function spawnGoShards(stage, text, fontSize) {
  const count = Math.min(10, Math.max(4, [...text].length * 2));
  for (let i = 0; i < count; i++) {
    const shard = document.createElement('span');
    shard.className = 'go-shard';
    shard.textContent = text[i % text.length] || '!';
    const ang = (-70 + Math.random() * 140) * Math.PI / 180;
    const dist = 70 + Math.random() * 140;
    shard.style.fontSize = Math.max(14, (fontSize || 48) * (0.35 + Math.random() * 0.45)) + 'px';
    shard.style.setProperty('--sx', Math.cos(ang) * dist + 'px');
    shard.style.setProperty('--sy', Math.sin(ang) * dist - 30 + 'px');
    shard.style.setProperty('--rot', (-200 + Math.random() * 400) + 'deg');
    shard.style.animationDelay = (i * 18) + 'ms';
    stage.appendChild(shard);
    setTimeout(() => shard.remove(), 620);
  }
}

// 하이퍼버닝식: 풀스크린=깨지며 밀치기 / 버튼=위에서 쌓이며 교체
async function runGoShatterCascade(fromLevel, toLevel, opts = {}) {
  const fullscreen = !!opts.fullscreen;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (toLevel <= fromLevel) return;
  if (reduce) {
    if (opts.stageEl && !fullscreen) {
      opts.stageEl.innerHTML = '';
      const num = document.createElement('div');
      num.className = 'go-num';
      num.textContent = `${toLevel}고`;
      opts.stageEl.appendChild(num);
    }
    return;
  }

  const overlay = fullscreen ? $('go-cascade') : null;
  const stage = fullscreen
    ? $('go-cascade-stage')
    : (opts.stageEl || $('go-btn-stage'));
  if (!stage) return;

  const wait = (ms) => new Promise((res) => setTimeout(res, ms));
  let cur = null;
  const inBtn = !fullscreen;

  if (fullscreen && overlay) {
    overlay.classList.add('on');
    overlay.setAttribute('aria-hidden', 'false');
  }
  stage.querySelectorAll('.go-num, .go-shard').forEach((el) => el.remove());
  if (inBtn) stage.textContent = '';

  try {
    for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
      const final = lv === toLevel;
      const label = inBtn
        ? `${lv}고`
        : `${lv}고${'!'.repeat(Math.min(3, i + 1))}`;
      const size = fullscreen
        ? Math.min(132, 64 + i * 14)
        : null;

      if (cur) {
        if (fullscreen) {
          spawnGoShards(stage, cur.textContent.replace(/[!고]/g, ''), size || 28);
          cur.classList.remove('slam');
          cur.classList.add('push-out');
        } else {
          // 버튼: 위에서 쌓이며 아래로 밀림 (파편 없이 깔끔하게)
          cur.classList.remove('stack-in');
          cur.classList.add('stack-out');
        }
        const dying = cur;
        setTimeout(() => dying.remove(), inBtn ? 300 : 340);
        cur = null;
      }

      const num = document.createElement('div');
      num.className = inBtn ? 'go-num stack-in' : 'go-num slam';
      num.textContent = label;
      if (size) num.style.fontSize = size + 'px';
      if (final && fullscreen) {
        num.style.color = '#fef08a';
        num.style.textShadow =
          '0 0 28px rgba(250,204,21,.95), 0 0 56px rgba(239,68,68,.65), 0 8px 0 #9a3412, 0 12px 28px rgba(0,0,0,.55)';
      }
      stage.appendChild(num);
      cur = num;
      sfxGoStep(i, final);
      if (fullscreen && i >= 1) screenShake(final);
      if (opts.onStep) opts.onStep(lv, final);
      await wait(final
        ? (fullscreen ? 720 : 340)
        : Math.max(120, Math.round((fullscreen ? 360 : 200) * Math.pow(0.88, i))));
    }
    if (opts.holdFinal) await wait(opts.holdFinal);
  } finally {
    if (fullscreen && overlay) {
      overlay.classList.remove('on');
      overlay.setAttribute('aria-hidden', 'true');
      stage.innerHTML = '';
    }
  }
}

// 확정 시 풀스크린 두두둥
async function playGoCascade(fromLevel, toLevel) {
  if (toLevel <= fromLevel) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  state.juicing = true;
  document.body.classList.add('juicing');
  try {
    await runGoShatterCascade(fromLevel, toLevel, { fullscreen: true });
  } finally {
    state.juicing = false;
    document.body.classList.remove('juicing');
  }
}

// 선택 UI: 1고 = 기본 표기 / 2~3고 = D / 4고+ = C
// 연출은 실제 goLevel과 무관하게 항상 0→N (1고부터 풀 시퀀스)으로 보여 줌
async function playGoBtnCascade(fromLevel, toLevel) {
  const stage = $('go-btn-stage');
  if (!stage || toLevel <= 0) return;
  if (toLevel <= 1) {
    clearGoBtnStage(stage);
    const num = document.createElement('div');
    num.className = 'go-num';
    num.textContent = goBtnLabel(toLevel);
    stage.appendChild(num);
    return;
  }
  const style = toLevel <= 3 ? 'hyper' : 'slide';
  await playGoBtnStyle(stage, 0, toLevel, style);
}

function goBtnLabel(lv) {
  return `${lv}고`;
}

function clearGoBtnStage(stage) {
  if (!stage) return;
  stage.querySelectorAll('.go-num, .go-roulette, .go-impact, .go-spark, .go-mini-shard, .go-heat-flame')
    .forEach((el) => el.remove());
  stage.textContent = '';
}

function juiceGoBtn(stage, heavy = false) {
  const btn = stage && stage.closest('.choicebtn');
  if (!btn) return;
  btn.classList.remove('go-btn-juice');
  void btn.offsetWidth;
  btn.classList.add('go-btn-juice');
  setTimeout(() => btn.classList.remove('go-btn-juice'), 360);
  // 고/스톱 버튼 안 연출에서는 카메라 쉐이크 없음 (본게임 주스·확정 연출은 유지)
}

function spawnGoImpact(stage) {
  const ring = document.createElement('div');
  ring.className = 'go-impact';
  stage.appendChild(ring);
  setTimeout(() => ring.remove(), 420);
}

function spawnGoSparks(stage, n = 6) {
  for (let i = 0; i < n; i++) {
    const sp = document.createElement('div');
    sp.className = 'go-spark';
    const ang = (Math.PI * 2 * i) / n + Math.random() * 0.4;
    const dist = 28 + Math.random() * 36;
    sp.style.setProperty('--sx', Math.cos(ang) * dist + 'px');
    sp.style.setProperty('--sy', Math.sin(ang) * dist + 'px');
    stage.appendChild(sp);
    setTimeout(() => sp.remove(), 480);
  }
}

function spawnGoMiniShards(stage, label) {
  for (let i = 0; i < 5; i++) {
    const sh = document.createElement('div');
    sh.className = 'go-mini-shard';
    sh.textContent = label;
    const ang = (Math.PI * 2 * i) / 5 + Math.random() * 0.25;
    const dist = 32 + Math.random() * 36;
    sh.style.setProperty('--sx', Math.cos(ang) * dist + 'px');
    sh.style.setProperty('--sy', Math.sin(ang) * dist + 'px');
    sh.style.setProperty('--rot', (-90 + Math.random() * 180) + 'deg');
    stage.appendChild(sh);
    setTimeout(() => sh.remove(), 450);
  }
}

async function playGoBtnStyle(stage, fromLevel, toLevel, style) {
  if (!stage || toLevel <= fromLevel) return;
  if (stage.dataset.playing === '1') return;
  stage.dataset.playing = '1';
  const wait = (ms) => new Promise((res) => setTimeout(res, ms));
  const fn = GO_BTN_ANIMS[style];
  try {
    if (fn) await fn(stage, fromLevel, toLevel, wait);
    else await animGoStack(stage, fromLevel, toLevel, wait);
  } finally {
    if (document.body.contains(stage)) stage.dataset.playing = '0';
  }
}

async function animGoRoulette(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  const levels = [];
  for (let lv = fromLevel + 1; lv <= toLevel; lv++) levels.push(lv);
  if (!levels.length) return;

  const row = document.createElement('div');
  row.className = 'go-roulette spinning';
  const slot = document.createElement('span');
  slot.className = 'gr-slot';
  const strip = document.createElement('span');
  strip.className = 'gr-strip';
  // 3바퀴 분량으로 더 도파민
  const spins = [...levels, ...levels, ...levels];
  spins.forEach((n) => {
    const s = document.createElement('span');
    s.textContent = String(n);
    strip.appendChild(s);
  });
  slot.appendChild(strip);
  row.appendChild(slot);
  row.appendChild(Object.assign(document.createElement('span'), { className: 'gr-tail', textContent: '고' }));
  stage.appendChild(row);

  const cell = 1.1;
  strip.style.transition = 'none';
  strip.style.transform = 'translateY(0)';
  void strip.offsetWidth;

  const finalIdx = spins.length - 1;
  // 가속 스핀
  strip.style.transition = 'transform .55s cubic-bezier(.4,0,.7,.2)';
  strip.style.transform = `translateY(${-Math.floor(levels.length * 1.2) * cell}em)`;
  sfxGoStep(0, false);
  juiceGoBtn(stage);
  await wait(520);

  // 감속 정착 (ease-out)
  strip.style.transition = `transform ${0.8 + levels.length * 0.04}s cubic-bezier(.16,1,.3,1)`;
  strip.style.transform = `translateY(${-finalIdx * cell}em)`;
  for (let i = 1; i < levels.length; i++) {
    await wait(70 + i * 8);
    sfxGoStep(i, false);
  }
  await wait(580);
  row.classList.remove('spinning');
  row.classList.add('settle');
  spawnGoImpact(stage);
  spawnGoSparks(stage, 8);
  juiceGoBtn(stage, true);
  sfxGoStep(levels.length, true);
  await wait(280);
}

async function animGoPunch(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  let cur = null;
  for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
    const final = lv === toLevel;
    if (cur) cur.remove();
    const num = document.createElement('div');
    num.className = final ? 'go-num punch-final' : 'go-num punch';
    num.textContent = goBtnLabel(lv);
    stage.appendChild(num);
    cur = num;
    spawnGoImpact(stage);
    if (final || i % 2 === 1) spawnGoSparks(stage, final ? 10 : 5);
    juiceGoBtn(stage, final);
    sfxGoStep(i, final);
    await wait(final ? 420 : Math.max(110, 200 - i * 14));
  }
}

async function animGoSlide(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  const fakeLv = toLevel - 1;
  let cur = null;

  const pushSlide = async (lv, { clsIn, clsOut, asFinal, epic, flow, sticky }) => {
    if (cur) {
      cur.classList.remove(
        'slide-in', 'slide-flow-in', 'slide-flow-in-sticky',
        'slide-fake', 'slide-doubt', 'slide-in-epic'
      );
      cur.classList.add(clsOut || (sticky ? 'slide-flow-out-sticky' : flow ? 'slide-flow-out' : 'slide-out'));
      const dying = cur;
      setTimeout(() => dying.remove(), epic ? 480 : sticky ? 600 : flow ? 400 : 400);
      cur = null;
      if (!flow && !sticky) await wait(epic ? 140 : 70);
    }
    const num = document.createElement('div');
    num.className = `go-num ${clsIn}`;
    num.textContent = goBtnLabel(lv);
    if (asFinal || epic) num.style.color = '#fef08a';
    stage.appendChild(num);
    cur = num;
    if (!flow && !sticky) juiceGoBtn(stage, !!(asFinal || epic));
    if (asFinal || epic) {
      spawnGoImpact(stage);
      spawnGoSparks(stage, epic ? 14 : 8);
    }
  };

  if (toLevel <= fromLevel + 1) {
    await pushSlide(toLevel, { clsIn: 'slide-in-epic', clsOut: 'slide-out', asFinal: true, epic: true });
    sfxGoStep(0, true);
    await wait(720);
    return;
  }

  // 1) 최종 직전까지 — 앞은 빠르게, 뒤로 갈수록 쫀득하게 감속
  //    단 4~6고대(짧은 span)는 초반을 덜 날려서 주루룩 방지
  const span = Math.max(1, fakeLv - fromLevel);
  const shortish = span <= 5; // 예: 0→4/5/6 (fake 3/4/5)
  let step = 0;
  for (let lv = fromLevel + 1; lv <= fakeLv; lv++, step++) {
    const isFakeFinal = lv === fakeLv;
    const remain = fakeLv - lv;
    const sticky = !isFakeFinal && remain <= 2;
    await pushSlide(lv, {
      clsIn: isFakeFinal ? 'slide-in' : (sticky ? 'slide-flow-in-sticky' : 'slide-flow-in'),
      clsOut: isFakeFinal ? 'slide-out' : (sticky ? 'slide-flow-out-sticky' : 'slide-flow-out'),
      asFinal: isFakeFinal,
      epic: false,
      flow: !isFakeFinal && !sticky,
      sticky: sticky,
    });
    sfxGoStep(step, isFakeFinal);
    if (!isFakeFinal) {
      const t = (lv - fromLevel) / span;
      const chew = Math.pow(t, shortish ? 1.65 : 2.35);
      const base = shortish
        ? 145 + span * 6
        : 72 + Math.min(40, span * 2);
      const rise = shortish
        ? 200 + span * 8
        : 280 + Math.min(160, span * 10);
      await wait(Math.round(base + chew * rise));
    }
  }

  // 2) "이게 끝?" — 잠금처럼 보이다가 흔들림(의심)
  if (cur) {
    cur.classList.remove('slide-in', 'slide-flow-in');
    cur.classList.add('slide-fake');
    cur.style.color = '#fef08a';
  }
  spawnGoImpact(stage);
  juiceGoBtn(stage, true);
  await wait(650); // 흔들리기 전 — 가짜 피날레로 머무름

  if (cur) {
    cur.classList.remove('slide-fake');
    cur.classList.add('slide-doubt');
  }
  await wait(480);

  // 3) 반전: 가짜를 날리고 진짜가 같은 방향에서 더 멋지게
  await pushSlide(toLevel, {
    clsIn: 'slide-in-epic',
    clsOut: 'slide-out-blast',
    asFinal: true,
    epic: true,
  });
  sfxGoStep(step + 1, true);
  spawnGoImpact(stage);
  spawnGoSparks(stage, 10);
  juiceGoBtn(stage, true);
  await wait(780);
}

async function animGoHyper(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  let cur = null;
  for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
    const final = lv === toLevel;
    if (cur) cur.remove();
    const num = document.createElement('div');
    num.className = final ? 'go-num hyper-final' : 'go-num hyper';
    num.textContent = goBtnLabel(lv);
    stage.appendChild(num);
    cur = num;
    sfxGoStep(i, final);
    if (!final) juiceGoBtn(stage);
    await wait(final ? 0 : Math.max(55, 130 - i * 12));
  }
  spawnGoImpact(stage);
  spawnGoSparks(stage, 12);
  juiceGoBtn(stage, true);
  await wait(480);
}

async function animGoSlam(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  let cur = null;
  for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
    const final = lv === toLevel;
    if (cur) {
      cur.classList.remove('slam-drop');
      cur.classList.add('slam-crush');
      const dying = cur;
      setTimeout(() => dying.remove(), 220);
      cur = null;
    }
    const num = document.createElement('div');
    num.className = 'go-num slam-drop';
    num.textContent = goBtnLabel(lv);
    if (final) num.style.color = '#fef08a';
    stage.appendChild(num);
    cur = num;
    await wait(90);
    spawnGoImpact(stage);
    spawnGoSparks(stage, final ? 10 : 4);
    juiceGoBtn(stage, final);
    sfxGoStep(i, final);
    await wait(final ? 400 : Math.max(120, 200 - i * 12));
  }
}

async function animGoShatter(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  let cur = null;
  for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
    const final = lv === toLevel;
    if (cur) {
      spawnGoMiniShards(stage, goBtnLabel(lv - 1));
      cur.remove();
      cur = null;
      await wait(40);
    }
    const num = document.createElement('div');
    num.className = 'go-num assemble';
    num.textContent = goBtnLabel(lv);
    if (final) num.style.color = '#fef08a';
    stage.appendChild(num);
    cur = num;
    juiceGoBtn(stage, final);
    if (final) { spawnGoImpact(stage); spawnGoSparks(stage, 10); }
    sfxGoStep(i, final);
    await wait(final ? 420 : Math.max(140, 230 - i * 12));
  }
}

async function animGoHeat(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  let cur = null;
  for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
    const final = lv === toLevel;
    if (cur) cur.remove();
    const t = i / Math.max(1, toLevel - fromLevel - 1);
    const num = document.createElement('div');
    num.className = 'go-num heat';
    num.textContent = goBtnLabel(lv);
    num.style.textShadow =
      `0 1px 0 rgba(127,29,29,.65), 0 0 ${10 + t * 22}px rgba(251,146,60,${0.4 + t * 0.55}), 0 0 ${18 + t * 30}px rgba(239,68,68,${0.2 + t * 0.5})`;
    if (final) num.style.color = '#fef08a';
    stage.appendChild(num);
    cur = num;
    for (let f = 0; f < 2 + Math.floor(t * 3); f++) {
      const fl = document.createElement('div');
      fl.className = 'go-heat-flame';
      fl.textContent = '✦';
      fl.style.color = '#fbbf24';
      fl.style.fontSize = '11px';
      fl.style.fontWeight = '900';
      fl.style.setProperty('--fx', ((Math.random() - 0.5) * 40) + 'px');
      fl.style.left = (42 + Math.random() * 16) + '%';
      fl.style.animationDelay = (f * 40) + 'ms';
      stage.appendChild(fl);
      setTimeout(() => fl.remove(), 600);
    }
    juiceGoBtn(stage, final);
    if (final) spawnGoImpact(stage);
    sfxGoStep(i, final);
    await wait(final ? 400 : Math.max(130, 210 - i * 10));
  }
}

async function animGoGlitch(stage, fromLevel, toLevel, wait) {
  clearGoBtnStage(stage);
  const num = document.createElement('div');
  num.className = 'go-num glitch';
  stage.appendChild(num);
  const scrambleMs = 520 + (toLevel - fromLevel) * 40;
  const t0 = performance.now();
  while (performance.now() - t0 < scrambleMs) {
    const r = fromLevel + 1 + Math.floor(Math.random() * (toLevel - fromLevel));
    num.textContent = goBtnLabel(r);
    sfxGoStep(0, false);
    juiceGoBtn(stage);
    await wait(45 + Math.random() * 35);
  }
  // 빠르게 실제 시퀀스 스냅
  for (let lv = fromLevel + 1, i = 0; lv <= toLevel; lv++, i++) {
    num.textContent = goBtnLabel(lv);
    sfxGoStep(i, lv === toLevel);
    await wait(55);
  }
  num.classList.remove('glitch');
  num.classList.add('glitch-lock');
  num.style.color = '#fef08a';
  spawnGoImpact(stage);
  spawnGoSparks(stage, 10);
  juiceGoBtn(stage, true);
  await wait(380);
}

async function animGoStack(stage, fromLevel, toLevel, wait) {
  await runGoShatterCascade(fromLevel, toLevel, { stageEl: stage, fullscreen: false });
}

const GO_BTN_ANIMS = {
  roulette: animGoRoulette,
  punch: animGoPunch,
  slide: animGoSlide,
  hyper: animGoHyper,
  slam: animGoSlam,
  shatter: animGoShatter,
  heat: animGoHeat,
  glitch: animGoGlitch,
  stack: animGoStack,
};

const GO_PREVIEW_FROM = 0;
const GO_PREVIEW_TO = 6;
const GO_LIVE_MAX = 10;
const GO_ANIM_CATALOG = [
  { id: 'roulette', title: 'A · 룰렛+', desc: '「고」 고정, 숫자만 3바퀴 스핀 후 감속 정착 · 스파크' },
  { id: 'punch', title: 'B · 펀치+', desc: '같은 자리 연타 임팩트링 · 마지막 초대형 펀치' },
  { id: 'slide', title: 'C · 옆 밀치기+', desc: '같은 방향으로 직전까지 → 가짜 피날레·흔들림 → 같은 방향에서 최종이 더 세게' },
  { id: 'hyper', title: 'D · 하이퍼번', desc: '초고속 플래시 연쇄 후 최종 슬램 (하이퍼버닝 맛)' },
  { id: 'slam', title: 'E · 임팩트 슬램', desc: '위에서 찍어 누르고 납작하게 깨진 뒤 다음 숫자' },

  { id: 'heat', title: 'G · 열기 상승', desc: '단계마다 글로우·불꽃 강해지며 뜨거워짐' },
  { id: 'glitch', title: 'H · 글리치 락', desc: '숫자 스크램블 → 실제 단계로 스냅 → 락온' },

function goBtnPreviewStyle(toLevel) {
  if (toLevel <= 1) return 'basic';
  return toLevel <= 3 ? 'hyper' : 'slide';
}

function seedGoBtnStage(stage, labelLv = 0) {
  if (!stage) return;
  clearGoBtnStage(stage);
  const num = document.createElement('div');
  num.className = 'go-num';
  num.textContent = goBtnLabel(labelLv);
  stage.appendChild(num);
}

function openGoAnimPreview() {
  const root = $('go-anim-preview');
  const live = $('gap-live-grid');
  const grid = $('gap-grid');
  if (!root || !live || !grid) return;

  live.innerHTML = Array.from({ length: GO_LIVE_MAX }, (_, i) => {
    const n = i + 1;
    const style = goBtnPreviewStyle(n);
    const tag = style === 'basic' ? '기본' : style === 'hyper' ? 'D' : 'C';
    const tagCls = style === 'basic' ? '' : style === 'hyper' ? 'd' : 'c';
    return `
      <div class="gap-live-card">
        <h3>${n}고</h3>
        <span class="gap-tag ${tagCls}">본게임 · ${tag}${style === 'basic' ? '' : ` (${style})`}</span>
        <button type="button" class="choicebtn btn-go gs-simple" onclick="previewGoLevel(${n})">
          <div class="t go-btn-stage" id="gap-live-${n}"></div>
        </button>
        <button type="button" class="gap-replay" onclick="previewGoLevel(${n})">다시 보기</button>
      </div>`;
  }).join('');

  grid.innerHTML = GO_ANIM_CATALOG.map((c) => `
    <div class="gap-card">
      <h3>${c.title}</h3>
      <p>${c.desc}</p>
      <button type="button" class="choicebtn btn-go gs-simple" onclick="previewGoAnim('${c.id}')">
        <div class="t go-btn-stage" id="gap-stage-${c.id}"></div>
      </button>
      <button type="button" class="gap-replay" onclick="previewGoAnim('${c.id}')">다시 보기 · ${c.id}</button>
    </div>`).join('');

  root.classList.add('on');
  root.setAttribute('aria-hidden', 'false');

  for (let n = 1; n <= GO_LIVE_MAX; n++) seedGoBtnStage($(`gap-live-${n}`), 0);
  GO_ANIM_CATALOG.forEach((c) => seedGoBtnStage($(`gap-stage-${c.id}`), 0));
}

async function previewGoLevel(n) {

    seedGoBtnStage(stage, n);
    return;

  await playGoBtnStyle(stage, 0, n, style);
}

async function previewGoLevelAll() {
  for (let n = 1; n <= GO_LIVE_MAX; n++) {

    await new Promise((r) => setTimeout(r, 220));

async function previewGoAnim(style) {

async function previewGoAnimAll() {

}

const SHAKE_SCORE = 100;       // 이 점수 이상일 때만 카메라 쉐이크
const SHAKE_SCORE_HEAVY = 200; // 강한 쉐이크 + 펀치

function maybeShake(score, forceHeavy = false) {
  if (score < SHAKE_SCORE && !forceHeavy) return;
  screenShake(forceHeavy || score >= SHAKE_SCORE_HEAVY);
}

function spawnCoinParticles(n) {
  const box = $('moneybox');
  if (!box) return;
  const r = box.getBoundingClientRect();
  const count = Math.min(8, Math.max(1, n));
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'coin-particle';
    el.textContent = '💰';
    const dx = (Math.random() - 0.5) * 80;
    const dy = -40 - Math.random() * 70;
    el.style.left = (r.left + r.width / 2 + (Math.random() - 0.5) * 20) + 'px';
    el.style.top = (r.top + r.height / 2) + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    document.body.appendChild(el);
    sfxCoin();
    setTimeout(() => el.remove(), 900);
  }
}

function screenShake(heavy = false) {
  document.body.classList.remove('screen-shake');
  void document.body.offsetWidth;
  document.body.classList.add('screen-shake');
  if (heavy) {
    document.body.classList.remove('punch');
    void document.body.offsetWidth;
    document.body.classList.add('punch');
  }
  setTimeout(() => {
    document.body.classList.remove('screen-shake', 'punch');
  }, 450);
}

function chunhyangReact(score, handId) {
  if (!CHUNHYANG_ENABLED) return;
  const tier = juiceTier(handId);
  let mood = '😊', text = '좋은 한 수예요!';
  if (score >= 500 || tier === 'S') {
    mood = '🤩'; text = '어머나!! 진짜 멋져요!!';
  } else if (score >= 200 || tier === 'A') {
    mood = '😲'; text = '와… 세게 나갔네요!';
  } else if (score >= 80 || tier === 'B') {
    mood = '😄'; text = '좋아요, 이 기세로!';
  }
  state.tempReact = { mood, text, expires: Date.now() + 2800 };
  const face = $('ch-face');
  const bubble = $('ch-bubble');
  if (face) face.textContent = mood;
  if (bubble) bubble.textContent = text;
}

function flyScoreToSide(fromEl, toEl, label) {
  return new Promise((resolve) => {
    if (JUICE.skip || !fromEl || !toEl) { resolve(); return; }
    const a = fromEl.getBoundingClientRect();
    const b = toEl.getBoundingClientRect();
    if (a.width < 1 || b.width < 1) { resolve(); return; }

    const ghost = document.createElement('div');
    ghost.className = 'score-fly';
    ghost.textContent = label;
    const fs = parseFloat(getComputedStyle(fromEl).fontSize) || 34;
    const sx = a.left + a.width / 2;
    const sy = a.top + a.height / 2;
    const ex = b.left + b.width / 2;
    const ey = b.top + b.height / 2;
    ghost.style.left = sx + 'px';
    ghost.style.top = sy + 'px';
    ghost.style.fontSize = fs + 'px';
    ghost.style.transform = 'translate(-50%, -50%) scale(1)';
    document.body.appendChild(ghost);
    fromEl.style.transition = 'opacity .2s ease';
    fromEl.style.opacity = '0';

    const dx = ex - sx;
    const dy = ey - sy;

    const finish = () => {
      if (ghost.parentNode) ghost.remove();
      resolve();
    };

    try {
      const anim = ghost.animate([
        { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, filter: 'blur(0px)' },
        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.28)`,
          opacity: 0, filter: 'blur(1.5px)' },
      ], {
        duration: 420,
        easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)',
        fill: 'forwards',
      });
      anim.onfinish = finish;
      anim.oncancel = finish;
      setTimeout(finish, 480);
    } catch (_) {
      ghost.style.transition = 'transform .4s ease, opacity .4s ease';
      void ghost.offsetWidth;
      ghost.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.3)`;
      ghost.style.opacity = '0';
      setTimeout(finish, 420);
    }
  });
}

function pulseScoreLand(el, gaugeEl) {
  if (!el) return;
  el.classList.remove('score-land');
  void el.offsetWidth;
  el.classList.add('score-land');
  if (gaugeEl && gaugeEl.parentElement) {
    gaugeEl.parentElement.classList.add('score-pulse');
    setTimeout(() => gaugeEl.parentElement.classList.remove('score-pulse'), 500);
  }
  setTimeout(() => el.classList.remove('score-land'), 700);
}

function animateNumber(el, from, to, ms, formatter = fmt) {
  return new Promise((resolve) => {
    if (JUICE.skip || ms <= 0 || from === to) {
      el.textContent = formatter(to);
      resolve();
      return;
    }
    const t0 = performance.now();
    const tick = (now) => {
      if (JUICE.skip) { el.textContent = formatter(to); resolve(); return; }
      const p = Math.min(1, (now - t0) / ms);
      const eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
      el.textContent = formatter(Math.round(from + (to - from) * eased));
      if (p < 1) requestAnimationFrame(tick);
      else resolve();
    };
    requestAnimationFrame(tick);
  });
}

function armJuiceSkip() {
  const root = $('juice-root');
  root.classList.add('skipable');
  const handler = () => { JUICE.skip = true; JUICE.onSkip && JUICE.onSkip(); };
  root.addEventListener('click', handler, { once: true });
  const keyHandler = (e) => {
    if (e.code === 'Space' || e.code === 'Enter' || e.code === 'Escape') {
      e.preventDefault();
      JUICE.skip = true;
      JUICE.onSkip && JUICE.onSkip();
      window.removeEventListener('keydown', keyHandler);
    }
  };
  window.addEventListener('keydown', keyHandler);
  return () => {
    root.classList.remove('skipable');
    root.removeEventListener('click', handler);
    window.removeEventListener('keydown', keyHandler);
  };
}

async function flyCardsFromHand(wraps, steps, fromRects) {
  if (!fromRects || JUICE.skip) {
    wraps.forEach((w) => w.classList.add('landed'));
    return;
  }
  sfxPlayLift();
  const pending = [];
  for (let i = 0; i < wraps.length; i++) {
    const w = wraps[i];
    const card = steps[i].card;
    const from = fromRects[card.uid];
    // 래퍼가 아니라 실제 카드 박스으로 — 뱃지/칩 플로트와 무관하게 맞춤
    const toEl = w.querySelector('.card') || w;
    const to = toEl.getBoundingClientRect();
    if (!from || to.width < 1) {
      w.classList.add('landed');
      continue;
    }
    const ghost = document.createElement('div');
    ghost.className = 'play-fly-card';
    ghost.innerHTML = cardHTML(card, { reveal: true });
    ghost.style.left = from.left + 'px';
    ghost.style.top = from.top + 'px';
    ghost.style.width = from.width + 'px';
    ghost.style.height = from.height + 'px';
    ghost.style.transformOrigin = 'center center';
    document.body.appendChild(ghost);

    // 중심점 기준 FLIP + 도착 시 슬롯 크기로 scale (선택 scale·손/슬롯 크기 차이 보정)
    const dx = (to.left + to.width / 2) - (from.left + from.width / 2);
    const dy = (to.top + to.height / 2) - (from.top + from.height / 2);
    const sEnd = to.width / from.width;
    const delay = i * 50;
    pending.push(new Promise((resolve) => {
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        w.classList.add('landed');
        // 한 프레임 겹쳐 두고 제거 → 착지 깜빡임 완화
        requestAnimationFrame(() => {
          if (ghost.parentNode) ghost.remove();
          resolve();
        });
      };
      try {
        const anim = ghost.animate([
          { transform: 'translate(0, 0) scale(1) rotate(0deg)', offset: 0 },
          { transform: `translate(${dx * 0.45}px, ${dy * 0.3 - 36}px) scale(${Math.max(sEnd, 1) * 1.06}) rotate(-5deg)`, offset: 0.4 },
          { transform: `translate(${dx}px, ${dy}px) scale(${sEnd}) rotate(0deg)`, offset: 1 },
        ], {
          duration: 520,
          delay,
          easing: 'cubic-bezier(0.22, 0.9, 0.28, 1)',
          fill: 'forwards',
        });
        anim.onfinish = finish;
        anim.oncancel = finish;
        setTimeout(finish, 520 + delay + 80);
      } catch (_) {
        finish();
      }
    }));
  }
  await Promise.all(pending);
}

async function playJuiceSequence(snap, fromRects = null) {
  if (JUICE.running) return;
  JUICE.running = true;
  JUICE.skip = false;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const disarm = armJuiceSkip();
  const bd = juiceBreakdown(snap);
  const pa = $('playedarea');
  const banner = $('hand-banner');
  const hitTarget = snap.scoreBefore < state.target && state.roundScore >= state.target;
  const bigHand = HANDS.findIndex((h) => h.id === bd.handId) <= 4; // 삼광 이상 (배너 길이용)

  try {
    if (reduce) {
      pa.classList.remove('juice-stage');
      return;
    }

    // 스테이지 세팅 — 카드는 손패에서 날아온 뒤 보임
    pa.classList.remove('play-fade-out');
    pa.classList.add('juice-stage');
    pa.dataset.playSig = '';
    pa.innerHTML = `
      <div id="juice-cards"></div>
      <div id="juice-tally" style="opacity:0">
        <div class="jt-row">
          <span class="jt-chips" id="jt-chips">0</span>
          <span class="jt-times" id="jt-times">×</span>
          <span class="jt-mult" id="jt-mult">${fmtMult(bd.mult)}</span>
          <span class="jt-eq" id="jt-eq">=</span>
          <span class="jt-score" id="jt-score">0</span>
        </div>
      </div>`;
    const cardsEl = $('juice-cards');
    const wraps = bd.steps.map((s) => {
      const w = document.createElement('div');
      w.className = 'juice-card-wrap';
      w.innerHTML = cardHTML(s.card, { reveal: true }) +
        `<div class="chip-float${s.isCore ? '' : ' flat'}">${s.chip > 0 ? '+' + s.chip + '!' : '+0'}</div>`;
      cardsEl.appendChild(w);
      return w;
    });

    // 0) 손패 → 낸 패 영역으로 카드 상승
    await flyCardsFromHand(wraps, bd.steps, fromRects);
    if (JUICE.skip) wraps.forEach((w) => w.classList.add('landed'));

    // 1) 족보 배너 슬램
    const tier = juiceTier(bd.handId);
    const handName = HAND_BY_ID[bd.handId].name;
    const anchor = handBannerAnchor();
    banner.style.left = anchor.cx + 'px';
    banner.style.top = anchor.cy + 'px';
    banner.className = '';
    void banner.offsetWidth;
    banner.textContent = bd.handId === 'none' ? handName : handName + '!';
    banner.className = `tier-${tier} show`;
    sfxBanner(tier);
    await juiceWait(bigHand ? 480 : 340);
    banner.classList.add('hide');
    await juiceWait(160);
    banner.className = '';
    banner.textContent = '';
    banner.style.left = '';
    banner.style.top = '';

    // 집계 UI 페이드 인
    const tally = $('juice-tally');
    if (tally) {
      tally.style.transition = 'opacity .28s ease';
      tally.style.opacity = '1';
    }

    // 2) 카드 칩 순차 가산 (코어 → jt-chips, flat → +jt-flat)
    const chipsEl = $('jt-chips');
    const eqEl = $('jt-eq');
    let chips = 0;
    let flat = 0;
    let flatEl = null;

    const ensureFlatUI = () => {
      if (flatEl || !eqEl) return;
      const plusEl = document.createElement('span');
      plusEl.className = 'jt-plus';
      plusEl.id = 'jt-plus';
      plusEl.textContent = '+';
      flatEl = document.createElement('span');
      flatEl.className = 'jt-flat';
      flatEl.id = 'jt-flat';
      flatEl.textContent = '0';
      eqEl.before(plusEl, flatEl);
    };

    if (bd.handBase > 0) {
      chips = bd.handBase;
      chipsEl.textContent = fmt(chips);
      chipsEl.style.transform = 'scale(1.2)';
      sfxChip();
      await juiceWait(160);
      chipsEl.style.transform = '';
    }

    for (const [i, step] of bd.steps.entries()) {
      if (JUICE.skip) break;
      const w = wraps[i];
      w.classList.add('landed', 'pulse');
      const floater = w.querySelector('.chip-float');
      void floater.offsetWidth;
      floater.classList.add('go');
      sfxChip();
      if (step.isCore) {
        chips += step.chip;
        await animateNumber(chipsEl, chips - step.chip, chips, 120);
      } else {
        ensureFlatUI();
        const from = flat;
        flat += step.chip;
        await animateNumber(flatEl, from, flat, 140);
        flatEl.style.transform = 'scale(1.18)';
        await juiceWait(80);
        flatEl.style.transform = '';
      }
      await juiceWait(200);
      w.classList.remove('pulse');
    }

    if (bd.jokerChips > 0 && !JUICE.skip) {
      ensureFlatUI();
      const from = flat;
      flat += bd.jokerChips;
      await animateNumber(flatEl, from, flat, 180);
      flatEl.style.transform = 'scale(1.18)';
      sfxChip();
      await juiceWait(100);
      flatEl.style.transform = '';
    }

    if (JUICE.skip) {
      wraps.forEach((w) => w.classList.add('landed'));
      chips = bd.handBase + bd.steps.filter((s) => s.isCore).reduce((a, s) => a + s.chip, 0);
      flat = bd.flatSum;
      chipsEl.textContent = fmt(chips);
      if (flat > 0) {
        ensureFlatUI();
        flatEl.textContent = fmt(flat);
      }
      if (tally) tally.style.opacity = '1';
    }

    // 3) 배수 슬램
    $('jt-times').classList.add('on');
    await juiceWait(80);
    const multEl = $('jt-mult');
    multEl.classList.add('slam');
    sfxMult();
    await juiceWait(320);

    // 4) 최종 점수 롤업 → 사이드 착지
    eqEl.classList.add('on');
    const scoreEl = $('jt-score');
    scoreEl.classList.add('on');
    sfxScore();
    const rollMs = Math.min(900, 280 + Math.abs(bd.score) * 1.2);
    await animateNumber(scoreEl, 0, bd.score, rollMs);
    scoreEl.textContent = '+' + fmt(bd.score);
    scoreEl.classList.add('punch');
    chunhyangReact(bd.score, bd.handId);
    maybeShake(bd.score);
    await juiceWait(320);

    const sideScore = $('score-val');
    const gauge = $('gauge-fill');
    const sideFrom = snap.scoreBefore;
    const sideTo = state.roundScore;
    if (tally) tally.classList.add('tally-fade');

    await flyScoreToSide(scoreEl, sideScore, '+' + fmt(bd.score));
    sfxScoreLand();
    pulseScoreLand(sideScore, gauge);

    const landMs = Math.min(520, 260 + Math.abs(bd.score) * 0.85);
    await Promise.all([
      animateNumber(sideScore, sideFrom, sideTo, landMs),
      (async () => {
        const t0 = performance.now();
        await new Promise((resolve) => {
          const tick = (now) => {
            if (JUICE.skip) {
              gauge.style.width = Math.min(100, (sideTo / state.target) * 100) + '%';
              setNeedVal(sideTo);
              resolve(); return;
            }
            const p = Math.min(1, (now - t0) / landMs);
            const eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
            const v = sideFrom + (sideTo - sideFrom) * eased;
            gauge.style.width = Math.min(100, (v / state.target) * 100) + '%';
            setNeedVal(Math.floor(v));
            if (p < 1) requestAnimationFrame(tick); else resolve();
          };
          requestAnimationFrame(tick);
        });
      })(),
    ]);
    setNeedVal(sideTo);
    await juiceWait(120);

    // 5) 목표 돌파
    if (hitTarget) {
      $('gauge').classList.add('overflow');
      gauge.classList.add('overflow');
      gauge.style.width = '100%';
      sfxOverflow();
      await juiceWait(480);
    } else {
      await juiceWait(220);
    }
  } finally {
    disarm();
    banner.className = '';
    banner.textContent = '';
    banner.style.left = '';
    banner.style.top = '';
    JUICE.running = false;
    JUICE.skip = false;
    JUICE.onSkip = null;
  }
}

// ── 시작 ───────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (state.coachStep) renderCoach();
});
boot(); // 첫 방문이면 룰 안내 → 이후 prep (1월 시작 전 훈수 예약)
</script>
