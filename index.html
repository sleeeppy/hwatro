<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>화투로 — 고스톱: 무한의 판</title>
<style>
  :root {
    --felt: #1a4a2e; --felt-dark: #113020;
    --panel: rgba(0,0,0,.34); --panel-line: rgba(255,255,255,.12);
    --ink: #1f2937; --red: #c0392b; --gold: #d4af37; --gold-soft: #e8cd7a;
    --chip-blue: #60a5fa; --mult-red: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: radial-gradient(ellipse at 50% 20%, var(--felt), var(--felt-dark) 75%);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #f1f5f9; overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; }
  button:disabled { opacity: .38; cursor: not-allowed; }

  /* ── 상단바 ─────────────────────────── */
  #topbar {
    display: flex; align-items: center; gap: 14px; padding: 10px 16px;
    background: rgba(0,0,0,.35); border-bottom: 1px solid var(--panel-line);
    flex-wrap: wrap; position: relative; z-index: 40;
  }
  #logo { font-weight: 900; font-size: 20px; color: var(--gold-soft); letter-spacing: 1px; white-space: nowrap; }
  #logo small { display: block; font-size: 11px; font-weight: 400; color: #cbd5e1; letter-spacing: 2px; }
  #jokerbar { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
  .jokerslot {
    width: 140px; min-height: 50px; border-radius: 9px; padding: 9px;
    background: rgba(255,255,255,.07); border: 1px dashed rgba(255,255,255,.22);
    font-size: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
  .jokerslot.filled {
    position: relative;
    border: 1px solid var(--gold); background: linear-gradient(160deg, #3b2f14, #241c0b);
    color: #fde68a; display: block; cursor: help;
  }
  .jokerslot .jname { font-weight: 800; font-size: 14px; }
  .jokerslot .jdesc { font-size: 11px; color: #d6c58a; margin-top: 2px; line-height: 1.35; }
  .jokerslot.filled .jtip {
    display: none; position: absolute; left: 50%; top: calc(100% + 8px);
    transform: translateX(-50%); z-index: 130; pointer-events: none;
    width: max-content; max-width: 230px; padding: 8px 10px; border-radius: 8px;
    background: #0f172a; border: 1px solid rgba(212,175,55,.55);
    box-shadow: 0 10px 24px rgba(0,0,0,.5);
    font-size: 11px; font-weight: 500; color: #e2e8f0; line-height: 1.4; text-align: left;
  }
  .jokerslot.filled .jtip::after {
    content: ''; position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%);
    border: 6px solid transparent; border-bottom-color: rgba(212,175,55,.55);
  }
  @media (hover: hover) {
    .jokerslot.filled:hover .jtip { display: block; }
  }

  /* ── 모바일 특수패 팝업 ─────────────── */
  #joker-pop-overlay {
    position: fixed; inset: 0; z-index: 55;
    display: none; align-items: center; justify-content: center;
    padding: 18px; background: rgba(0,0,0,.58);
  }
  #joker-pop-overlay.show { display: flex; }
  .joker-pop-card {
    width: min(320px, 92vw); border-radius: 16px; padding: 20px 18px 16px;
    background: linear-gradient(170deg, #2a2410, #1a1508);
    border: 1.5px solid rgba(212,175,55,.55);
    box-shadow: 0 18px 48px rgba(0,0,0,.55);
    text-align: center;
  }
  .joker-pop-card .jp-icon { font-size: 40px; line-height: 1; margin-bottom: 8px; }
  .joker-pop-card .jp-name { font-size: 18px; font-weight: 900; color: #fde68a; margin-bottom: 8px; }
  .joker-pop-card .jp-meta {
    display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .joker-pop-card .jp-desc {
    font-size: 13.5px; color: #e2e8f0; line-height: 1.55; text-align: left;
    padding: 10px 12px; border-radius: 10px; background: rgba(0,0,0,.28);
    border: 1px solid rgba(255,255,255,.1);
  }
  .joker-pop-card .jp-close {
    margin-top: 14px; width: 100%; padding: 11px;
    background: rgba(255,255,255,.12); color: #f8fafc;
    font-size: 14px; font-weight: 800; border-radius: 10px; border: 1px solid rgba(255,255,255,.18);
  }
  #moneybox { font-size: 19px; font-weight: 800; color: #fbbf24; white-space: nowrap; }
  #moneybox .delta { font-size: 13px; color: #a3e635; }
  #top-help, #top-tutor {
    display: none; flex-shrink: 0;
    background: rgba(255,255,255,.14); color: #e2e8f0;
    padding: 7px 10px; font-size: 13px; font-weight: 800; border-radius: 8px;
  }

  /* ── 본문 레이아웃 ───────────────────── */
  #main { display: flex; gap: 16px; padding: 16px 18px 34px; align-items: flex-start; flex-wrap: wrap; }
  #side {
    width: 280px; min-width: 260px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel { background: var(--panel); border: 1px solid var(--panel-line); border-radius: 12px; padding: 14px; }
  #table { flex: 1; min-width: 360px; display: flex; flex-direction: column; gap: 14px; }

  #roundpanel {
    border-radius: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,.12);
    transition: background .35s ease, border-color .35s ease;
  }
  #roundpanel.day {
    background: linear-gradient(145deg, rgba(250,204,21,.14), rgba(255,255,255,.06) 45%, rgba(0,0,0,.12));
    border-color: rgba(253,224,71,.28);
  }
  #roundpanel.night {
    background: linear-gradient(145deg, rgba(59,130,246,.16), rgba(30,58,138,.18) 50%, rgba(0,0,0,.16));
    border-color: rgba(147,197,253,.28);
  }
  #roundlabel { font-size: 17px; font-weight: 900; color: #f8fafc; letter-spacing: -0.2px; }
  #roundlabel .bak { color: #fca5a5; }
  #roundlabel .round-meta { color: #94a3b8; font-size: 12px; font-weight: 700; margin-left: 4px; }
  #seasonline { font-size: 12.5px; color: #cbd5e1; margin-top: 6px; line-height: 1.55; }
  #seasonline b { color: #fde68a; }
  #bossbanner {
    border: 1px solid rgba(252,165,165,.5); background: rgba(127,29,29,.45);
    border-radius: 10px; padding: 8px 10px; font-size: 11.5px; line-height: 1.45; color: #fecaca;
  }
  #bossbanner b { color: #fee2e2; }
  #bossbanner .nullified { color: #86efac; font-weight: 700; }

  .statline { display: flex; justify-content: space-between; font-size: 14px; margin: 3px 0; color: #cbd5e1; }
  .statline b { color: #fff; font-size: 16px; }
  #target-val { color: var(--gold-soft); font-size: 19px; }
  #score-val { color: #93c5fd; font-size: 19px; }
  .score-frac { font-variant-numeric: tabular-nums; }
  .score-slash { color: #64748b; font-weight: 800; }
  #need-val { color: #fca5a5; font-size: 16px; }
  #need-val.done { color: #86efac; }
  #gauge { height: 12px; border-radius: 6px; background: rgba(0,0,0,.5); overflow: hidden; margin: 6px 0 12px; }
  #gauge > div { height: 100%; background: linear-gradient(90deg, #38bdf8, #a3e635); transition: width .35s ease; }
  .golevel { font-size: 11.5px; color: #fbbf24; margin-top: 4px; font-weight: 700; }

  #previewbox { min-height: 110px; }
  #previewbox .pv-hand {
    font-weight: 900; font-size: 16px; color: var(--gold-soft);
    margin-bottom: 8px;
  }
  #previewbox .pv-boxes {
    display: grid; grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 4px; align-items: stretch; margin-bottom: 8px;
  }
  #previewbox .pv-box {
    border-radius: 9px; padding: 7px 6px; text-align: center;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(0,0,0,.22);
    min-width: 0;
  }
  #previewbox .pv-box .lbl {
    display: block; font-size: 9px; font-weight: 700; color: #94a3b8;
    letter-spacing: 0.02em; margin-bottom: 2px;
  }
  #previewbox .pv-box .val {
    display: block; font-size: 18px; font-weight: 900; font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  #previewbox .pv-box.chips .val { color: var(--chip-blue); }
  #previewbox .pv-box.mult .val { color: var(--mult-red); }
  #previewbox .pv-box.flat .val { color: #cbd5e1; }
  #previewbox .pv-box.flat.off { opacity: .45; }
  #previewbox .pv-op {
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: #64748b; padding: 0 1px;
  }
  #previewbox .pv-total {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px; padding: 8px 10px; border-radius: 9px;
    background: linear-gradient(90deg, rgba(255,255,255,.06), rgba(147,197,253,.1));
    border: 1px solid rgba(147,197,253,.25);
  }
  #previewbox .pv-total .tl { font-size: 11px; font-weight: 700; color: #94a3b8; }
  #previewbox .pv-total .tv { font-size: 24px; font-weight: 900; color: #fff; }
  #previewbox .pv-empty { font-size: 11.5px; color: #94a3b8; line-height: 1.5; }

  #playlog { font-size: 11px; color: #cbd5e1; }
  #playlog div { display: flex; justify-content: space-between; padding: 1.5px 0; }
  #playlog .lognum { color: #64748b; }

  /* ── 낸 패 / 손패 ────────────────────── */
  #playedarea {
    min-height: 180px; border-radius: 12px; border: 1px dashed rgba(255,255,255,.16);
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 14px; flex-wrap: wrap; position: relative;
    transition: opacity .42s ease, transform .42s ease;
  }
  #playedarea.play-fade-out {
    opacity: 0; transform: translateY(-10px) scale(.97); pointer-events: none;
  }
  #playedarea .hint { color: rgba(255,255,255,.35); font-size: 14px; }
  #playresult { text-align: center; width: 100%; }
  #playresult .r-hand { font-size: 17px; font-weight: 900; color: var(--gold-soft); }
  #playresult .r-formula { font-size: 15px; color: #e2e8f0; }
  #playresult .r-formula .c { color: var(--chip-blue); font-weight: 800; }
  #playresult .r-formula .m { color: var(--mult-red); font-weight: 800; }
  #playresult .r-score { font-size: 30px; font-weight: 900; color: #fff; }
  /* pop 애니 제거: 카드 선택 시 render가 DOM을 다시 그리며 반복 재생되던 버그 방지 */

  #handarea { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; min-height: 140px; }
  #jan-aura-hint {
    text-align: center; font-size: 12px; font-weight: 700; color: #bef264;
    margin: 0 0 8px; text-shadow: 0 1px 0 rgba(0,0,0,.35);
  }
  #jan-aura-hint.junk { color: #fca5a5; }
  #jan-aura-hint[hidden] { display: none !important; }
  /* 내기 추천 — 연두 글로우 + 우상단 ✦ */
  #handarea .card.coach-aura:not(.sel) {
    box-shadow:
      0 3px 8px rgba(0,0,0,.45),
      0 0 12px rgba(163, 230, 53, .7),
      inset 0 0 0 2.5px rgba(192,57,43,.85),
      inset 0 0 0 4px rgba(255,255,255,.6);
    animation: coachAuraPulse 1.5s ease-in-out infinite;
    z-index: 2;
  }
  #handarea .card.kwang.coach-aura:not(.sel) {
    box-shadow:
      0 3px 8px rgba(0,0,0,.45),
      0 0 12px rgba(163, 230, 53, .7),
      inset 0 0 0 2.5px var(--gold),
      inset 0 0 0 4px rgba(255,255,255,.6);
  }
  #handarea .card.coach-aura:not(.sel)::before {
    content: '✦';
    position: absolute;
    top: -7px; right: -7px;
    z-index: 4;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900; line-height: 1;
    color: #14532d;
    background: radial-gradient(circle at 40% 35%, #ecfccb, #a3e635);
    border: 1.5px solid #65a30d;
    box-shadow: 0 0 8px rgba(163, 230, 53, .85);
    pointer-events: none;
    animation: coachSpark 1.5s ease-in-out infinite;
  }
  /* 버리기 추천 — 빨간 글로우 + 우상단 ↓ */
  #handarea .card.coach-aura-junk:not(.sel) {
    box-shadow:
      0 3px 8px rgba(0,0,0,.45),
      0 0 12px rgba(248, 113, 113, .75),
      inset 0 0 0 2.5px rgba(185, 28, 28, .9),
      inset 0 0 0 4px rgba(255,255,255,.55);
    animation: coachAuraPulse 1.5s ease-in-out infinite;
    z-index: 2;
  }
  #handarea .card.kwang.coach-aura-junk:not(.sel) {
    box-shadow:
      0 3px 8px rgba(0,0,0,.45),
      0 0 12px rgba(248, 113, 113, .75),
      inset 0 0 0 2.5px #dc2626,
      inset 0 0 0 4px rgba(255,255,255,.55);
  }
  #handarea .card.coach-aura-junk:not(.sel)::before {
    content: '↓';
    position: absolute;
    top: -7px; right: -7px;
    z-index: 4;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; line-height: 1;
    color: #fff;
    background: radial-gradient(circle at 40% 35%, #fecaca, #ef4444);
    border: 1.5px solid #b91c1c;
    box-shadow: 0 0 8px rgba(248, 113, 113, .9);
    pointer-events: none;
    animation: coachSpark 1.5s ease-in-out infinite;
  }
  @keyframes coachAuraPulse {
    0%,100% { filter: brightness(1.02) saturate(1.08); }
    50% { filter: brightness(1.1) saturate(1.25); }
  }
  @keyframes coachSpark {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  /* Balatro식 스포트라이트 코치 */
  #coach-root {
    display: none; position: fixed; inset: 0; z-index: 85;
    pointer-events: none;
  }
  #coach-root.on { display: block; }
  #coach-root .coach-block {
    position: fixed; background: rgba(0,0,0,.72); pointer-events: auto;
  }
  #coach-root .coach-ring {
    position: fixed; pointer-events: none;
    border: 2px solid rgba(253,224,71,.9);
    border-radius: 14px;
    box-shadow: 0 0 0 2px rgba(0,0,0,.25), 0 0 28px rgba(250,204,21,.45);
  }
  #coach-root .coach-panel {
    position: fixed; pointer-events: auto; z-index: 2;
    max-width: min(340px, calc(100vw - 28px));
    background: linear-gradient(165deg, #1e3a2a, #122018);
    border: 1.5px solid var(--gold);
    border-radius: 14px; padding: 14px 16px 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,.55);
    color: #e2e8f0; font-size: 13.5px; line-height: 1.5; font-weight: 600;
  }
  #coach-root .coach-panel b { color: #fde68a; }
  #coach-root .coach-panel .coach-title {
    font-size: 14px; font-weight: 900; color: #fef3c7; margin-bottom: 6px;
  }
  #coach-root .coach-actions {
    display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
  }
  #coach-root .coach-actions button {
    border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 800; cursor: pointer;
  }
  #coach-root .coach-next {
    background: linear-gradient(180deg, #d97706, #b45309); color: #fff;
    border: none;
  }
  #coach-root .coach-skip {
    background: rgba(255,255,255,.08); color: #cbd5e1;
    border: 1px solid rgba(255,255,255,.18);
  }

  #actions { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; }
  #deckbox {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 14px; border-radius: 999px;
    background: rgba(0,0,0,.28); border: 1px solid rgba(255,255,255,.14);
    font-size: 14px; font-weight: 800; color: #e2e8f0;
    white-space: nowrap; user-select: none;
  }
  #deckbox .deck-ico { font-size: 15px; opacity: .9; }
  #deckbox b { color: #fde68a; font-variant-numeric: tabular-nums; }
  .bigbtn { padding: 14px 28px; font-size: 17px; font-weight: 900; border-radius: 10px; box-shadow: 0 3px 0 rgba(0,0,0,.4); }
  #btn-play { background: linear-gradient(180deg, #dc2626, #991b1b); color: #fff; }
  #btn-discard { background: linear-gradient(180deg, #2563eb, #1e40af); color: #fff; }
  @media (min-width: 721px) {
    #btn-play, #btn-discard { width: 210px; box-sizing: border-box; }
  }
  #btn-gukjin { background: linear-gradient(180deg, #7c3aed, #5b21b6); color: #fff; padding: 10px 16px; font-size: 13px; font-weight: 800; display: none; }
  #btn-gukjin.on { display: inline-block; }
  .smallbtn { background: rgba(255,255,255,.14); color: #e2e8f0; padding: 7px 12px; font-size: 12px; font-weight: 700; }

  /* ── 카드 ────────────────────────────── */
  .card {
    width: 80px; height: 122px;
    background: linear-gradient(160deg, #fffbef, #f5ecd4);
    border-radius: 8px; border: 1.5px solid rgba(0,0,0,.55);
    box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 0 0 2.5px rgba(192,57,43,.85), inset 0 0 0 4px rgba(255,255,255,.6);
    position: relative; display: flex; flex-direction: column; align-items: center;
    padding: 7px 5px 6px; color: var(--ink); user-select: none; cursor: pointer;
    transition: transform .13s ease, box-shadow .13s ease; flex-shrink: 0;
  }
  .card:hover { transform: translateY(-5px); }
  /* 선택 — 위로 들림이 본체, 하늘색은 얇은 테두리만 */
  .card.sel {
    transform: translateY(-18px) scale(1.03);
    box-shadow:
      0 14px 18px rgba(0,0,0,.42),
      0 0 0 2px #38bdf8,
      inset 0 0 0 2.5px rgba(192,57,43,.85),
      inset 0 0 0 4px rgba(255,255,255,.55);
  }
  .card.static { cursor: default; }
  .card.static:hover { transform: none; }
  .card .month { font-size: 13px; font-weight: 800; line-height: 1; color: var(--red); align-self: flex-start; margin-left: 2px; }
  .card .mname { font-size: 10px; color: #8a6d3b; align-self: flex-start; margin: 1px 0 0 2px; letter-spacing: -0.5px; }
  .card .art { font-size: 30px; line-height: 1; margin-top: 8px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
  .card .tag { position: absolute; bottom: 5px; left: 5px; right: 5px; font-size: 10px; font-weight: 700; text-align: center; border-radius: 4px; padding: 2px 0; letter-spacing: .5px; }
  .card.kwang { background: linear-gradient(160deg, #fff8dc, #f3e5ab); box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 0 0 2.5px var(--gold), inset 0 0 0 4px rgba(255,255,255,.6); }
  .card.kwang.sel {
    box-shadow:
      0 14px 18px rgba(0,0,0,.42),
      0 0 0 2px #7dd3fc,
      inset 0 0 0 2.5px var(--gold),
      inset 0 0 0 4px rgba(255,255,255,.55);
  }
  .card.kwang .gwangmark {
    margin-top: 3px; width: 32px; height: 32px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe98a, var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 900; color: #7c2d12; box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .card.kwang .art { font-size: 25px; }
  .card.kwang .tag { background: var(--gold); color: #5c3a00; }
  .card.kwang.rain .tag { background: #475569; color: #dbeafe; }
  .card.yeol .tag { background: #b45309; color: #fef3c7; }
  .card.tti .ribbon {
    margin-top: 5px; width: 17px; height: 50px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    writing-mode: vertical-rl; font-size: 10px; font-weight: 700; box-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .card.tti.hongdan .ribbon { background: #c0392b; color: #fff; }
  .card.tti.cheongdan .ribbon { background: #1e40af; color: #fff; }
  .card.tti.chodan .ribbon { background: #c0392b; color: #c0392b; }
  .card.tti.bi_tti .ribbon { background: #6b21a8; color: #fff; }
  .card.tti .tag { background: #7f1d1d; color: #fecaca; }
  .card.tti.cheongdan .tag { background: #1e3a8a; color: #bfdbfe; }
  .card.pi .tag { background: #e5e7eb; color: #4b5563; }
  .card.ssangpi .tag { background: #7c3aed; color: #ede9fe; }
  .card .chipbadge {
    position: absolute; top: 3px; right: 3px; font-size: 10px; font-weight: 800;
    background: rgba(37,99,235,.14); color: #1d4ed8; border-radius: 4px; padding: 1px 3px;
  }
  .card.facedown {
    background: repeating-linear-gradient(135deg, #7f1d1d 0 8px, #991b1b 8px 16px);
    box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 0 0 2.5px rgba(0,0,0,.4);
  }
  .card.facedown .back-q { margin: auto; font-size: 30px; color: rgba(255,255,255,.75); font-weight: 900; }
  .gukjin-mode {

  .score-fly {

  #juice-tally.tally-fade {

  #hand-banner {
    position: fixed; left: 50%; top: 28vh; transform: translate(-50%, -50%) scale(.3);
    z-index: 60; font-size: clamp(26px, 5.5vw, 48px); font-weight: 900;
    letter-spacing: 2px; opacity: 0; pointer-events: none; white-space: nowrap;

  }
  #hand-banner.hide {

  }
  @keyframes bannerSlam {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(2.2) rotate(-4deg); filter: blur(4px); }
    55% { opacity: 1; transform: translate(-50%, -50%) scale(1.08) rotate(1deg); filter: blur(0); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
  }
  @keyframes bannerOut {
    to { opacity: 0; transform: translate(-50%, -70%) scale(1.1); }
  }
  #hand-banner.tier-S { color: #fde68a; text-shadow: 0 0 28px rgba(251,191,36,.7), 0 4px 0 #78350f; }
  #hand-banner.tier-A { color: #fca5a5; text-shadow: 0 0 24px rgba(248,113,113,.55), 0 4px 0 #7f1d1d; }
  #hand-banner.tier-B { color: #fdba74; text-shadow: 0 0 20px rgba(251,146,60,.45), 0 3px 0 #9a3412; }
  #hand-banner.tier-C { color: #93c5fd; text-shadow: 0 0 16px rgba(96,165,250,.4), 0 3px 0 #1e3a8a; }
  #hand-banner.tier-D { color: #cbd5e1; text-shadow: 0 2px 0 #334155; }

  /* ── 밀치기 고 하이퍼버닝 연출 ─────────── */
  #go-cascade {
    position: fixed; inset: 0; z-index: 72; display: none;
    align-items: center; justify-content: center;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 45%, rgba(120,40,10,.45), transparent 62%);
  }
  #go-cascade.on { display: flex; }
  #go-cascade .go-stage {
    position: relative; width: min(92vw, 420px); height: 160px;
  }
  #go-cascade .go-num {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-weight: 900; font-variant-numeric: tabular-nums;
    color: #fff7ed; letter-spacing: -0.04em; white-space: nowrap;
    text-shadow:
      0 0 24px rgba(251,191,36,.85),
      0 0 48px rgba(239,68,68,.55),
      0 6px 0 #7c2d12,
      0 10px 24px rgba(0,0,0,.55);
    will-change: transform, opacity, filter;
  }
  #go-cascade .go-num.slam { animation: goSlamIn .42s cubic-bezier(.15,1.55,.35,1) forwards; }
  #go-cascade .go-num.push-out { animation: goPushOut .32s ease-in forwards; }
  #go-cascade .go-shard {
    position: absolute; left: 50%; top: 50%;
    font-weight: 900; color: #fde68a; pointer-events: none;
    text-shadow: 0 0 12px rgba(251,191,36,.8);
    animation: goShardFly .55s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes goSlamIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(2.6) rotate(8deg); filter: blur(8px) brightness(2); }
    55% { opacity: 1; transform: translate(-50%, -50%) scale(.9) rotate(-2deg); filter: blur(0) brightness(1.3); }
    78% { transform: translate(-50%, -50%) scale(1.14) rotate(1deg); filter: brightness(1.1); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); filter: brightness(1); }
  }
  @keyframes goPushOut {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); filter: brightness(1.4); }
    100% { opacity: 0; transform: translate(-130%, -60%) scale(.35) rotate(-18deg); filter: brightness(2.2) blur(1px); }
  }
  @keyframes goShardFly {
    0% { opacity: 1; transform: translate(-50%, -50%) rotate(0) scale(1); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) rotate(var(--rot)) scale(.25); }
  }
  /* 고 버튼 안 숫자 — 공통 + 프리뷰 연출들 (전체 ease-out) */
  .choicebtn.btn-go.gs-simple { overflow: visible; position: relative; }
  .choicebtn.btn-go.go-btn-juice {
    animation: goBtnJuicePulse .34s cubic-bezier(.16,1,.3,1);
  }
  @keyframes goBtnJuicePulse {
    0% { filter: brightness(1.35); transform: scale(1.03); }
    100% { filter: brightness(1); transform: scale(1); }
  }
  .choicebtn.btn-go .go-btn-stage {
    position: relative;
    display: block;
    width: 100%;
    height: 1.7em;
    margin: 0 auto;
    overflow: visible;
    text-align: center;
  }
  .choicebtn.btn-go .go-btn-stage .go-num {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    font-weight: 900; font-size: 1.65em; letter-spacing: -0.03em;
    color: #fffef5; white-space: nowrap; line-height: 1;
    text-align: center;
    text-shadow: 0 1px 0 rgba(127,29,29,.65), 0 0 12px rgba(254,240,138,.5);
    will-change: transform, opacity, filter;
    pointer-events: none;
  }
  .choicebtn.btn-go .go-impact {
    position: absolute; left: 50%; top: 50%;
    width: 18px; height: 18px; margin: -9px 0 0 -9px;
    border: 2px solid rgba(254,240,138,.85);

  }
  @keyframes goImpactRing {
    0% { transform: scale(.4); opacity: .95; }
    100% { transform: scale(4.2); opacity: 0; }

  .choicebtn.btn-go .go-spark {
    position: absolute; left: 50%; top: 50%;

  @keyframes goSparkFly {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(0); opacity: 0; }
  }

  /* A 룰렛+ */
  .choicebtn.btn-go .go-roulette {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.02em; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    font-weight: 900; font-size: 1.65em; letter-spacing: -0.04em;

    text-shadow: 0 1px 0 rgba(127,29,29,.65), 0 0 12px rgba(254,240,138,.5);
    pointer-events: none;
  }
  .choicebtn.btn-go .go-roulette.spinning .gr-slot {
    filter: blur(1.2px) brightness(1.3);
  }
  .choicebtn.btn-go .go-roulette.settle {
    animation: goRouletteSettle .4s cubic-bezier(.16,1,.3,1);
  }
  @keyframes goRouletteSettle {
    0% { transform: translate(-50%, -50%) scale(1.14); filter: brightness(1.45); }
    100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
  }
  .choicebtn.btn-go .go-roulette .gr-slot {
    display: inline-block; height: 1.1em; width: 0.78em;
    overflow: hidden; position: relative; vertical-align: middle;
    mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);

  .choicebtn.btn-go .go-roulette .gr-strip {
    display: flex; flex-direction: column; align-items: center;
    will-change: transform;

  .choicebtn.btn-go .go-roulette .gr-strip span {
    height: 1.1em; line-height: 1.1em; font-variant-numeric: tabular-nums;
  }

  /* B 펀치+ */
  .choicebtn.btn-go .go-num.punch {
    animation: goBtnPunch .32s cubic-bezier(.16,1,.3,1) forwards;
  }
  .choicebtn.btn-go .go-num.punch-final {
    animation: goBtnPunchFinal .45s cubic-bezier(.16,1,.3,1) forwards;
    color: #fef08a;
  }
  @keyframes goBtnPunch {
    0% { transform: translate(-50%, -50%) scale(.4); opacity: .25; filter: brightness(2); }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: brightness(1); }
  }
  @keyframes goBtnPunchFinal {
    0% { transform: translate(-50%, -50%) scale(.25); opacity: 0; filter: brightness(2.2); }
    100% { transform: translate(-50%, -50%) scale(1.06); opacity: 1; filter: brightness(1.12); }
  }

  /* C 옆 밀치기+ — 빌드업은 부드러운 플로우, 최종만 임팩트 */
  .choicebtn.btn-go .go-num.slide-in {
    animation: goBtnSlideIn .48s cubic-bezier(.65,0,.35,1) forwards;
  }
  .choicebtn.btn-go .go-num.slide-flow-in {
    animation: goBtnSlideFlowIn .36s cubic-bezier(.4,.02,.2,1) forwards;
  }
  .choicebtn.btn-go .go-num.slide-flow-in-sticky {
    animation: goBtnSlideFlowInSticky .58s cubic-bezier(.34,.08,.18,1.12) forwards;
  }
  .choicebtn.btn-go .go-num.slide-out {
    animation: goBtnSlideOut .39s cubic-bezier(.65,0,.35,1) forwards;
  }
  .choicebtn.btn-go .go-num.slide-flow-out {
    animation: goBtnSlideFlowOut .36s cubic-bezier(.4,.02,.2,1) forwards;
  }
  .choicebtn.btn-go .go-num.slide-flow-out-sticky {
    animation: goBtnSlideFlowOutSticky .58s cubic-bezier(.34,.08,.18,1.05) forwards;
  }
  .choicebtn.btn-go .go-num.slide-out-blast {
    animation: goBtnSlideOutBlast .45s cubic-bezier(.65,0,.35,1) forwards;
  }
  .choicebtn.btn-go .go-num.slide-in-epic {
    animation: goBtnSlideInEpic .72s cubic-bezier(.65,0,.35,1) forwards;
    color: #fef08a;
  }
  .choicebtn.btn-go .go-num.slide-fake {
    animation: goBtnSlideFake .55s cubic-bezier(.65,0,.35,1) forwards;
    color: #fef08a;
  }
  .choicebtn.btn-go .go-num.slide-doubt {
    animation: goBtnSlideDoubt .5s cubic-bezier(.65,0,.35,1) forwards;
  }
  @keyframes goBtnSlideIn {
    0% { opacity: 0; transform: translate(55%, -50%) scale(1.04); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes goBtnSlideOut {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-145%, -50%) scale(.92); }
  }
  /* 빌드업: 짧게 겹치며 흐르듯 (스큐·블러·회전 없음) */
  @keyframes goBtnSlideFlowIn {
    0% { opacity: 0; transform: translate(28%, -50%); }
    100% { opacity: 1; transform: translate(-50%, -50%); }
  }
  @keyframes goBtnSlideFlowOut {
    0% { opacity: 1; transform: translate(-50%, -50%); }
    100% { opacity: 0; transform: translate(-128%, -50%); }
  }
  @keyframes goBtnSlideFlowInSticky {
    0% { opacity: 0; transform: translate(42%, -50%) scale(1.04); }
    70% { opacity: 1; transform: translate(-52%, -50%) scale(1.06); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes goBtnSlideFlowOutSticky {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-118%, -50%) scale(.94); }
  }
  @keyframes goBtnSlideOutBlast {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.4); }
    35% { opacity: 1; transform: translate(-35%, -50%) scale(1.12) skewX(4deg); }
    100% { opacity: 0; transform: translate(-210%, -50%) scale(.55) rotate(-14deg); filter: blur(2px) brightness(2); }
  }
  @keyframes goBtnSlideInEpic {
    0% {
      opacity: 0;
      transform: translate(100%, -50%) scale(1.35);
      filter: blur(2px) brightness(2);
    }
    60% {
      opacity: 1;
      transform: translate(-52%, -50%) scale(1.12);
      filter: blur(0) brightness(1.35);
    }
    100% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.06);
      filter: brightness(1.12);
    }
  }
  @keyframes goBtnSlideFake {
    0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
    40% { transform: translate(-50%, -50%) scale(1.12); filter: brightness(1.35); }
    100% { transform: translate(-50%, -50%) scale(1.04); filter: brightness(1.1); }
  }
  @keyframes goBtnSlideDoubt {
    0%,100% { transform: translate(-50%, -50%) scale(1.04); }
    25% { transform: translate(-54%, -50%) scale(1.02) rotate(-2deg); filter: brightness(.85); }
    50% { transform: translate(-46%, -50%) scale(1.08) rotate(2deg); filter: brightness(1.3); }
    75% { transform: translate(-52%, -50%) scale(.98) rotate(-1deg); }
  }

  /* D 하이퍼번 */

  .choicebtn.btn-go .go-num.hyper-final {
    animation: goBtnHyperFinal .48s cubic-bezier(.16,1,.3,1) forwards;
    color: #fef08a;

  @keyframes goBtnHyper {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(1.65); filter: brightness(2) contrast(1.3); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: brightness(1.15); }
  }
  @keyframes goBtnHyperFinal {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(2.1); filter: brightness(2.6); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); filter: brightness(1.15); }
  }

  /* E 임팩트 슬램 */

  }
  @keyframes goBtnSlamDrop {
    0% { opacity: 0; transform: translate(-50%, -160%) scale(1.45); filter: blur(2px); }

  }

  .choicebtn.btn-go .go-num.assemble {
    animation: goBtnAssemble .4s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes goBtnAssemble {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.85);
      filter: blur(5px) brightness(1.8);

    100% {

    }

  .choicebtn.btn-go .go-mini-shard {

  @keyframes goMiniShard {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(.35) rotate(var(--rot)); }
  }

  /* G 열기 상승 */
  .choicebtn.btn-go .go-num.heat {
    animation: goBtnHeatIn .32s cubic-bezier(.16,1,.3,1) forwards;

  @keyframes goHeatFlame {

    100% { opacity: 0; transform: translate(calc(-50% + var(--fx)), -28px) scale(1.15); }

    animation: goBtnStackIn .34s cubic-bezier(.16,1,.3,1) forwards;
  }
  .choicebtn.btn-go .go-num.stack-out {
    animation: goBtnStackOut .26s cubic-bezier(.4,0,.7,.2) forwards;

  #gauge.overflow { box-shadow: 0 0 0 2px #fde68a, 0 0 18px rgba(250,204,21,.75); }
  #gauge-fill.overflow {
    background: linear-gradient(90deg, #fbbf24, #f472b6, #a3e635) !important;
    animation: gaugeFlash .55s ease;
  }
  @keyframes gaugeFlash {
    0%,100% { filter: brightness(1); }
    40% { filter: brightness(1.7); }
  }
  .coin-particle {
    position: fixed; z-index: 70; font-size: 16px; pointer-events: none;
    animation: coinFly .85s ease forwards;
  }
  @keyframes coinFly {
    0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(.4) rotate(120deg); }
  }
  #juice-skip-hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 61; font-size: 11px; color: rgba(255,255,255,.45); opacity: 0;
    transition: opacity .3s; pointer-events: none;
  }
  #juice-root.skipable #juice-skip-hint { opacity: 1; }

  /* 버리기 — 손패에서 그대로 날아감 (박스/텍스트 없음) */
  .card.discarding {
    animation: discardOut .48s cubic-bezier(.4,0,.6,1) forwards;
    pointer-events: none; z-index: 5;
  }
  .card.discarding:nth-child(n) { animation-delay: calc(var(--dd, 0) * 45ms); }
  @keyframes discardOut {
    0% { transform: translateY(0) rotate(0) scale(1); opacity: 1; filter: grayscale(0); }
    100% { transform: translateY(-90px) rotate(22deg) scale(.5); opacity: 0; filter: grayscale(.85); }
  }
  #handarea .card.deal-in {
    animation: dealIn .4s cubic-bezier(.2,1.25,.35,1) both;
    pointer-events: none;
  }
  #handarea.sorting .card { pointer-events: none; }
  @keyframes dealIn {
    0% { transform: translate(-18px, -36px) scale(.55) rotate(-10deg); opacity: 0; filter: brightness(.7); }
    70% { opacity: 1; }
    100% { transform: translate(0, 0) scale(1) rotate(0); opacity: 1; filter: brightness(1); }
  }

  /* ── 모바일 / 플레이 가능 레이아웃 ───────────────── */
  @media (max-width: 720px) {
    html, body { height: auto; min-height: 100%; }
    body { padding-bottom: env(safe-area-inset-bottom, 0px); }
    button, .card { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    #topbar {
      gap: 6px; padding: 6px 8px;
      align-items: center; position: sticky; top: 0; z-index: 42;
      background: rgba(10, 28, 18, .94); backdrop-filter: blur(8px);
    }
    #logo { font-size: 13px; line-height: 1.15; flex-shrink: 0; }
    #logo small { display: none; }
    #jokerbar {
      order: 0; flex: 1 1 auto; min-width: 0;
      gap: 4px; flex-wrap: nowrap; overflow-x: auto;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      justify-content: flex-end;
    }
    #jokerbar::-webkit-scrollbar { display: none; }
    .jokerslot {
      width: 36px; min-width: 36px; min-height: 32px;
      padding: 4px 2px; font-size: 0; flex-shrink: 0;
      border-radius: 8px;
    }
    .jokerslot:not(.filled)::before {
      content: '＋'; font-size: 14px; color: #64748b; font-weight: 700;
    }
    .jokerslot.filled {
      width: auto; min-width: 56px; max-width: 88px; padding: 5px 7px;
    }
    .jokerslot .jname {
      font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .jokerslot .jdesc { display: none; }
    .jokerslot.filled .jtip {
      left: auto; right: 0; transform: none; max-width: min(220px, 72vw);
      top: calc(100% + 6px);
    }
    #moneybox { font-size: 13px; margin-left: 0; flex-shrink: 0; }
    #top-help, #top-tutor { display: inline-flex; padding: 6px 8px; }

    #main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "round score"
        "preview preview"
        "played played"
        "hand hand";
      gap: 6px;
      padding: 6px 8px;
      padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
      align-items: start;
      box-sizing: border-box;
    }
    #side, #table { display: contents; }
    #roundpanel {
      grid-area: round; min-width: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 8px 10px;
      border-radius: 12px 0 0 12px;
      border: 1px solid rgba(255,255,255,.12);

      background: rgba(0,0,0,.28);
    }
    #scorepanel {
      grid-area: score; min-width: 0;

    }
    #playlog-panel,
    #seedinfo,

    #roundlabel { font-size: 12.5px; }

    #seasonline {
      font-size: 9.5px; margin-top: 2px; line-height: 1.35;

    }
    #bossbanner { padding: 6px 8px; font-size: 10.5px; margin-top: 6px !important; }
    .statline { font-size: 11px; margin: 1px 0; }

    #gauge { height: 7px; margin: 3px 0 8px; }

    #playedarea {
      grid-area: played; min-height: 0; padding: 6px 8px; gap: 4px;
    }
    /* 안내 문구만 있을 땐 숨김 — 예상점수·손패가 주역 */
    #playedarea:has(.hint) { display: none; }
    #playedarea:has(.card) { min-height: 72px; }

    #handarea {
      grid-area: hand;

    .card {

    }
    /* 손패 격자 칸만 100% — 낸 패/연출은 위 고정 크기 유지 */
    #handarea .card {
      width: 100%;
      max-width: 78px;
    }
    #playedarea .card,
    #juice-cards .card {
      width: calc((100vw - 26px - 15px) / 4);
      max-width: 78px;
      height: auto;
      aspect-ratio: 64 / 98;
    }
    #juice-cards .juice-card-wrap {
      width: calc((100vw - 26px - 15px) / 4);

    }
    .card .art { font-size: clamp(16px, 5.5vw, 24px); margin-top: 4px; }

    .card.tti .ribbon { height: 34%; font-size: 8px; }
    .card:hover { transform: none; }
    .card.sel { transform: translateY(-12px) scale(1.02); }

    #actions {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 46;
      /* display:contents로 main 자식이 되므로 기존 칸에 주차 (화면 위치는 fixed) */
      grid-area: round;
      display: grid;

      gap: 7px; align-items: stretch;
      margin: 0;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));

      width: auto;
    }
    .bigbtn {
      width: 100%; min-width: 0; min-height: 46px;

      box-shadow: 0 2px 0 rgba(0,0,0,.35);
    }
    #btn-play, #btn-discard { width: 100%; }
    #deckbox {

    }

    /* 춘향: 우측 하단 캐릭터 + 말풍선 (액션바 위) */
    #chunhyang {
      right: 6px; left: auto; width: 118px;
      bottom: calc(78px + env(safe-area-inset-bottom, 0px));

      gap: 4px;
    }
    #ch-figure { display: block; width: 72px; margin: 0 auto; }

    #ch-face { font-size: 16px; top: 12px; }
    #ch-btn { display: none !important; }
    #ch-bubble {
      width: 100%; font-size: 11px; padding: 6px 8px; min-height: 0;
      box-shadow: 0 4px 14px rgba(0,0,0,.4);
    }

    #modal-overlay { padding: 0; align-items: flex-end; }

    .choicebtn.btn-go .go-roulette { font-size: 1.85em; }
  }

  @media (max-width: 720px) and (max-height: 700px) {

  @media (max-width: 720px) and (hover: none) {
    .jokerslot.filled { cursor: pointer; }
    .jokerslot.filled .jtip { display: none !important; }
  }

</style>
</head>
<body>

<div id="topbar">
  <div id="logo">화투로<small>고스톱 · 무한의 판</small></div>
  <div id="jokerbar"></div>

<div id="go-anim-preview" aria-hidden="true">
  <div class="gap-inner">
    <h1>고 버튼 연출 프리뷰</h1>
    <div class="gap-sub">
      <code>?goPreview=1</code> · 본게임 룰: <b style="color:#e2e8f0">1고 = 기본</b> /
      <b style="color:#fca5a5">2~3고 = D</b> /
      <b style="color:#93c5fd">4고+ = C</b> (0 → N 밀치기)<br>
      아래는 스타일별 비교용(0→6). 확정 후 풀스크린 두두둥은 별도.
    </div>

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// 현재 점수가 이미 넘은 최대 고 단계 (cur 미만으로는 내려가지 않음)

// ── 족보 판정 (고정 우선순위, 첫 매치) ─────────────────────
// core = 족보를 구성한 카드들 — 이 카드들의 칩만 배수를 타고, 나머지는 배수 없이 가산.
// "N장 이상" 족보(열끗셋·띠셋)는 기본칩 높은 N장만 코어, 초과분은 flat.
function topByBaseChip(arr, n) {
  return [...arr].sort((a, b) => baseChip(b) - baseChip(a) || a.uid - b.uid).slice(0, n);
}
function detectHandInfo(cards) {
  const kw = cards.filter((c) => c.type === 'kwang');
  const byMonth = {};
  for (const c of cards) (byMonth[c.month] = byMonth[c.month] || []).push(c);
  const monthGroups = Object.values(byMonth).sort((a, b) => b.length - a.length);
  const maxMonth = monthGroups.length ? monthGroups[0].length : 0;

  if (kw.length === 5) return { handId: 'ogwang', core: kw };
  if (kw.length === 4) return { handId: 'sagwang', core: kw };
  if (maxMonth >= 4) return { handId: 'chongtong', core: monthGroups[0] };
  const birds = cards.filter((c) => c.tags.includes('godori'));
  if (birds.length === 3) return { handId: 'godori', core: birds };
  if (kw.length === 3)
    return { handId: kw.some((c) => c.tags.includes('bikwang')) ? 'bisamgwang' : 'samgwang', core: kw };
  for (const t of ['hongdan', 'cheongdan', 'chodan']) {
    const set = cards.filter((c) => c.tags.includes(t));
    if (set.length === 3) return { handId: 'dan', core: set };
  }
  if (maxMonth >= 3) return { handId: 'month3', core: topByBaseChip(monthGroups[0], 3) };
  const yeol = cards.filter((c) => effType(c) === 'yeol');
  if (yeol.length >= 3) return { handId: 'yeol3', core: topByBaseChip(yeol, 3) };
  // 비단(12월 띠)은 전통 룰대로 띠 셋에서 제외
  const tti = cards.filter((c) => c.type === 'tti' && !c.tags.includes('bi_tti'));
  if (tti.length >= 3) return { handId: 'tti3', core: topByBaseChip(tti, 3) };
  // 피5: 낸 카드가 전부 피/쌍피이고, 쌍피=2로 환산해 합 ≥5
  if (cards.length >= 1 && cards.every((c) => piCount(c) > 0)

    for (const g of monthGroups) {

// ── 카드 1장의 칩 (계절/밤낮 보정 → 박 디버프 순서로 적용) ──
// env: { boss, jokerIds, mitjangChips, seasonMonth?, night? }
function cardChip(c, env) {
  let chip = baseChip(c);
  const t = effType(c);
  if (env.seasonMonth && c.month === env.seasonMonth) chip *= 2;          // 이달의 패
  if (env.night === false && (t === 'kwang' || t === 'yeol')) chip += 2;  // 낮: 광·열끗
  if (env.night === true && (t === 'tti' || t === 'ssangpi' || t === 'pi')) chip += 2; // 밤: 띠·피
  if (!env.jokerIds.includes('pibak_boheom')) {
    if (env.boss === 'pibak' && (t === 'pi' || t === 'ssangpi')) chip = 0;
    if (env.boss === 'gwangbak' && t === 'kwang') chip = 0;
    if (env.boss === 'meongbak' && t === 'yeol') chip = 0;
  }
  return chip;
}

// ── 점수 계산 (순수 함수 — 프리뷰와 실정산이 공유) ─────────
// 족보 기본칩 없음. (코어 카드칩) × 족보 배수 + 나머지(flat).
// 반환: { handId, chips, mult, flat, score, kwangPlayed }
function computeScore(cards, env) {
  let { handId, core } = detectHandInfo(cards);
  if (env.boss === 'no_shake' && ['month2', 'month3', 'chongtong'].includes(handId)) {
    handId = 'none';
    core = [...cards]; // 무조합 강등 시엔 전부 코어 (배수 1이라 결과 동일)
  }
  const hd = HAND_BY_ID[handId];
  let chips = 0;
  let mult = hd.mult;
  let flat = 0;

  const coreSet = new Set(core);
  for (const c of cards) {
    const v = cardChip(c, env);
    if (coreSet.has(c)) chips += v; else flat += v;
  }

  const ctx = { cards, handId, core, boss: env.boss, mitjangChips: env.mitjangChips };
  // +칩 특수패는 배수 밖(flat)으로만 가산
  for (const id of env.jokerIds) { const j = JOKER_BY_ID[id]; if (j.addChips) flat += j.addChips(ctx); }
  for (const id of env.jokerIds) { const j = JOKER_BY_ID[id]; if (j.addMult)  mult  += j.addMult(ctx); }
  for (const id of env.jokerIds) { const j = JOKER_BY_ID[id]; if (j.xMult)    mult  *= j.xMult(ctx); }

  return {
    handId, chips, mult, flat,
    score: Math.floor(chips * mult + flat),
    kwangPlayed: cards.filter((c) => c.type === 'kwang').length,
  };
}

// ── 손패 최적 조합 탐색 (춘향 훈수 · 봇 시뮬레이션 공용) ────
function* combosOf(arr, k, start = 0, cur = []) {
  if (cur.length === k) { yield [...cur]; return; }
  for (let i = start; i <= arr.length - (k - cur.length); i++) {
    cur.push(arr[i]);
    yield* combosOf(arr, k, i + 1, cur);
    cur.pop();
  }
}
// 뒷면 카드는 제외하고 1~5장 전 부분집합을 평가 (국진은 양쪽 모드 모두 시도)
function evaluateHand(hand, env) {
  const avail = hand.filter((c) => !c.faceDown);
  const guk = avail.find((c) => c.tags.includes('dual'));
  const gukOrig = guk ? guk.asPi : null;
  let best = null;
  for (let k = 1; k <= Math.min(5, avail.length); k++) {
    for (const sub of combosOf(avail, k)) {
      const modes = guk && sub.includes(guk) ? [false, true] : [null];
      for (const m of modes) {
        if (m !== null) guk.asPi = m;
        const r = computeScore(sub, env);
        if (!best || r.score > best.score) best = { cards: [...sub], gukAsPi: m, ...r };
      }
    }
  }
  if (guk) guk.asPi = gukOrig;
  return best;
}

  jokers: [],         // { id, paid }
  money: 4,
  boss: null,
  usedBosses: [],
  nextBoss: null,       // 다음 박 라운드 확정 디버프 (3·6판용)
  bossCandidates: null, // 최종(12월) 라운드용 후보 2종 [id, id]
  shopOffers: [],       // { joker, sold }
  rerollCost: 2,
  kwangSoldThisRound: 0,
  mitjangChips: 0,
  makgeolli: 0,         // 레거시 미사용 (호환용)
  chunhyangNext: false, // 상점에서 다음 달 훈수 예약
  drunk: false,         // 이번 달 춘향이 훈수 활성 (라운드 시작 시 예약 소비)
  hoverReact: null,     // 내기/버리기 호버 예측 표정 { mood, text } | null
  touchHintMode: 'play', // 모바일: 패 선택 시 보여줄 훈수 (play|discard)
  lastPlay: null,       // { cards 스냅샷, result, scoreBefore }
  juicing: false,       // 연출 중 입력 잠금 (중간값은 state에 안 넣음)
  dealing: false,       // 손패 드로우 연출 중
  pendingGoStop: false, // 목표 달성 → 고/스톱 대기 (이때 드로우 금지)
  playLog: [],
  settleData: null,
  gameOverReason: '',
  stats: { bestSingle: 0, bestSingleHand: '', totalEarned: 0 },
  helpReturn: null,
  janAuraLeft: 0,       // 1월 조합 오라 남은 횟수
  janAuraCharged: false, // 이번 추천 선택이 횟수를 이미 썼는지 (취소 시 환불)
  coachStep: null,      // null | 'hand' | 'play' | 'scored' | 'junk' | 'gostop' | 'shop'
  coachPendingScored: false, // 내기 연출 후 점수 설명 일시정지
  coachAfterDeal: null, // 드로우 끝난 뒤 이어갈 코치 스텝
  janTutorJunkPending: false, // 1월: 조합 튜토 다음 보충에서 버리기 유도
  playFadeGen: 0,
  dealGen: 0,
};

const hasJoker = (id) => state.jokers.some((j) => j.id === id);
const jokerIds = () => state.jokers.map((j) => j.id);
const isBossRound = (r) => BOSS_ROUNDS.includes(r);
// 판 번호 = 월. 홀수 달 = 낮(광·열끗 +3칩), 짝수 달 = 밤(띠·피 +3칩)
const isNight = () => state.round % 2 === 0;
const scoreEnv = () => ({
  boss: state.boss, jokerIds: jokerIds(), mitjangChips: state.mitjangChips,
  seasonMonth: state.round, night: isNight(),
});

function addMoney(n) {
  state.money += n;
  if (n > 0) {
    state.stats.totalEarned += n;
    spawnCoinParticles(n);
  }
}

// ── 판 진행 ────────────────────────────────────────────────
function startRound() {
  state.deck = shuffle(buildDeck(), rng);
  state.hand = [];
  state.selected = [];
  state.roundScore = 0;
  state.playsLeft = 4;
  state.discardsLeft = 4;
  state.goLevel = 0;
  state.baseTarget = TARGETS[state.round - 1];
  state.target = state.baseTarget;
  state.kwangSoldThisRound = 0;
  state.drunk = CHUNHYANG_ENABLED && !!state.chunhyangNext;
  state.chunhyangNext = false;
  state.hoverReact = null;
  state.lastPlay = null;
  state.playLog = [];
  state.pendingGoStop = false;
  state.dealing = false;
  state.janAuraLeft = state.round === 1 ? JAN_AURA_USES : 0;
  state.janAuraCharged = false;
  state.coachStep = null;
  state.coachPendingScored = false;
  state.coachAfterDeal = null;
  // 튜토 미완이면: 첫 손 조합 → 바로 다음 보충은 버리기
  state.janTutorJunkPending = state.round === 1 && !hasSeenJanCoach();

  state.boss = isBossRound(state.round) ? state.nextBoss : null;
  state.nextBoss = null;
  state.bossCandidates = null;
  if (state.boss) {
    state.usedBosses.push(state.boss);
    if (state.boss === 'bibaram') state.discardsLeft = 0;
  }

  state.screen = 'play';
  render(); // 빈 손패부터
  dealToHand({ isRoundStart: true });
}

function applyAngaeFaceDown(drawn, isRoundStart) {
  if (state.boss !== 'angae') return;
  const pool = isRoundStart ? [...state.hand, ...drawn] : [...drawn];
  let downCount = state.hand.filter((c) => c.faceDown).length;
  const candidates = pool.filter((c) => !c.faceDown);
  shuffle(candidates, rng);
  for (const c of candidates) {
    if (downCount >= 3) break;
    c.faceDown = true;
    downCount++;
  }
}

function refillHand(isRoundStart = false) {
  const drawn = [];
  while (state.hand.length < 8 && state.deck.length > 0) {
    const c = state.deck.pop();
    state.hand.push(c);
    drawn.push(c);
  }
  applyAngaeFaceDown(drawn, isRoundStart);
  sortHand();
  return drawn;
}

// 빈 자리 상태에서 한 장씩 드로우 → 연출 후 정렬
/** 1월 개국 손패에 족보가 있도록 drawn(8장)을 재구성. state.deck는 나머지. */
function ensureJanOpeningCombo(drawn) {
  const env = scoreEnv();
  const ok = (cards) => {
    const r = evaluateHand(cards, env);
    return r && r.handId && r.handId !== 'none';
  };
  if (ok(drawn)) return;

  for (let n = 0; n < 48; n++) {
    const pool = [...drawn, ...state.deck];
    shuffle(pool, rng);
    const trial = pool.slice(0, 8);
    if (ok(trial)) {
      drawn.length = 0;
      drawn.push(...trial);
      state.deck = pool.slice(8);
      return;
    }
  }

  // 최후: 같은 달 2장 강제
  const pool = [...drawn, ...state.deck];
  const byM = {};
  for (const c of pool) (byM[c.month] = byM[c.month] || []).push(c);
  let pair = null;
  for (const g of Object.values(byM)) {
    if (g.length >= 2) { pair = [g[0], g[1]]; break; }
  }
  if (!pair) return;
  const set = new Set(pair);
  const rest = shuffle(pool.filter((c) => !set.has(c)), rng);
  drawn.length = 0;
  drawn.push(pair[0], pair[1], ...rest.slice(0, 6));
  state.deck = rest.slice(6);
}

/** 1월 버리기 튜토용 — 무조합 + 버릴 피(쌍피) 최소 2장 */
function janHandIsNone(cards) {
  const env = scoreEnv();
  const r = evaluateHand(cards.filter((c) => !c.faceDown), env);
  return !r || !r.handId || r.handId === 'none';
}
function countJunkPi(cards) {
  return cards.filter((c) => !c.faceDown && (effType(c) === 'pi' || effType(c) === 'ssangpi')).length;
}
function ensureJanJunkTutorialHand(drawn) {
  const ok = (trial) => janHandIsNone(trial) && countJunkPi(trial) >= 2;
  if (ok(drawn)) return;

  for (let n = 0; n < 128; n++) {
    const pool = [...drawn, ...state.deck];
    shuffle(pool, rng);
    const trial = pool.slice(0, 8);
    if (ok(trial)) {
      drawn.length = 0;
      drawn.push(...trial);
      state.deck = pool.slice(8);
      return;
    }
  }
  ensureJanNoCombo(drawn);
}

/** 1월 버리기 튜토용 — drawn(8장)에 족보가 없도록 재구성 */
function ensureJanNoCombo(drawn) {
  const env = scoreEnv();
  const isNone = (cards) => {
    const r = evaluateHand(cards.filter((c) => !c.faceDown), env);
    return !r || !r.handId || r.handId === 'none';
  };
  if (isNone(drawn)) return;

  for (let n = 0; n < 64; n++) {
    const pool = [...drawn, ...state.deck];
    shuffle(pool, rng);
    const trial = pool.slice(0, 8);
    if (isNone(trial)) {
      drawn.length = 0;
      drawn.push(...trial);
      state.deck = pool.slice(8);
      return;
    }
  }

  // 최후: 같은 달·피5 피하기
  const pool = [...drawn, ...state.deck];
  shuffle(pool, rng);
  const pick = [];
  const months = {};
  let piSum = 0;
  const tryAdd = (c, strict) => {
    if (pick.includes(c)) return false;
    const m = months[c.month] || 0;
    if (strict && m >= 1) return false;
    const addPi = piCount(c);
    if (strict && piSum + addPi >= 5) return false;
    pick.push(c);
    months[c.month] = m + 1;
    piSum += addPi;
    return true;
  };
  for (const c of pool) {
    if (pick.length >= 8) break;
    tryAdd(c, true);
  }
  for (const c of pool) {
    if (pick.length >= 8) break;
    tryAdd(c, false);
  }
  const set = new Set(pick);
  drawn.length = 0;
  drawn.push(...pick);
  state.deck = pool.filter((c) => !set.has(c));
}

async function dealToHand({ playGen = null, isRoundStart = false, forceJunkTutor = false } = {}) {
  // 고/스톱 대기 중에는 절대 보충하지 않음 (단, 1월 버리기 튜토 보충은 예외)
  const junkTutorDeal = forceJunkTutor
    || (!isRoundStart && state.round === 1 && state.janTutorJunkPending);
  if (state.pendingGoStop && !isRoundStart && !junkTutorDeal) return;
  if (state.screen === 'gostop') return;

  const dealGen = (state.dealGen = (state.dealGen || 0) + 1);
  const aborted = () =>
    dealGen !== state.dealGen ||
    state.screen === 'welcome' || state.screen === 'prep' ||
    (playGen != null && playGen !== state.playFadeGen);

  let drawn = [];
  while (state.hand.length + drawn.length < 8 && state.deck.length > 0) {
    drawn.push(state.deck.pop());
  }

  // 1월 튜토 2단계: 조합 직후 보충 → 손패 리셋 후 무조합으로 버리기 유도
  if (junkTutorDeal) {
    for (let i = drawn.length - 1; i >= 0; i--) state.deck.push(drawn[i]);
    drawn = [];
    for (let i = state.hand.length - 1; i >= 0; i--) state.deck.push(state.hand[i]);
    state.hand = [];
    state.selected = [];
    while (drawn.length < 8 && state.deck.length > 0) drawn.push(state.deck.pop());
    applyAngaeFaceDown(drawn, false);
    ensureJanJunkTutorialHand(drawn);
  } else if (!drawn.length) {
    if (!state.pendingGoStop) {
      sortHand();
      state.dealing = false;
      render();
    } else {
      state.dealing = false;
    }
    return;
  } else {
    applyAngaeFaceDown(drawn, isRoundStart);
    // 1월 첫 배분만 — 손패에 족보 최소 1개 보장
    if (isRoundStart && state.round === 1 && state.hand.length === 0) {
      ensureJanOpeningCombo(drawn);
    }
  }

  if (!drawn.length) {
    state.dealing = false;
    render();
    return;
  }

  // 연출 전까지 덱에 되돌려, 장수 표시가 한 장씩(33→32→31) 줄어들게
  for (let i = drawn.length - 1; i >= 0; i--) state.deck.push(drawn[i]);

  state.dealing = true;
  render(); // 패 없는/모자란 상태 노출 (덱 카운트는 아직 유지)
  await new Promise((r) => setTimeout(r, isRoundStart ? 160 : 240));
  if (aborted() || state.pendingGoStop || state.screen === 'gostop') {
    // 아직 손패로 안 옮김 — 카드는 덱에 그대로
    state.dealInUids = null;
    state.dealing = false;
    if (junkTutorDeal && !aborted()) state.janTutorJunkPending = true; // 보류 유지
    render();
    return;
  }

  for (let i = 0; i < drawn.length; i++) {
    if (aborted() || state.pendingGoStop || state.screen === 'gostop') {
      // 미지급분은 덱에 남아 있음
      state.dealInUids = null;
      state.dealing = false;
      render();
      return;
    }
    const card = state.deck.pop(); // drawn[i]와 동일 참조
    state.hand.push(card);
    state.dealInUids = [card.uid];
    render();
    try { sfxChip(); } catch (_) {}
    await new Promise((r) => setTimeout(r, 105));
  }

  await new Promise((r) => setTimeout(r, 360));
  if (aborted()) {
    state.dealInUids = null;
    state.dealing = false;
    render();
    return;
  }
  state.dealInUids = null;
  render();
  await new Promise((r) => setTimeout(r, 40));
  if (aborted()) {
    state.dealing = false;
    render();
    return;
  }
  await sortHandAnimated();
  if (aborted()) {
    state.dealing = false;
    render();
    return;
  }
  state.dealing = false;
  if (junkTutorDeal) {
    state.janTutorJunkPending = false;
    if (!hasSeenJanCoach()) {
      if (state.discardsLeft < 1) state.discardsLeft = 1;
      state.coachStep = 'junk';
    }
  }
  render();
  maybeStartJanCoach(isRoundStart);
}

const TYPE_ORDER = { kwang: 0, yeol: 1, tti: 2, ssangpi: 3, pi: 4 };
function sortHand() {
  state.hand.sort((a, b) => {
    if (a.faceDown !== b.faceDown) return a.faceDown ? 1 : -1; // 뒷면은 맨 뒤 (정렬로 정보 누출 방지)
    if (a.month !== b.month) return a.month - b.month;
    return TYPE_ORDER[a.type] - TYPE_ORDER[b.type];
  });
}

function captureHandRects() {
  const map = {};
  document.querySelectorAll('#handarea [data-uid]').forEach((el) => {
    map[+el.dataset.uid] = el.getBoundingClientRect();
  });
  return map;
}

// FLIP: 드로우 직후 월별 정렬이 미끄러지듯 이동
async function sortHandAnimated() {
  const handEl = $('handarea');
  if (!handEl || state.hand.length < 2) {
    sortHand();
    render();
    return;
  }
  const from = captureHandRects();
  const before = state.hand.map((c) => c.uid).join(',');
  sortHand();
  if (before === state.hand.map((c) => c.uid).join(',')) {
    render();
    return;
  }
  render();
  handEl.classList.add('sorting');
  const els = [...handEl.querySelectorAll('[data-uid]')];
  const movers = [];
  for (const el of els) {
    const prev = from[+el.dataset.uid];
    if (!prev) continue;
    const next = el.getBoundingClientRect();
    const dx = prev.left - next.left;
    const dy = prev.top - next.top;
    if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) continue;
    el.style.transition = 'none';
    el.style.transform = `translate(${dx}px, ${dy}px)`;
    movers.push(el);
  }
  if (!movers.length) {
    handEl.classList.remove('sorting');
    return;
  }
  await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
  for (const el of movers) {
    el.style.transition = 'transform .48s cubic-bezier(.22,.9,.28,1)';
    el.style.transform = 'translate(0, 0)';
  }
  await new Promise((r) => setTimeout(r, 500));
  for (const el of movers) {
    el.style.transition = '';
    el.style.transform = '';
  }
  handEl.classList.remove('sorting');
}

// 낸 패 표시용 정렬: 코어(왼쪽) → flat, 각 그룹은 월↑ · 칩↑ · uid
function sortPlayedCards(cards, env) {
  let { handId, core } = detectHandInfo(cards);
  if (env.boss === 'no_shake' && ['month2', 'month3', 'chongtong'].includes(handId)) {
    core = [...cards];
  }
  const coreSet = new Set(core);
  const byMonthChip = (a, b) => {
    if (a.month !== b.month) return a.month - b.month;
    const ca = cardChip(a, env), cb = cardChip(b, env);
    if (ca !== cb) return ca - cb;
    return a.uid - b.uid;
  };
  return [
    ...cards.filter((c) => coreSet.has(c)).sort(byMonthChip),
    ...cards.filter((c) => !coreSet.has(c)).sort(byMonthChip),
  ];
}

function selectedCards() {
  return state.selected.map((uid) => state.hand.find((c) => c.uid === uid)).filter(Boolean);
}

function toggleSelect(uid) {
  if (state.screen !== 'play' || state.juicing || state.dealing) return;
  // 1월 버리기 튜토: 빨간 빛 약한 패 하나 누르면 추천분(최대 5장) 일괄 선택
  if (state.coachStep === 'junk') {
    const junk = getJanJunkSuggest();
    if (junk.includes(uid)) {
      const allOn = junk.every((u) => state.selected.includes(u));
      if (allOn) state.selected = state.selected.filter((u) => !junk.includes(u));
      else state.selected = junk.slice(0, 5);
      state.hoverReact = null;
      render();
      return;
    }
  }
  // 1월 조합 오라: 빛나는 패 하나 누르면 조합 전체 선택 (버리기 튜토 중엔 비활성)
  const aura = state.coachStep === 'junk' ? null : getJanAuraBest();
  if (aura && aura.uids.includes(uid)) {
    const allOn = aura.uids.every((u) => state.selected.includes(u));
    if (allOn) {
      state.selected = state.selected.filter((u) => !aura.uids.includes(u));
      if (state.janAuraCharged) {
        state.janAuraLeft = Math.min(JAN_AURA_USES, state.janAuraLeft + 1);
        state.janAuraCharged = false;
      }
    } else {
      state.selected = aura.uids.slice(0, 5);
      if (!state.janAuraCharged) {
        state.janAuraLeft = Math.max(0, state.janAuraLeft - 1);
        state.janAuraCharged = true;
      }
      if (state.coachStep === 'hand') state.coachStep = 'play';
    }
    state.hoverReact = null;
    render();
    return;
  }
  const i = state.selected.indexOf(uid);
  if (i >= 0) state.selected.splice(i, 1);
  else {
    if (state.selected.length >= 5) { flashActions(); return; }
    state.selected.push(uid);
  }
  state.hoverReact = null;
  render();
}

function toggleGukjin() {
  if (state.screen !== 'play' || state.juicing || state.dealing) return;
  const g = state.hand.find((c) => c.tags.includes('dual') && !c.faceDown);
  if (!g) return;
  g.asPi = !g.asPi;
  render();
}

// ── 내기 ───────────────────────────────────────────────────
function playSelected() {
  if (state.screen !== 'play' || state.juicing || state.dealing) return;
  const cards = selectedCards();
  if (cards.length < 1 || cards.length > 5 || state.playsLeft <= 0) return;

  if (state.coachStep === 'hand' || state.coachStep === 'play') {
    state.coachPendingScored = true;
    state.coachStep = null;
  } else if (state.coachStep === 'junk') {
    flashActions();
    return;
  } else if (state.coachStep === 'scored') {
    state.coachStep = null;
    // 버리기 튜토가 남았으면 완료 처리 보류
    if (!state.janTutorJunkPending) markJanCoachSeen();
  }
  if (state.round === 1 && !hasSeenJanCoach()) state.janTutorJunkPending = true;
  // 내기로 확정 → 추천 횟수는 소모된 채, 다음 손에서 새로 과금
  state.janAuraCharged = false;

  // 안개: 뒷면 카드 공개 — 뒷면 국진은 점수가 높은 모드 자동 선택
  for (const c of cards) {
    if (c.faceDown) {
      c.faceDown = false;
      if (c.tags.includes('dual')) {
        c.asPi = false;
        const a = computeScore(cards, scoreEnv()).score;
        c.asPi = true;
        const b = computeScore(cards, scoreEnv()).score;
        c.asPi = b > a;
      }
    }
  }

  const env = scoreEnv();
  const result = computeScore(cards, env);
  const scoreBefore = state.roundScore;

  // 경제 트리거 (실정산에서만)
  if (hasJoker('gwangpari') && result.kwangPlayed > 0) {
    const n = Math.min(result.kwangPlayed, 3 - state.kwangSoldThisRound);
    if (n > 0) { addMoney(n); state.kwangSoldThisRound += n; }
  }

  state.roundScore += result.score;
  if (result.score > state.stats.bestSingle) {
    state.stats.bestSingle = result.score;
    state.stats.bestSingleHand = HAND_BY_ID[result.handId].name;
  }
  state.playsLeft--;
  state.playLog.push({ hand: HAND_BY_ID[result.handId].name, score: result.score });

  // 낸 패 스냅샷 (국진 모드 포함) — 코어→flat, 월·칩 순으로 정렬해 연출/표시
  // 선택 transform(들림·scale) 없이 측정해야 슬롯 착지가 안 어긋남
  const fromRects = {};
  for (const c of cards) {
    const el = document.querySelector(`#handarea [data-uid="${c.uid}"]`);
    if (!el) continue;
    const hadSel = el.classList.contains('sel');
    const prevTr = el.style.transition;
    el.style.transition = 'none';
    if (hadSel) el.classList.remove('sel');
    void el.offsetWidth;
    fromRects[c.uid] = el.getBoundingClientRect();
    if (hadSel) el.classList.add('sel');
    el.style.transition = prevTr;
  }
  const sorted = sortPlayedCards(cards, env);
  state.lastPlay = {
    cards: sorted.map((c) => ({ ...c, tags: [...c.tags] })),
    result,
    scoreBefore,
    env: { ...env, jokerIds: [...env.jokerIds] },
  };

  state.hand = state.hand.filter((c) => !state.selected.includes(c.uid));
  state.selected = [];
  // 목표 달성 + 더 낼 패가 있을 때만 고/스톱 대기 (드로우 보류)
  state.pendingGoStop = state.roundScore >= state.target && state.round !== ROUNDS
    && cardsRemaining() > 0;

  // 고/스톱·게임오버는 연출 끝난 뒤에 (모달 중첩·조기 전환 방지)
  state.juicing = true;
  document.body.classList.add('juicing');
  render();
  const playGen = (state.playFadeGen = (state.playFadeGen || 0) + 1);
  playJuiceSequence(state.lastPlay, fromRects).then(async () => {
    state.juicing = false;
    document.body.classList.remove('juicing');

    // 목표 달성: 드로우 없이 고/스톱(또는 패 없으면 정산)
    if (state.roundScore >= state.target && state.round !== ROUNDS) {
      if (await pauseForCoachScored(playGen)) return;
      // 1월: 첫 내기 후 버리기 튜토가 남았으면 목표 달성해도 보충부터
      if (state.janTutorJunkPending && state.round === 1 && !hasSeenJanCoach()) {
        state.pendingGoStop = false;
        state.dealing = true;
        render();
        await new Promise((r) => setTimeout(r, 420));
        if (playGen !== state.playFadeGen) { state.dealing = false; return; }
        const pa = $('playedarea');
        if (pa && state.lastPlay) {
          pa.classList.add('play-fade-out');
          await new Promise((r) => setTimeout(r, 420));
        }
        if (playGen !== state.playFadeGen) { state.dealing = false; return; }
        state.lastPlay = null;
        if (pa) pa.classList.remove('play-fade-out');
        render();
        await dealToHand({ playGen, forceJunkTutor: true });
        if (playGen !== state.playFadeGen) { state.dealing = false; return; }
        if (state.roundScore >= state.target) state.pendingGoStop = true;
        checkAfterPlay();
        render();
        return;
      }
      state.coachAfterDeal = null;
      // 버리기 튜토 대기 중이면 seen은 고 드로우/스톱에서 처리
      checkAfterPlay();
      render();
      await new Promise((r) => setTimeout(r, 500));
      if (playGen !== state.playFadeGen) return;
      const pa = $('playedarea');
      if (pa && state.lastPlay) {
        pa.classList.add('play-fade-out');
        await new Promise((r) => setTimeout(r, 420));
      }
      if (playGen !== state.playFadeGen) return;
      state.lastPlay = null;
      if (pa) pa.classList.remove('play-fade-out');
      render();
      return;
    }

    // 드로우·정렬 끝날 때까지 조합 힌트 숨김 (빈 자리 손패에 오라 뜨지 않게)
    state.dealing = true;
    render(); // 정렬된 낸 패 + 결과 잠깐 고정
    if (await pauseForCoachScored(playGen)) return;
    await new Promise((r) => setTimeout(r, 420));
    if (playGen !== state.playFadeGen) { state.dealing = false; return; }
    const pa = $('playedarea');
    if (pa && state.lastPlay) {
      pa.classList.add('play-fade-out');
      await new Promise((r) => setTimeout(r, 420));
    }
    if (playGen !== state.playFadeGen) { state.dealing = false; return; }
    state.lastPlay = null;
    if (pa) pa.classList.remove('play-fade-out');

    if (state.roundScore >= state.target) {
      // 12월 클리어 등
      state.dealing = false;
      checkAfterPlay();
      render();
      return;
    }

    render();
    await dealToHand({ playGen });
    if (playGen !== state.playFadeGen) { state.dealing = false; return; }
    if (state.coachAfterDeal) {
      state.coachStep = state.coachAfterDeal;
      state.coachAfterDeal = null;
    }
    checkAfterPlay();
    render();
  });
}

function cardsRemaining() {
  return state.hand.length + state.deck.length;
}

function checkAfterPlay() {
  if (state.roundScore >= state.target) {
    if (state.round === ROUNDS) { victory(); return; }
    // 더 낼 패가 없으면 고 불가 → 바로 정산
    if (cardsRemaining() === 0) {
      state.pendingGoStop = false;
      settle();
      return;
    }
    // 내기 0이어도 고/스톱 선택 — 고 시 내기 +1·드로우로 이어갈 수 있음
    state.screen = 'gostop';
    maybeStartGoStopCoach();
  } else if (state.playsLeft === 0) {
    gameOver(state.goLevel > 0 ? '고박' : '목표 미달');
  }
}

async function chooseGo() {
  if (state.screen !== 'gostop' || state.dealing) return;
  if (state.coachStep === 'gostop') {
    state.coachStep = null;
    markGoStopCoachSeen();
  }
  const fromLevel = state.goLevel;
  // 밀치기 고: 이미 넘어 있는 문턱 전부를 소급 인정, 선언 단계 = 아직 못 넘은 첫 문턱
  state.goLevel = goLevelReached(state.baseTarget, state.roundScore, state.goLevel) + 1;
  state.target = goThreshold(state.baseTarget, state.goLevel);
  state.playsLeft++; // 고 보상: 내기 +1 (밀친 단계 수와 무관하게 선언 1회당 1개)
  state.pendingGoStop = false;
  state.screen = 'play';
  state.dealing = true; // 드로우·정렬 전 조합 힌트 숨김
  render(); // 모달 닫고 모자란 손패 노출
  // 확정 풀스크린은 실제 점프 구간만 (버튼 연출은 1→N 유지)
  await playGoCascade(fromLevel, state.goLevel);
  await dealToHand();
  checkAfterPlay();
  render();
}

function chooseStop() {
  if (state.screen !== 'gostop') return;
  if (state.coachStep === 'gostop') {
    state.coachStep = null;
    markGoStopCoachSeen();
  }
  if (state.janTutorJunkPending) {
    state.janTutorJunkPending = false;
    if (!hasSeenJanCoach()) markJanCoachSeen();
  }
  state.pendingGoStop = false;
  settle();
  render();
}

// ── 버리기 ─────────────────────────────────────────────────
function discardSelected() {
  if (state.screen !== 'play' || state.juicing || state.dealing) return;
  const cards = selectedCards();
  if (cards.length < 1 || cards.length > 5 || state.discardsLeft <= 0) return;
  if (state.coachStep === 'junk') {
    state.coachStep = null;
    state.janTutorJunkPending = false;
    markJanCoachSeen();
  } else if (state.coachStep) {
    state.coachStep = null;
    markJanCoachSeen();
  }
  const uids = cards.map((c) => c.uid);
  state.discardsLeft--;
  if (hasJoker('mitjang')) state.mitjangChips += 8;
  state.selected = [];
  state.janAuraCharged = false; // 버리기로 확정 → 횟수 소모 확정
  state.hoverReact = null;
  state.discardAnimUids = uids;
  state.juicing = true;
  document.body.classList.add('juicing');
  render(); // 손패에 남긴 채로 날아가는 애니
  sfxDiscard();

  const finish = async () => {
    state.hand = state.hand.filter((c) => !uids.includes(c.uid));
    state.discardAnimUids = null;
    state.juicing = false;
    document.body.classList.remove('juicing');
    state.dealing = true; // 드로우·정렬 끝날 때까지 조합 힌트 숨김
    render(); // 버린 뒤 빈 자리
    await dealToHand();
    if (state.roundScore >= state.target && state.round !== ROUNDS && cardsRemaining() > 0) {
      state.pendingGoStop = true;
      state.screen = 'gostop';
      maybeStartGoStopCoach();
    }
  };

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) finish();
  else setTimeout(finish, 480);
}

// ── 정산 ───────────────────────────────────────────────────
function settle() {
  const interest = Math.min(Math.floor(state.money / 5), 5); // 정산 진입 시점 보유금 기준, 가장 먼저
  const base = isBossRound(state.round) ? 6 : 4;
  const playBonus = state.playsLeft;
  const goB = state.goLevel > 0 ? goBonus(state.goLevel) : 0;
  const insBonus = hasJoker('pibak_boheom') ? 1 : 0;
  const total = interest + base + playBonus + goB + insBonus;
  state.settleData = { interest, base, playBonus, goBonus: goB, insBonus, total, moneyBefore: state.money };
  addMoney(total);
  state.screen = 'settle';
}

// ── 상점 ───────────────────────────────────────────────────
function openShop() {
  state.rerollCost = 2;
  state.shopOffers = genOffers();
  const next = state.round + 1;
  state.nextBoss = null;
  state.bossCandidates = null;
  if (isBossRound(next)) {
    const pool = (next === 3 ? MILD_BOSSES : BOSSES.map((b) => b.id))
      .filter((id) => !state.usedBosses.includes(id));
    shuffle(pool, rng);
    if (next === ROUNDS) {
      state.bossCandidates = pool.slice(0, 2);
      if (state.bossCandidates.length === 1) state.nextBoss = state.bossCandidates[0];
    } else {
      state.nextBoss = pool[0];
    }
  }
  state.screen = 'shop';
  maybeStartShopCoach();
  render();
}

function genOffers() {
  const owned = jokerIds();
  const pool = JOKERS.filter((j) => !owned.includes(j.id));
  const offers = [];
  for (let i = 0; i < 3; i++) {
    const avail = pool.filter((j) => !offers.some((o) => o.joker.id === j.id));
    if (!avail.length) break;
    const r = rng();
    const want = r < 0.6 ? 'common' : r < 0.9 ? 'uncommon' : 'rare';
    let cands = avail.filter((j) => j.rarity === want);
    if (!cands.length) cands = avail;
    offers.push({ joker: cands[Math.floor(rng() * cands.length)], sold: false });
  }
  return offers;
}

function buyJoker(i) {
  if (state.screen !== 'shop') return;
  const offer = state.shopOffers[i];
  if (!offer || offer.sold) return;
  if (state.jokers.length >= 5 || state.money < offer.joker.price) { flashActions(); return; }
  state.money -= offer.joker.price;
  state.jokers.push({ id: offer.joker.id, paid: offer.joker.price });
  offer.sold = true;
  render();
}

function sellJoker(i) {
  if (state.screen !== 'shop') return;
  const j = state.jokers[i];
  if (!j) return;
  addMoney(Math.floor(j.paid / 2));
  if (j.id === 'mitjang') state.mitjangChips = 0;
  state.jokers.splice(i, 1);
  render();
}

function reroll() {
  if (state.screen !== 'shop' || state.money < state.rerollCost) return;
  state.money -= state.rerollCost;
  state.rerollCost++;
  state.shopOffers = genOffers();
  render();
}

function pickBossCandidate(id) {
  if (state.screen !== 'shop' || !state.bossCandidates) return;
  state.nextBoss = id;
  render();
}

function nextRound() {
  if (state.screen !== 'shop') return;
  if (isBossRound(state.round + 1) && !state.nextBoss) { flashActions(); return; }
  if (state.coachStep === 'shop' || (state.coachStep && String(state.coachStep).startsWith('shop'))) {
    state.coachStep = null;
    markShopCoachSeen();
  }
  state.round++;
  startRound();
}

// ── 종료 ───────────────────────────────────────────────────
function gameOver(reason) {
  state.gameOverReason = reason;
  state.screen = 'gameover';
}
function victory() {
  state.screen = 'victory';
}
function resetRun() {
  runSeed = seedParam ? (Number(seedParam) >>> 0) : (Math.floor(Math.random() * 4294967296) >>> 0);
  rng = mulberry32(runSeed);
  Object.assign(state, {
    round: 1, goLevel: 0, roundScore: 0, playsLeft: 4, discardsLeft: 4,
    deck: [], hand: [], selected: [], jokers: [], money: 4, boss: null, usedBosses: [],
    nextBoss: null, bossCandidates: null, shopOffers: [], rerollCost: 2,
    kwangSoldThisRound: 0, mitjangChips: 0, makgeolli: 0,
    chunhyangNext: false, drunk: false, hoverReact: null, tempReact: null, touchHintMode: 'play',
    lastPlay: null, juicing: false, dealing: false, pendingGoStop: false, playLog: [],
    settleData: null, gameOverReason: '',
    stats: { bestSingle: 0, bestSingleHand: '', totalEarned: 0 },
    janAuraLeft: 0, janAuraCharged: false, coachStep: null, coachPendingScored: false, coachAfterDeal: null, janTutorJunkPending: false,
  });
  state.baseTarget = TARGETS[0];
  state.target = TARGETS[0];
}

/** 사이드/탑바 — 튜토리얼 다시 보기 (런 처음부터) */
function abortTransientUI() {
  // 진행 중 내기/드로우/점수게이트 취소
  state.playFadeGen = (state.playFadeGen || 0) + 1;
  state.dealGen = (state.dealGen || 0) + 1;
  releaseCoachGate();
  try {
    JUICE.skip = true;
    if (JUICE.onSkip) JUICE.onSkip();
    JUICE.running = false;
    JUICE.skip = false;
    JUICE.onSkip = null;
  } catch (_) {}

  document.body.classList.remove('juicing', 'screen-shake', 'punch');
  const juice = $('juice-root');
  if (juice) {
    juice.classList.remove('skipable');
    juice.onclick = null;
  }
  const banner = $('hand-banner');
  if (banner) {
    banner.className = '';
    banner.textContent = '';
    banner.style.left = '';
    banner.style.top = '';
  }
  const go = $('go-cascade');
  if (go) {
    go.classList.remove('on');
    go.setAttribute('aria-hidden', 'true');
    const stage = $('go-cascade-stage');
    if (stage) stage.innerHTML = '';
  }
  const coach = $('coach-root');
  if (coach) {
    coach.classList.remove('on');
    coach.setAttribute('aria-hidden', 'true');
    coach.innerHTML = '';
  }
}

function replayTutorials() {
  clearJanCoachSeen();
  clearShopCoachSeen();
  clearGoStopCoachSeen();
  try { localStorage.removeItem('hwatro_howto_seen'); } catch (_) {}
  abortTransientUI();
  resetRun();
  state.helpReturn = null;
  state.coachStep = null;
  state.coachPendingScored = false;
  state.coachAfterDeal = null;
  state.janTutorJunkPending = false;
  state.juicing = false;
  state.dealing = false;
  state.screen = 'welcome';
  render();
}

/** 1월 조합 오라 — 족보 등급 우선, 동급이면 점수. 코어만 하이라이트 */
function getJanAuraBest() {
  if (state.coachStep === 'junk') return null;
  if (state.round !== 1 || state.janAuraLeft <= 0) return null;
  if (state.screen !== 'play' || state.juicing || state.dealing) return null;
  if (state.hand.length < 1) return null;
  const env = scoreEnv();
  // evaluateHand는 flat 패딩으로 낮은 족보가 이길 수 있음 → 오라는 족보 등급 우선
  const avail = state.hand.filter((c) => !c.faceDown);
  const guk = avail.find((c) => c.tags.includes('dual'));
  const gukOrig = guk ? guk.asPi : null;
  let best = null;
  for (let k = 1; k <= Math.min(5, avail.length); k++) {
    for (const sub of combosOf(avail, k)) {
      const modes = guk && sub.includes(guk) ? [false, true] : [null];
      for (const m of modes) {
        if (m !== null) guk.asPi = m;
        const r = computeScore(sub, env);
        if (!r.handId || r.handId === 'none') continue;
        const tier = HANDS.findIndex((h) => h.id === r.handId);
        if (
          !best ||
          tier < best.tier ||
          (tier === best.tier && r.score > best.score)
        ) {
          best = { cards: [...sub], handId: r.handId, score: r.score, tier };
        }
      }
    }
  }
  if (guk) guk.asPi = gukOrig;

  if (best) {
    const { core } = detectHandInfo(best.cards);
    const picks = (core && core.length) ? core : best.cards;
    if (!picks.length) return null;
    return {
      uids: picks.map((c) => c.uid),
      handId: best.handId,
      name: HAND_BY_ID[best.handId].name,
    };
  }

  let top = null;
  for (const c of state.hand) {
    if (c.faceDown) continue;
    if (!top || cardChip(c, env) > cardChip(top, env)) top = c;
  }
  if (!top) return null;
  return { uids: [top.uid], handId: 'none', name: '최고 칩 패' };
}

/** 1월 버리기 추천 — 튜토에선 피·쌍피만, 없으면 저칩 */
function getJanJunkSuggest() {
  const env = scoreEnv();
  const face = state.hand.filter((c) => !c.faceDown);
  if (!face.length) return [];
  if (state.coachStep === 'junk') {
    const pis = face
      .filter((c) => {
        const t = effType(c);
        return t === 'pi' || t === 'ssangpi';
      })
      .sort((a, b) => cardChip(a, env) - cardChip(b, env));
    if (pis.length) return pis.slice(0, 5).map((c) => c.uid);
  }
  const rank = (c) => {
    const t = effType(c);
    const bias = t === 'pi' ? 0 : t === 'ssangpi' ? 1 : t === 'tti' ? 5 : 10;
    return bias * 100 + cardChip(c, env);
  };
  return [...face].sort((a, b) => rank(a) - rank(b))
    .slice(0, Math.min(3, face.length))
    .map((c) => c.uid);
}

function maybeStartJanCoach(isRoundStart) {
  if (!isRoundStart || state.round !== 1 || state.screen !== 'play') return;
  if (hasSeenJanCoach()) return;
  // 1단계: 개국 조합 보장 후 조합→내기 튜토 (버리기는 다음 보충)
  state.coachStep = 'hand';
  render();
}

function maybeStartShopCoach() {
  if (state.screen !== 'shop' || state.round !== 1) return;
  if (hasSeenShopCoach()) return;
  state.coachStep = 'shop';
}

function maybeStartGoStopCoach() {
  if (state.screen !== 'gostop') return;
  if (hasSeenGoStopCoach()) return;
  state.coachStep = 'gostop';
}

let coachGateResolve = null;
function releaseCoachGate() {
  if (!coachGateResolve) return;
  const r = coachGateResolve;
  coachGateResolve = null;
  r();
}
function waitCoachGate() {
  return new Promise((r) => { coachGateResolve = r; });
}

/** 내기 연출 직후 — 점수 설명. 알겠어요/건너뛰기까지 멈춤. true면 이후 중단 */
async function pauseForCoachScored(playGen) {
  if (!state.coachPendingScored) return false;
  state.coachPendingScored = false;
  state.dealing = true;
  state.coachStep = 'scored';
  state.coachAfterDeal = null;
  render();
  await waitCoachGate();
  if (playGen != null && playGen !== state.playFadeGen) {
    state.dealing = false;
    state.coachStep = null;
    return true;
  }
  return false;
}

function coachNext() {
  // 다음이 필요한 스텝만 (점수 확인·상점 요약)
  if (state.coachStep === 'scored') {
    state.coachStep = null;
    // 버리기 단계가 남았으면 아직 완료 처리하지 않음
    if (!state.janTutorJunkPending) markJanCoachSeen();
    render();
    releaseCoachGate();
    return;
  }
  if (state.coachStep === 'shop') {
    state.coachStep = null;
    markShopCoachSeen();
    render();
    return;
  }
  coachSkip();
}
function coachSkip() {
  const step = state.coachStep;
  state.coachStep = null;
  state.coachPendingScored = false;
  state.coachAfterDeal = null;
  if (step === 'shop' || (step && String(step).startsWith('shop'))) markShopCoachSeen();
  else if (step === 'gostop') markGoStopCoachSeen();
  else if (step === 'junk') {
    state.janTutorJunkPending = false;
    markJanCoachSeen();
  } else if (step === 'scored' || step === 'hand' || step === 'play') {
    // 조합·점수 코치만 건너뛰고 버리기 튜토는 첫 보충에서 이어감

  } else {
    state.janTutorJunkPending = false;
    markJanCoachSeen();
  }
  releaseCoachGate();
  render();
}
