<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>화투로 — 고스톱: 무한의 판</title>
<style>
  :root {
    --felt: #1a4a2e; --felt-dark: #113020;
    --panel: rgba(0,0,0,.34); --panel-line: rgba(255,255,255,.12);
    --ink: #1f2937; --red: #c0392b; --gold: #d4af37; --gold-soft: #e8cd7a;
    --chip-blue: #60a5fa; --mult-red: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: radial-gradient(ellipse at 50% 20%, var(--felt), var(--felt-dark) 75%);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #f1f5f9; overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; }
  button:disabled { opacity: .38; cursor: not-allowed; }

  /* ── 상단바 ─────────────────────────── */
  #topbar {
    display: flex; align-items: center; gap: 14px; padding: 10px 16px;
    background: rgba(0,0,0,.35); border-bottom: 1px solid var(--panel-line);
    flex-wrap: wrap;
  }
  #logo { font-weight: 900; font-size: 17px; color: var(--gold-soft); letter-spacing: 1px; white-space: nowrap; }
  #logo small { display: block; font-size: 10px; font-weight: 400; color: #cbd5e1; letter-spacing: 2px; }
  #jokerbar { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
  .jokerslot {
    width: 118px; min-height: 54px; border-radius: 9px; padding: 6px 8px;
    background: rgba(255,255,255,.07); border: 1px dashed rgba(255,255,255,.22);
    font-size: 10.5px; color: #94a3b8; display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
  .jokerslot.filled {
    border: 1px solid var(--gold); background: linear-gradient(160deg, #3b2f14, #241c0b);
    color: #fde68a; display: block; cursor: help;
  }
  .jokerslot .jname { font-weight: 800; font-size: 12px; }
  .jokerslot .jdesc { font-size: 9.5px; color: #d6c58a; margin-top: 2px; line-height: 1.35; }
  #moneybox { font-size: 16px; font-weight: 800; color: #fbbf24; white-space: nowrap; }
  #moneybox .delta { font-size: 12px; color: #a3e635; }

  /* ── 본문 레이아웃 ───────────────────── */
  #main { display: flex; gap: 14px; padding: 14px 16px 30px; align-items: flex-start; flex-wrap: wrap; }
  #side {
    width: 235px; min-width: 215px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .panel { background: var(--panel); border: 1px solid var(--panel-line); border-radius: 12px; padding: 12px; }
  #table { flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 12px; }

  #roundlabel { font-size: 14px; font-weight: 800; color: #e2e8f0; }
  #roundlabel .bak { color: #fca5a5; }
  #bossbanner {
    border: 1px solid rgba(252,165,165,.5); background: rgba(127,29,29,.45);
    border-radius: 10px; padding: 8px 10px; font-size: 11.5px; line-height: 1.45; color: #fecaca;
  }
  #bossbanner b { color: #fee2e2; }
  #bossbanner .nullified { color: #86efac; font-weight: 700; }

  .statline { display: flex; justify-content: space-between; font-size: 12.5px; margin: 3px 0; color: #cbd5e1; }
  .statline b { color: #fff; font-size: 14px; }
  #target-val { color: var(--gold-soft); font-size: 16px; }
  #score-val { color: #93c5fd; font-size: 16px; }
  #gauge { height: 10px; border-radius: 6px; background: rgba(0,0,0,.5); overflow: hidden; margin: 6px 0 2px; }
  #gauge > div { height: 100%; background: linear-gradient(90deg, #38bdf8, #a3e635); transition: width .35s ease; }
  .golevel { font-size: 11.5px; color: #fbbf24; margin-top: 4px; font-weight: 700; }

  #previewbox { min-height: 74px; }
  #previewbox .pv-hand { font-weight: 900; font-size: 15px; color: var(--gold-soft); }
  #previewbox .pv-formula { font-size: 13px; margin-top: 3px; color: #e2e8f0; }
  #previewbox .pv-formula .c { color: var(--chip-blue); font-weight: 800; }
  #previewbox .pv-formula .m { color: var(--mult-red); font-weight: 800; }
  #previewbox .pv-score { font-size: 19px; font-weight: 900; color: #fff; margin-top: 3px; }
  #previewbox .pv-empty { font-size: 11.5px; color: #94a3b8; line-height: 1.5; }

  #playlog { font-size: 11px; color: #cbd5e1; }
  #playlog div { display: flex; justify-content: space-between; padding: 1.5px 0; }
  #playlog .lognum { color: #64748b; }

  /* ── 낸 패 / 손패 ────────────────────── */
  #playedarea {
    min-height: 152px; border-radius: 12px; border: 1px dashed rgba(255,255,255,.16);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px; flex-wrap: wrap; position: relative;
  }
  #playedarea .hint { color: rgba(255,255,255,.35); font-size: 12.5px; }
  #playresult { text-align: center; width: 100%; }
  #playresult .r-hand { font-size: 15px; font-weight: 900; color: var(--gold-soft); }
  #playresult .r-formula { font-size: 13px; color: #e2e8f0; }
  #playresult .r-formula .c { color: var(--chip-blue); font-weight: 800; }
  #playresult .r-formula .m { color: var(--mult-red); font-weight: 800; }
  #playresult .r-score { font-size: 26px; font-weight: 900; color: #fff; }
  /* pop 애니 제거: 카드 선택 시 render가 DOM을 다시 그리며 반복 재생되던 버그 방지 */

  #handarea { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; min-height: 116px; }
  #actions { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .bigbtn { padding: 12px 26px; font-size: 15px; font-weight: 900; border-radius: 10px; box-shadow: 0 3px 0 rgba(0,0,0,.4); }
  #btn-play { background: linear-gradient(180deg, #dc2626, #991b1b); color: #fff; }
  #btn-discard { background: linear-gradient(180deg, #2563eb, #1e40af); color: #fff; }
  #btn-gukjin { background: linear-gradient(180deg, #7c3aed, #5b21b6); color: #fff; padding: 9px 14px; font-size: 12px; font-weight: 800; }
  .smallbtn { background: rgba(255,255,255,.14); color: #e2e8f0; padding: 7px 12px; font-size: 12px; font-weight: 700; }

  /* ── 카드 ────────────────────────────── */
  .card {
    width: 64px; height: 98px;
    background: linear-gradient(160deg, #fffbef, #f5ecd4);
    border-radius: 7px; border: 1.5px solid rgba(0,0,0,.55);
    box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 0 0 2.5px rgba(192,57,43,.85), inset 0 0 0 4px rgba(255,255,255,.6);
    position: relative; display: flex; flex-direction: column; align-items: center;
    padding: 6px 4px 5px; color: var(--ink); user-select: none; cursor: pointer;
    transition: transform .13s ease, box-shadow .13s ease; flex-shrink: 0;
  }
  .card:hover { transform: translateY(-5px); }
  .card.sel { transform: translateY(-14px); box-shadow: 0 10px 16px rgba(0,0,0,.5), 0 0 0 3px var(--gold), inset 0 0 0 2.5px rgba(192,57,43,.85); }
  .card.static { cursor: default; }
  .card.static:hover { transform: none; }
  .card .month { font-size: 11px; font-weight: 800; line-height: 1; color: var(--red); align-self: flex-start; margin-left: 2px; }
  .card .mname { font-size: 8.5px; color: #8a6d3b; align-self: flex-start; margin: 1px 0 0 2px; letter-spacing: -0.5px; }
  .card .art { font-size: 25px; line-height: 1; margin-top: 7px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
  .card .tag { position: absolute; bottom: 4px; left: 4px; right: 4px; font-size: 9px; font-weight: 700; text-align: center; border-radius: 4px; padding: 2px 0; letter-spacing: .5px; }
  .card.kwang { background: linear-gradient(160deg, #fff8dc, #f3e5ab); box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 0 0 2.5px var(--gold), inset 0 0 0 4px rgba(255,255,255,.6); }
  .card.kwang.sel { box-shadow: 0 10px 16px rgba(0,0,0,.5), 0 0 0 3px #fff, inset 0 0 0 2.5px var(--gold); }
  .card.kwang .gwangmark {
    margin-top: 3px; width: 27px; height: 27px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe98a, var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 900; color: #7c2d12; box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .card.kwang .art { font-size: 21px; }
  .card.kwang .tag { background: var(--gold); color: #5c3a00; }
  .card.kwang.rain .tag { background: #475569; color: #dbeafe; }
  .card.yeol .tag { background: #b45309; color: #fef3c7; }
  .card.tti .ribbon {
    margin-top: 5px; width: 15px; height: 42px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    writing-mode: vertical-rl; font-size: 9px; font-weight: 700; box-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .card.tti.hongdan .ribbon { background: #c0392b; color: #fff; }
  .card.tti.cheongdan .ribbon { background: #1e40af; color: #fff; }
  .card.tti.chodan .ribbon { background: #c0392b; color: #c0392b; }
  .card.tti.bi_tti .ribbon { background: #6b21a8; color: #fff; }
  .card.tti .tag { background: #7f1d1d; color: #fecaca; }
  .card.tti.cheongdan .tag { background: #1e3a8a; color: #bfdbfe; }
  .card.pi .tag { background: #e5e7eb; color: #4b5563; }
  .card.ssangpi .tag { background: #7c3aed; color: #ede9fe; }
  .card .chipbadge {
    position: absolute; top: 3px; right: 3px; font-size: 8.5px; font-weight: 800;
    background: rgba(37,99,235,.14); color: #1d4ed8; border-radius: 4px; padding: 1px 3px;
  }
  .card.facedown {
    background: repeating-linear-gradient(135deg, #7f1d1d 0 8px, #991b1b 8px 16px);
    box-shadow: 0 3px 8px rgba(0,0,0,.45), inset 0 0 0 2.5px rgba(0,0,0,.4);
  }
  .card.facedown .back-q { margin: auto; font-size: 30px; color: rgba(255,255,255,.75); font-weight: 900; }
  .gukjin-mode {
    position: absolute; top: 18px; right: 2px; font-size: 8px; font-weight: 800;
    background: #7c3aed; color: #fff; border-radius: 4px; padding: 1px 3px;
  }

  /* ── 모달 ────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.62); display: none;
    align-items: center; justify-content: center; z-index: 50; padding: 18px; overflow-y: auto;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: linear-gradient(170deg, #1f3d2b, #142a1d);
    border: 1.5px solid var(--gold); border-radius: 16px; padding: 22px 26px;
    max-width: 720px; width: 100%; box-shadow: 0 18px 60px rgba(0,0,0,.6);
    max-height: 92vh; overflow-y: auto;
  }
  #modal h2 { margin: 0 0 12px; color: var(--gold-soft); font-size: 19px; }
  #modal .sub { color: #cbd5e1; font-size: 13px; line-height: 1.55; }
  .modal-actions { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .choicebtn { flex: 1; min-width: 190px; padding: 14px; border-radius: 12px; text-align: left; }
  .choicebtn .t { font-size: 16px; font-weight: 900; }
  .choicebtn .d { font-size: 11.5px; margin-top: 4px; line-height: 1.45; }
  .btn-stop { background: linear-gradient(180deg, #16a34a, #15803d); color: #fff; }
  .btn-go { background: linear-gradient(180deg, #dc2626, #991b1b); color: #fff; }

  .settle-table { width: 100%; font-size: 13.5px; border-collapse: collapse; margin-top: 8px; }
  .settle-table td { padding: 5px 4px; border-bottom: 1px dashed rgba(255,255,255,.12); }
  .settle-table td:last-child { text-align: right; font-weight: 800; color: #fbbf24; }
  .settle-table tr.total td { border-bottom: none; font-size: 15px; font-weight: 900; color: #fff; }

  /* ── 상점 ────────────────────────────── */
  .shop-offers { display: flex; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
  .offer {
    flex: 1; min-width: 165px; border-radius: 12px; padding: 12px;
    background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.16);
    display: flex; flex-direction: column; gap: 6px;
  }
  .offer.sold { opacity: .35; }
  .offer .o-name { font-weight: 900; font-size: 14.5px; }
  .offer .o-rarity { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 5px; display: inline-block; width: fit-content; }
  .r-common { background: #334155; color: #cbd5e1; }
  .r-uncommon { background: #14532d; color: #86efac; }
  .r-rare { background: #7c2d12; color: #fdba74; }
  .offer .o-desc { font-size: 11.5px; color: #cbd5e1; line-height: 1.5; flex: 1; }
  .offer .o-buy { background: linear-gradient(180deg, #d97706, #b45309); color: #fff; padding: 8px; font-weight: 800; font-size: 13px; }
  .owned-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px; }
  .owned {
    border: 1px solid var(--gold); background: rgba(212,175,55,.1); border-radius: 9px;
    padding: 7px 9px; font-size: 11px; min-width: 116px;
  }
  .owned .sellbtn { margin-top: 5px; width: 100%; background: rgba(255,255,255,.15); color: #fca5a5; font-size: 10.5px; padding: 4px; font-weight: 700; }
  .boss-preview {
    margin-top: 12px; border: 1px solid rgba(252,165,165,.45); background: rgba(127,29,29,.35);
    border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.5; color: #fecaca;
  }
  .boss-candidate { display: inline-block; margin: 5px 8px 0 0; padding: 8px 12px; border-radius: 9px; background: rgba(0,0,0,.35); border: 1.5px solid rgba(255,255,255,.2); color: #fecaca; font-size: 12px; font-weight: 700; }
  .boss-candidate.selected { border-color: var(--gold); background: rgba(212,175,55,.18); color: #fde68a; }
  .shop-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; flex-wrap: wrap; }
  #btn-nextround { background: linear-gradient(180deg, #16a34a, #15803d); color: #fff; padding: 12px 24px; font-size: 15px; font-weight: 900; }

  .handtable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .handtable th, .handtable td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,.1); text-align: left; }
  .handtable th { color: var(--gold-soft); }
  .handtable td:nth-child(3) { text-align: right; font-weight: 700; }

  #seedinfo { font-size: 10px; color: #475569; text-align: center; }
  #seasonline { font-size: 10.5px; color: #a7c4b0; margin-top: 4px; line-height: 1.55; }
  .card.season { outline: 2px solid rgba(255, 205, 70, .95); outline-offset: 1.5px; }

  /* ── 춘향 조력자 ─────────────────────── */
  #chunhyang {
    position: fixed; right: 14px; bottom: 12px; width: 152px; z-index: 40;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #ch-bubble {
    background: #fffbef; color: #3f3120; border-radius: 10px; padding: 7px 9px;
    font-size: 11px; line-height: 1.45; box-shadow: 0 3px 10px rgba(0,0,0,.35);
    position: relative; width: 100%; text-align: center; min-height: 32px;
  }
  #ch-bubble::after {
    content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #fffbef; border-bottom: none;
  }
  #ch-figure { position: relative; width: 110px; filter: drop-shadow(0 4px 8px rgba(0,0,0,.4)); }
  #ch-face { position: absolute; top: 19px; left: 50%; transform: translateX(-50%); font-size: 23px; }
  #ch-btn {
    background: linear-gradient(180deg, #d97706, #b45309); color: #fff;
    font-size: 11px; font-weight: 800; padding: 6px 10px; width: 100%;
  }
  @media (max-width: 860px) {
    #chunhyang { transform: scale(.72); transform-origin: bottom right; right: 6px; bottom: 6px; }
  }
  @media (min-width: 861px) {
    #main { padding-right: 180px; }
  }
  .shake { animation: shake .3s ease; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

  /* ── 주스 연출 ────────────────────────── */
  #juice-root {
    position: fixed; inset: 0; z-index: 55; pointer-events: none;
  }
  #juice-root.skipable { pointer-events: auto; cursor: pointer; }
  body.juicing #actions button { pointer-events: none; opacity: .45; }
  body.screen-shake { animation: screenShake .42s ease; }
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    15% { transform: translate(-7px, 3px); }
    30% { transform: translate(8px, -4px); }
    45% { transform: translate(-5px, -2px); }
    60% { transform: translate(6px, 3px); }
    75% { transform: translate(-3px, 1px); }
  }
  body.punch #main { animation: punchScale .38s ease; }
  @keyframes punchScale {
    0% { transform: scale(1); }
    35% { transform: scale(1.035); }
    100% { transform: scale(1); }
  }
  #playedarea.juice-stage {
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; min-height: 220px; border-style: solid;
    border-color: rgba(232,205,122,.35); background: rgba(0,0,0,.18);
  }
  #juice-cards { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; min-height: 98px; align-items: flex-end; }
  #juice-cards .juice-card-wrap {
    position: relative; opacity: 0; transform: translateY(28px) scale(.55);
    transition: none;
  }
  #juice-cards .juice-card-wrap.show {
    opacity: 1; transform: translateY(0) scale(1);
    animation: cardPop .38s cubic-bezier(.2,1.4,.4,1) both;
  }
  @keyframes cardPop {
    0% { transform: translateY(36px) scale(.4); opacity: 0; }
    70% { transform: translateY(-6px) scale(1.08); opacity: 1; }
    100% { transform: translateY(0) scale(1); }
  }
  #juice-cards .chip-float {
    position: absolute; left: 50%; top: -8px; transform: translate(-50%,-100%);
    font-size: 18px; font-weight: 900; color: var(--chip-blue);
    text-shadow: 0 2px 8px rgba(0,0,0,.65), 0 0 12px rgba(96,165,250,.55);
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  #juice-cards .chip-float.go {
    animation: chipFloat .7s ease forwards;
  }
  #juice-cards .chip-float.flat { color: #94a3b8; text-shadow: 0 2px 6px rgba(0,0,0,.5); }
  @keyframes chipFloat {
    0% { opacity: 0; transform: translate(-50%,-70%) scale(.6); }
    25% { opacity: 1; transform: translate(-50%,-110%) scale(1.25); }
    100% { opacity: 0; transform: translate(-50%,-160%) scale(1); }
  }
  #juice-tally {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    flex-wrap: wrap; min-height: 42px; font-weight: 900;
  }
  #juice-tally .jt-chips { font-size: 28px; color: var(--chip-blue); min-width: 3ch; text-align: right; }
  #juice-tally .jt-times { font-size: 22px; color: #94a3b8; opacity: 0; transform: scale(.5); }
  #juice-tally .jt-times.on { opacity: 1; transform: scale(1); transition: transform .25s cubic-bezier(.2,1.6,.4,1), opacity .15s; }
  #juice-tally .jt-mult {
    font-size: 28px; color: var(--mult-red); min-width: 2.5ch; opacity: 0;
    transform: scale(2.4) rotate(-8deg); filter: blur(2px);
  }
  #juice-tally .jt-mult.slam {
    opacity: 1; transform: scale(1) rotate(0); filter: blur(0);
    transition: transform .32s cubic-bezier(.15,1.5,.4,1), opacity .12s, filter .2s;
  }
  #juice-tally .jt-eq { font-size: 22px; color: #94a3b8; opacity: 0; }
  #juice-tally .jt-eq.on { opacity: 1; }
  #juice-tally .jt-score {
    font-size: 34px; color: #fff; min-width: 4ch; text-align: left;
    opacity: 0; text-shadow: 0 0 18px rgba(255,255,255,.25);
  }
  #juice-tally .jt-score.on { opacity: 1; }
  #juice-tally .jt-score.punch { animation: scorePunch .45s ease; }
  @keyframes scorePunch {
    0% { transform: scale(1); }
    40% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }
  .score-fly {
    position: fixed; z-index: 80; pointer-events: none; margin: 0;
    font-weight: 900; color: #fff; white-space: nowrap; text-align: center;
    text-shadow: 0 0 18px rgba(147,197,253,.7), 0 2px 0 rgba(0,0,0,.35);
    transition: transform .5s cubic-bezier(.2,.85,.25,1), opacity .5s ease;
    will-change: transform, opacity;
  }
  #juice-tally .jt-flat {
    width: 100%; text-align: center; font-size: 13px; color: #94a3b8;
    opacity: 0; margin-top: -4px;
  }
  #juice-tally .jt-flat.on { opacity: 1; }
  #hand-banner {
    position: fixed; left: 50%; top: 120px; transform: translate(-50%, -50%) scale(.3);
    z-index: 60; font-size: clamp(26px, 5.5vw, 48px); font-weight: 900;
    letter-spacing: 2px; opacity: 0; pointer-events: none; white-space: nowrap;
    text-shadow: 0 4px 0 rgba(0,0,0,.35), 0 0 40px rgba(0,0,0,.5);
  }

<script>
/* ================================================================

// ── 시드 RNG ──────────────────────────────────────────────
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── 카드 데이터 (한국식 화투 48장) ─────────────────────────
const MONTHS = [
  { n: 1,  name: '송학',   flower: '🌲', yeolArt: null,  gwangArt: '🕊️' },

  { n: 5,  name: '난초',   flower: '🪻', yeolArt: '🌉', gwangArt: null },
  { n: 6,  name: '모란',   flower: '🌺', yeolArt: '🦋', gwangArt: null },
  { n: 7,  name: '홍싸리', flower: '🍀', yeolArt: '🐗', gwangArt: null },
  { n: 8,  name: '공산',   flower: '🌕', yeolArt: '🪿', gwangArt: '🌕' },
  { n: 9,  name: '국진',   flower: '🌼', yeolArt: '🍶', gwangArt: null },

  { n: 12, name: '비',     flower: '🌧️', yeolArt: '🐦', gwangArt: '☔' },
];

// type: kwang | yeol | tti | ssangpi | pi
// tags: hongdan | cheongdan | chodan | bi_tti | godori | bikwang | dual
function buildDeck() {
  const d = [];
  const add = (month, type, tags = []) => d.push({ month, type, tags, asPi: false, faceDown: false });
  add(1, 'kwang');                 add(1, 'tti', ['hongdan']);   add(1, 'pi'); add(1, 'pi');
  add(2, 'yeol', ['godori']);      add(2, 'tti', ['hongdan']);   add(2, 'pi'); add(2, 'pi');
  add(3, 'kwang');                 add(3, 'tti', ['hongdan']);   add(3, 'pi'); add(3, 'pi');
  add(4, 'yeol', ['godori']);      add(4, 'tti', ['chodan']);    add(4, 'pi'); add(4, 'pi');
  add(5, 'yeol');                  add(5, 'tti', ['chodan']);    add(5, 'pi'); add(5, 'pi');
  add(6, 'yeol');                  add(6, 'tti', ['cheongdan']); add(6, 'pi'); add(6, 'pi');
  add(7, 'yeol');                  add(7, 'tti', ['chodan']);    add(7, 'pi'); add(7, 'pi');
  add(8, 'kwang');                 add(8, 'yeol', ['godori']);   add(8, 'pi'); add(8, 'pi');
  add(9, 'yeol', ['dual']);        add(9, 'tti', ['cheongdan']); add(9, 'pi'); add(9, 'pi');
  add(10, 'yeol');                 add(10, 'tti', ['cheongdan']);add(10, 'pi'); add(10, 'pi');
  add(11, 'kwang');                add(11, 'ssangpi');           add(11, 'pi'); add(11, 'pi');
  add(12, 'kwang', ['bikwang']);   add(12, 'yeol');              add(12, 'tti', ['bi_tti']); add(12, 'ssangpi');
  d.forEach((c, i) => (c.uid = i));
  return d;
}

const CHIP = { kwang: 12, yeol: 8, tti: 6, ssangpi: 5, pi: 2 };
const effType = (c) => (c.tags.includes('dual') && c.asPi) ? 'ssangpi' : c.type;
const baseChip = (c) => CHIP[effType(c)];
// 쌍피 = 피 2장 환산 (고스톱 관례). 피5 족보 판정용.
const piCount = (c) => { const t = effType(c); return t === 'ssangpi' ? 2 : t === 'pi' ? 1 : 0; };

// ── 족보표 (배열 순서 = 판정 우선순위) ─────────────────────
const HANDS = [
  { id: 'ogwang',     name: '오광',           mult: 12 },
  { id: 'sagwang',    name: '사광',           mult: 8  },
  { id: 'chongtong',  name: '총통',           mult: 7  },
  { id: 'godori',     name: '고도리',         mult: 6  },
  { id: 'samgwang',   name: '삼광',           mult: 5  },
  { id: 'bisamgwang', name: '비삼광',         mult: 4  },
  { id: 'dan',        name: '홍단/청단/초단', mult: 4  },
  { id: 'month3',     name: '같은 달 3장',    mult: 3  },

  { id: 'month2',     name: '같은 달 2장',    mult: 2  },
  { id: 'none',       name: '무조합',         mult: 1  },
];
const HAND_BY_ID = Object.fromEntries(HANDS.map((h) => [h.id, h]));

// 12판 = 1월(송학) → 12월(비). 3·6·9·12월(환절기)은 박 라운드.
const ROUNDS = 12;
const TARGETS = [160, 240, 330, 450, 600, 820, 1150, 1600, 2200, 3000, 4100, 5500];
const BOSS_ROUNDS = [3, 6, 9, 12];
const MILD_BOSSES = ['pibak', 'gwangbak', 'meongbak'];
// 고 무제한: n고 = 목표 ×(1+0.5n), 성공 보너스 n(n+3)냥 (4, 10, 18, 28, 40…)
const goMult = (n) => 1 + 0.5 * n;
const goBonus = (n) => n * (n + 3);
// n고 목표: 기본 공식과 "현재 점수 + 기본 목표의 25%" 중 큰 쪽.
// 항상 현재 점수보다 크므로 고 선언 즉시 다음 단계가 충족되는 연쇄 고는 발생 불가.
const goTarget = (base, n, score) => Math.max(Math.ceil(base * goMult(n)), score + Math.ceil(base * 0.25));

// ── 족보 판정 (고정 우선순위, 첫 매치) ─────────────────────
// core = 족보를 구성한 카드들 — 이 카드들의 칩만 배수를 타고, 나머지는 배수 없이 가산.
// "N장 이상" 족보(열끗셋·띠셋)는 기본칩 높은 N장만 코어, 초과분은 flat.
function topByBaseChip(arr, n) {
  return [...arr].sort((a, b) => baseChip(b) - baseChip(a) || a.uid - b.uid).slice(0, n);
}
function detectHandInfo(cards) {
  const kw = cards.filter((c) => c.type === 'kwang');
  const byMonth = {};
  for (const c of cards) (byMonth[c.month] = byMonth[c.month] || []).push(c);
  const monthGroups = Object.values(byMonth).sort((a, b) => b.length - a.length);
  const maxMonth = monthGroups.length ? monthGroups[0].length : 0;

  if (kw.length === 5) return { handId: 'ogwang', core: kw };
  if (kw.length === 4) return { handId: 'sagwang', core: kw };
  if (maxMonth >= 4) return { handId: 'chongtong', core: monthGroups[0] };
  const birds = cards.filter((c) => c.tags.includes('godori'));
  if (birds.length === 3) return { handId: 'godori', core: birds };
  if (kw.length === 3)
    return { handId: kw.some((c) => c.tags.includes('bikwang')) ? 'bisamgwang' : 'samgwang', core: kw };
  for (const t of ['hongdan', 'cheongdan', 'chodan']) {
    const set = cards.filter((c) => c.tags.includes(t));
    if (set.length === 3) return { handId: 'dan', core: set };
  }
  if (maxMonth >= 3) return { handId: 'month3', core: topByBaseChip(monthGroups[0], 3) };
  const yeol = cards.filter((c) => effType(c) === 'yeol');
  if (yeol.length >= 3) return { handId: 'yeol3', core: topByBaseChip(yeol, 3) };
  const tti = cards.filter((c) => c.type === 'tti');
  if (tti.length >= 3) return { handId: 'tti3', core: topByBaseChip(tti, 3) };
  // 피5: 낸 카드가 전부 피/쌍피이고, 쌍피=2로 환산해 합 ≥5
  if (cards.length >= 1 && cards.every((c) => piCount(c) > 0)
      && cards.reduce((s, c) => s + piCount(c), 0) >= 5)
    return { handId: 'pi5', core: [...cards] };
  if (maxMonth >= 2) {
    // 짝이 여럿이면 기본칩 합이 높은 쪽을 족보 코어로 (플레이어에게 유리하게, 결정적)
    let best = null, bestSum = -1;
    for (const g of monthGroups) {
      if (g.length < 2) continue;
      const s = g.reduce((a, c) => a + baseChip(c), 0);
      if (s > bestSum) { bestSum = s; best = g; }
    }
    return { handId: 'month2', core: topByBaseChip(best, 2) };
  }
  return { handId: 'none', core: [...cards] };
}
function detectHand(cards) { return detectHandInfo(cards).handId; }

// ── 특수패 12종 ────────────────────────────────────────────
// 훅 ctx: { cards, handId, boss, mitjangChips }

    addChips: (x) => (x.cards.length === 5 ? 30 : 0) },
  { id: 'jjokjipge', name: '쪽집게', icon: '🎯', rarity: 'common', price: 4, kind: '+배수',
    desc: "족보가 '같은 달 2장'이면 +2배수",

  { id: 'godori_kkun', name: '고도리꾼', icon: '🐦', rarity: 'uncommon', price: 6, kind: '+배수',

    addMult: (x) => x.cards.filter((c) => c.tags.includes('godori')).length * 3 },
  { id: 'dangol', name: '단골손님', icon: '🏮', rarity: 'uncommon', price: 6, kind: '+배수',
    desc: '족보가 홍단/청단/초단 또는 띠 셋이면 +6배수',

    desc: '낸 패에 같은 달 2장 이상이 있으면 배수 ×1.5 (흔들기 금지 판에선 무효)',

    desc: "족보가 '같은 달 3장' 또는 '총통'이면 배수 ×3",

const JOKER_BY_ID = Object.fromEntries(JOKERS.map((j) => [j.id, j]));

// ── 박 라운드 디버프 6종 ──────────────────────────────────
const BOSSES = [
  { id: 'pibak',    name: '피박',        desc: '피·쌍피의 카드 칩이 0 (족보 판정에는 카운트)' },
  { id: 'gwangbak', name: '광박',        desc: '광·비광의 카드 칩이 0' },
  { id: 'meongbak', name: '멍박',        desc: '열끗의 카드 칩이 0' },
  { id: 'no_shake', name: '흔들기 금지', desc: '같은 달 2장/3장/총통 족보가 무조합으로 강등 (흔들기 특수패도 무효)' },
  { id: 'bibaram',  name: '비바람',      desc: '이 판 동안 버리기 사용 불가' },
  { id: 'angae',    name: '안개',        desc: '손패 중 3장이 뒷면으로 온다 (내는 순간 공개)' },
];
const BOSS_BY_ID = Object.fromEntries(BOSSES.map((b) => [b.id, b]));

// ── 카드 1장의 칩 (계절/밤낮 보정 → 박 디버프 순서로 적용) ──
// env: { boss, jokerIds, mitjangChips, seasonMonth?, night? }
function cardChip(c, env) {
  let chip = baseChip(c);
  const t = effType(c);
  if (env.seasonMonth && c.month === env.seasonMonth) chip *= 2;          // 이달의 패
  if (env.night === false && (t === 'kwang' || t === 'yeol')) chip += 2;  // 낮: 광·열끗
  if (env.night === true && (t === 'tti' || t === 'ssangpi' || t === 'pi')) chip += 2; // 밤: 띠·피
  if (!env.jokerIds.includes('pibak_boheom')) {
    if (env.boss === 'pibak' && (t === 'pi' || t === 'ssangpi')) chip = 0;
    if (env.boss === 'gwangbak' && t === 'kwang') chip = 0;
    if (env.boss === 'meongbak' && t === 'yeol') chip = 0;
  }
  return chip;
}

// ── 점수 계산 (순수 함수 — 프리뷰와 실정산이 공유) ─────────
// 족보 기본칩 없음. (코어 카드칩) × 족보 배수 + 나머지(flat).
// 반환: { handId, chips, mult, flat, score, kwangPlayed }
function computeScore(cards, env) {
  let { handId, core } = detectHandInfo(cards);
  if (env.boss === 'no_shake' && ['month2', 'month3', 'chongtong'].includes(handId)) {
    handId = 'none';
    core = [...cards]; // 무조합 강등 시엔 전부 코어 (배수 1이라 결과 동일)
  }
  const hd = HAND_BY_ID[handId];
  let chips = 0;
  let mult = hd.mult;
  let flat = 0;

  const coreSet = new Set(core);
  for (const c of cards) {
    const v = cardChip(c, env);
    if (coreSet.has(c)) chips += v; else flat += v;
  }

  const ctx = { cards, handId, boss: env.boss, mitjangChips: env.mitjangChips };
  for (const id of env.jokerIds) { const j = JOKER_BY_ID[id]; if (j.addChips) chips += j.addChips(ctx); }
  for (const id of env.jokerIds) { const j = JOKER_BY_ID[id]; if (j.addMult)  mult  += j.addMult(ctx); }
  for (const id of env.jokerIds) { const j = JOKER_BY_ID[id]; if (j.xMult)    mult  *= j.xMult(ctx); }

  return {
    handId, chips, mult, flat,
    score: Math.floor(chips * mult + flat),
    kwangPlayed: cards.filter((c) => c.type === 'kwang').length,
  };
}

// ── 손패 최적 조합 탐색 (춘향 훈수 · 봇 시뮬레이션 공용) ────
function* combosOf(arr, k, start = 0, cur = []) {
  if (cur.length === k) { yield [...cur]; return; }
  for (let i = start; i <= arr.length - (k - cur.length); i++) {
    cur.push(arr[i]);
    yield* combosOf(arr, k, i + 1, cur);
    cur.pop();
  }
}
// 뒷면 카드는 제외하고 1~5장 전 부분집합을 평가 (국진은 양쪽 모드 모두 시도)
function evaluateHand(hand, env) {
  const avail = hand.filter((c) => !c.faceDown);
  const guk = avail.find((c) => c.tags.includes('dual'));
  const gukOrig = guk ? guk.asPi : null;
  let best = null;
  for (let k = 1; k <= Math.min(5, avail.length); k++) {
    for (const sub of combosOf(avail, k)) {
      const modes = guk && sub.includes(guk) ? [false, true] : [null];
      for (const m of modes) {
        if (m !== null) guk.asPi = m;
        const r = computeScore(sub, env);
        if (!best || r.score > best.score) best = { cards: [...sub], gukAsPi: m, ...r };
      }
    }
  }
  if (guk) guk.asPi = gukOrig;
  return best;
}

/* ================================================================
   ==== ENGINE END ====
   ================================================================ */

// ── 게임 상태 ──────────────────────────────────────────────
const seedParam = new URLSearchParams(location.search).get('seed');
let runSeed = seedParam ? (Number(seedParam) >>> 0) : (Math.floor(Math.random() * 4294967296) >>> 0);
let rng = mulberry32(runSeed);

const state = {
  screen: 'play', // play | gostop | settle | shop | gameover | victory | help | prep
  round: 1,
  baseTarget: TARGETS[0],
  target: TARGETS[0],
  goLevel: 0,
  roundScore: 0,
  playsLeft: 4,
  discardsLeft: 4,
  deck: [],
  hand: [],
  selected: [],       // uid 배열 (인덱스 금지)
  jokers: [],         // { id, paid }
  money: 4,
  boss: null,
  usedBosses: [],
  nextBoss: null,       // 다음 박 라운드 확정 디버프 (3·6판용)
  bossCandidates: null, // 최종(12월) 라운드용 후보 2종 [id, id]
  shopOffers: [],       // { joker, sold }
  rerollCost: 2,
  kwangSoldThisRound: 0,
  mitjangChips: 0,
  makgeolli: 0,         // 레거시 미사용 (호환용)
  chunhyangNext: false, // 상점에서 다음 달 훈수 예약
  drunk: false,         // 이번 달 춘향이 훈수 활성 (라운드 시작 시 예약 소비)
  hoverReact: null,     // 내기/버리기 호버 예측 표정 { mood, text } | null
  lastPlay: null,       // { cards 스냅샷, result, scoreBefore }
  juicing: false,       // 연출 중 입력 잠금 (중간값은 state에 안 넣음)
  playLog: [],
  settleData: null,
  gameOverReason: '',
  stats: { bestSingle: 0, bestSingleHand: '', totalEarned: 0 },
  helpReturn: null,
};

const hasJoker = (id) => state.jokers.some((j) => j.id === id);
const jokerIds = () => state.jokers.map((j) => j.id);
const isBossRound = (r) => BOSS_ROUNDS.includes(r);
// 판 번호 = 월. 홀수 달 = 낮(광·열끗 +3칩), 짝수 달 = 밤(띠·피 +3칩)
const isNight = () => state.round % 2 === 0;
const scoreEnv = () => ({
  boss: state.boss, jokerIds: jokerIds(), mitjangChips: state.mitjangChips,
  seasonMonth: state.round, night: isNight(),
});

function addMoney(n) {
  state.money += n;
  if (n > 0) {
    state.stats.totalEarned += n;
    spawnCoinParticles(n);
  }
}

// ── 판 진행 ────────────────────────────────────────────────
function startRound() {
  state.deck = shuffle(buildDeck(), rng);
  state.hand = [];
  state.selected = [];
  state.roundScore = 0;
  state.playsLeft = 4;
  state.discardsLeft = 4;
  state.goLevel = 0;
  state.baseTarget = TARGETS[state.round - 1];
  state.target = state.baseTarget;
  state.kwangSoldThisRound = 0;
  state.drunk = !!state.chunhyangNext; // 라운드 시작 전 예약한 훈수 활성화
  state.chunhyangNext = false;
  state.hoverReact = null;
  state.lastPlay = null;
  state.playLog = [];

  state.boss = isBossRound(state.round) ? state.nextBoss : null;
  state.nextBoss = null;
  state.bossCandidates = null;
  if (state.boss) {
    state.usedBosses.push(state.boss);
    if (state.boss === 'bibaram') state.discardsLeft = 0;
  }

  refillHand(true);
  state.screen = 'play';
  render();
}

function refillHand(isRoundStart = false) {
  const drawn = [];
  while (state.hand.length < 8 && state.deck.length > 0) {
    const c = state.deck.pop();
    state.hand.push(c);
    drawn.push(c);
  }
  if (state.boss === 'angae') {
    // 뒷면은 항상 최대 3장 유지 — 새로 뽑힌 카드 중에서만 지정 (공개된 카드는 다시 안 뒤집힘)
    const pool = isRoundStart ? [...state.hand] : [...drawn];
    let downCount = state.hand.filter((c) => c.faceDown).length;
    const candidates = pool.filter((c) => !c.faceDown);
    shuffle(candidates, rng);
    for (const c of candidates) {
      if (downCount >= 3) break;
      c.faceDown = true;
      downCount++;
    }
  }
  sortHand();
}

const TYPE_ORDER = { kwang: 0, yeol: 1, tti: 2, ssangpi: 3, pi: 4 };
function sortHand() {
  state.hand.sort((a, b) => {
    if (a.faceDown !== b.faceDown) return a.faceDown ? 1 : -1; // 뒷면은 맨 뒤 (정렬로 정보 누출 방지)
    if (a.month !== b.month) return a.month - b.month;
    return TYPE_ORDER[a.type] - TYPE_ORDER[b.type];
  });
}

function selectedCards() {
  return state.selected.map((uid) => state.hand.find((c) => c.uid === uid)).filter(Boolean);
}

function toggleSelect(uid) {
  if (state.screen !== 'play' || state.juicing) return;
  const i = state.selected.indexOf(uid);
  if (i >= 0) state.selected.splice(i, 1);
  else {
    if (state.selected.length >= 5) { flashActions(); return; }
    state.selected.push(uid);
  }
  state.hoverReact = null;
  render();
}

function toggleGukjin() {
  if (state.screen !== 'play' || state.juicing) return;
  const g = state.hand.find((c) => c.tags.includes('dual') && !c.faceDown);
  if (!g) return;
  g.asPi = !g.asPi;
  render();
}

// ── 내기 ───────────────────────────────────────────────────
function playSelected() {
  if (state.screen !== 'play' || state.juicing) return;
  const cards = selectedCards();
  if (cards.length < 1 || cards.length > 5 || state.playsLeft <= 0) return;

  // 안개: 뒷면 카드 공개 — 뒷면 국진은 점수가 높은 모드 자동 선택
  for (const c of cards) {
    if (c.faceDown) {
      c.faceDown = false;
      if (c.tags.includes('dual')) {
        c.asPi = false;
        const a = computeScore(cards, scoreEnv()).score;
        c.asPi = true;
        const b = computeScore(cards, scoreEnv()).score;
        c.asPi = b > a;
      }
    }
  }

  const env = scoreEnv();
  const result = computeScore(cards, env);
  const scoreBefore = state.roundScore;

  // 경제 트리거 (실정산에서만)
  if (hasJoker('gwangpari') && result.kwangPlayed > 0) {
    const n = Math.min(result.kwangPlayed, 3 - state.kwangSoldThisRound);
    if (n > 0) { addMoney(n); state.kwangSoldThisRound += n; }
  }

  state.roundScore += result.score;
  if (result.score > state.stats.bestSingle) {
    state.stats.bestSingle = result.score;
    state.stats.bestSingleHand = HAND_BY_ID[result.handId].name;
  }
  state.playsLeft--;
  state.playLog.push({ hand: HAND_BY_ID[result.handId].name, score: result.score });

  // 낸 패 스냅샷 (국진 모드 포함) — 연출은 이 스냅샷만 재생
  state.lastPlay = {
    cards: cards.map((c) => ({ ...c, tags: [...c.tags] })),
    result,
    scoreBefore,
    env: { ...env, jokerIds: [...env.jokerIds] },
  };

  state.hand = state.hand.filter((c) => !state.selected.includes(c.uid));
  state.selected = [];
  refillHand();

  // 고/스톱·게임오버는 연출 끝난 뒤에 (모달 중첩·조기 전환 방지)
  state.juicing = true;
  document.body.classList.add('juicing');
  render();
  playJuiceSequence(state.lastPlay).then(() => {
    state.juicing = false;
    document.body.classList.remove('juicing');
    checkAfterPlay();
    render();
  });
}

function checkAfterPlay() {
  if (state.roundScore >= state.target) {
    if (state.round === ROUNDS) { victory(); return; }
    if (state.playsLeft === 0) { settle(); return; }
    state.screen = 'gostop'; // 고는 무제한 — 남은 내기가 있는 한 계속 선택 가능
  } else if (state.playsLeft === 0) {
    gameOver(state.goLevel > 0 ? '고박' : '목표 미달');
  }
}

function chooseGo() {
  if (state.screen !== 'gostop') return;
  state.goLevel++;
  state.target = goTarget(state.baseTarget, state.goLevel, state.roundScore);
  state.screen = 'play';
  checkAfterPlay(); // goTarget이 항상 현재 점수보다 크므로 즉시 재진입은 없음 (방어적 재판정)
  render();
}

function chooseStop() {
  if (state.screen !== 'gostop') return;
  settle();
  render();
}

// ── 버리기 ─────────────────────────────────────────────────
function discardSelected() {
  if (state.screen !== 'play' || state.juicing) return;
  const cards = selectedCards();
  if (cards.length < 1 || cards.length > 5 || state.discardsLeft <= 0) return;
  const uids = cards.map((c) => c.uid);
  state.discardsLeft--;
  if (hasJoker('mitjang')) state.mitjangChips += 8;
  state.selected = [];
  state.hoverReact = null;
  state.discardAnimUids = uids;
  state.juicing = true;
  document.body.classList.add('juicing');
  render(); // 손패에 남긴 채로 날아가는 애니
  sfxDiscard();

  const finish = () => {
    state.hand = state.hand.filter((c) => !uids.includes(c.uid));
    state.discardAnimUids = null;
    refillHand();
    state.juicing = false;
    document.body.classList.remove('juicing');
    state.dealInUids = state.hand.slice(-uids.length).map((c) => c.uid);
    render();
    setTimeout(() => { state.dealInUids = null; }, 500);
  };

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) finish();
  else setTimeout(finish, 480);
}

// ── 정산 ───────────────────────────────────────────────────
function settle() {
  const interest = Math.min(Math.floor(state.money / 5), 5); // 정산 진입 시점 보유금 기준, 가장 먼저
  const base = isBossRound(state.round) ? 6 : 4;
  const playBonus = state.playsLeft;
  const goB = state.goLevel > 0 ? goBonus(state.goLevel) : 0;
  const insBonus = hasJoker('pibak_boheom') ? 1 : 0;
  const total = interest + base + playBonus + goB + insBonus;
  state.settleData = { interest, base, playBonus, goBonus: goB, insBonus, total, moneyBefore: state.money };
  addMoney(total);
  state.screen = 'settle';
}

// ── 상점 ───────────────────────────────────────────────────
function openShop() {
  state.rerollCost = 2;
  state.shopOffers = genOffers();
  const next = state.round + 1;
  state.nextBoss = null;
  state.bossCandidates = null;
  if (isBossRound(next)) {
    const pool = (next === 3 ? MILD_BOSSES : BOSSES.map((b) => b.id))
      .filter((id) => !state.usedBosses.includes(id));
    shuffle(pool, rng);
    if (next === ROUNDS) {
      state.bossCandidates = pool.slice(0, 2);
      if (state.bossCandidates.length === 1) state.nextBoss = state.bossCandidates[0];
    } else {
      state.nextBoss = pool[0];
    }
  }
  state.screen = 'shop';
  render();
}

function genOffers() {
  const owned = jokerIds();
  const pool = JOKERS.filter((j) => !owned.includes(j.id));
  const offers = [];
  for (let i = 0; i < 3; i++) {
    const avail = pool.filter((j) => !offers.some((o) => o.joker.id === j.id));
    if (!avail.length) break;
    const r = rng();
    const want = r < 0.6 ? 'common' : r < 0.9 ? 'uncommon' : 'rare';
    let cands = avail.filter((j) => j.rarity === want);
    if (!cands.length) cands = avail;
    offers.push({ joker: cands[Math.floor(rng() * cands.length)], sold: false });
  }
  return offers;
}

function buyJoker(i) {
  if (state.screen !== 'shop') return;
  const offer = state.shopOffers[i];
  if (!offer || offer.sold) return;
  if (state.jokers.length >= 5 || state.money < offer.joker.price) { flashActions(); return; }
  state.money -= offer.joker.price;
  state.jokers.push({ id: offer.joker.id, paid: offer.joker.price });
  offer.sold = true;
  render();
}

function sellJoker(i) {
  if (state.screen !== 'shop') return;
  const j = state.jokers[i];
  if (!j) return;
  addMoney(Math.floor(j.paid / 2));
  if (j.id === 'mitjang') state.mitjangChips = 0;
  state.jokers.splice(i, 1);
  render();
}

function reroll() {
  if (state.screen !== 'shop' || state.money < state.rerollCost) return;
  state.money -= state.rerollCost;
  state.rerollCost++;
  state.shopOffers = genOffers();
  render();
}

function pickBossCandidate(id) {
  if (state.screen !== 'shop' || !state.bossCandidates) return;
  state.nextBoss = id;
  render();
}

function nextRound() {
  if (state.screen !== 'shop') return;
  if (isBossRound(state.round + 1) && !state.nextBoss) { flashActions(); return; }
  state.round++;
  startRound();
}

// ── 종료 ───────────────────────────────────────────────────
function gameOver(reason) {
  state.gameOverReason = reason;
  state.screen = 'gameover';
}
function victory() {
  state.screen = 'victory';
}
function restart() {
  runSeed = seedParam ? (Number(seedParam) >>> 0) : (Math.floor(Math.random() * 4294967296) >>> 0);
  rng = mulberry32(runSeed);
  Object.assign(state, {
    round: 1, goLevel: 0, roundScore: 0, playsLeft: 4, discardsLeft: 4,
    deck: [], hand: [], selected: [], jokers: [], money: 4, boss: null, usedBosses: [],
    nextBoss: null, bossCandidates: null, shopOffers: [], rerollCost: 2,
    kwangSoldThisRound: 0, mitjangChips: 0, makgeolli: 0,
    chunhyangNext: false, drunk: false, hoverReact: null, tempReact: null,
    lastPlay: null, juicing: false, playLog: [],
    settleData: null, gameOverReason: '',
    stats: { bestSingle: 0, bestSingleHand: '', totalEarned: 0 },
  });
  state.baseTarget = TARGETS[0];
  state.target = TARGETS[0];
  state.screen = 'prep';
  render();
}

// ── 도움말 ─────────────────────────────────────────────────
function openHelp() {
  if (state.screen === 'help') return;
  state.helpReturn = state.screen;
  state.screen = 'help';
  render();
}
function closeHelp() {
  state.screen = state.helpReturn || 'play';
  state.helpReturn = null;
  render();
}

// ── 조력자: 춘향 ───────────────────────────────────────────
// 라운드 시작 전(준비/상점)에 예약 → 해당 월 내내 훈수. 판 중 막걸리 주기는 없음.
function buyChunhyangNext() {
  if (!(state.screen === 'shop' || state.screen === 'prep')) return;
  if (state.chunhyangNext || state.money < 3) return;
  state.money -= 3;
  state.chunhyangNext = true;
  render();
}

function beginFromPrep() {
  if (state.screen !== 'prep') return;
  startRound();
}

// 기본 훈수 (호버 없을 때) — 수치 없이 감만
function chunhyangHint() {
  if (!state.drunk || (state.screen !== 'play' && state.screen !== 'gostop')) return null;
  const env = scoreEnv();
  const best = evaluateHand(state.hand, env);
  if (!best) return { mood: '😐', text: '어머, 패가 없네요…' };
  const pace = Math.max(1, state.target - state.roundScore) / Math.max(1, state.playsLeft);
  const tier = HANDS.findIndex((h) => h.id === best.handId);
  if (tier >= 0 && tier <= 6)
    return { mood: '😍', text: `${HAND_BY_ID[best.handId].name}이 손에 있어요! 지금이 찬스예요!` };
  if (best.score >= pace * 1.5)
    return { mood: '😊', text: '이 손패면 넉넉해요~ 자신 있게 나가봐요.' };
  if (best.score >= pace * 0.9)
    return { mood: '🙂', text: '나쁘지 않아요. 한 수 한 수 차근차근!' };
  if (state.discardsLeft > 0 && state.deck.length > 0) {
    const keep = new Set(best.cards.map((c) => c.uid));
    const junk = state.hand
      .filter((c) => !keep.has(c.uid) && !c.faceDown)
      .sort((a, b) => cardChip(a, env) - cardChip(b, env))
      .slice(0, 3);
    if (junk.length) {
      const incoming = state.deck.slice(-junk.length);
      const trial = [...state.hand.filter((c) => !junk.includes(c)), ...incoming];
      const tb = evaluateHand(trial, env);
      if (tb && tb.score > best.score * 1.1)
        return { mood: '🤔', text: '음… 버리면 좋은 패가 올 것 같은 촉이 와요!' };
    }
  }
  return { mood: '😰', text: '패가 안 좋아요… 조심해서 내야겠어요.' };
}

// 선택 패로 내기/버리기 호버 시 — 덱 위를 엿봐 표정 변화 (수치 비공개)
function chunhyangHoverPredict(action) {
  if (!state.drunk || state.screen !== 'play' || state.juicing) return null;
  const sel = selectedCards();
  if (sel.length < 1) return null;
  const env = scoreEnv();
  const n = sel.length;
  const selSet = new Set(sel.map((c) => c.uid));
  const rest = state.hand.filter((c) => !selSet.has(c.uid));
  const incoming = state.deck.slice(-n);
  const pace = Math.max(1, state.target - state.roundScore) / Math.max(1, state.playsLeft);

  if (action === 'play') {
    if (sel.some((c) => c.faceDown)) return { mood: '🫣', text: '뒷면이 있어서… 뚜껑 열어봐야 알겠어요.' };
    const play = computeScore(sel, env);
    const trial = [...rest, ...incoming];
    const after = evaluateHand(trial, env);
    const afterScore = after ? after.score : 0;
    if (play.score >= pace * 1.4)
      return { mood: '🤩', text: '지금 내면 든든해요! 좋아요!' };
    if (play.score >= pace * 0.85)
      return { mood: '😊', text: '괜찮은 수예요. 내도 될 듯!' };
    if (afterScore > play.score * 1.25 && state.discardsLeft > 0)
      return { mood: '🤔', text: '음… 버리기가 더 나을지도?' };
    if (play.score < pace * 0.5)
      return { mood: '😰', text: '지금은 좀 약해요…' };
    return { mood: '🙂', text: '그럭저럭이에요. 선택은 당신 몫~' };
  }

  // discard
  if (state.discardsLeft <= 0 || state.boss === 'bibaram')
    return { mood: '😅', text: '이번엔 버리기를 못 해요…' };
  if (state.deck.length === 0) return { mood: '😐', text: '덱이 비었어요.' };
  const trial = [...rest, ...incoming];
  const before = evaluateHand(state.hand, env);
  const after = evaluateHand(trial, env);
  const b = before ? before.score : 0;
  const a = after ? after.score : 0;
  if (a >= b * 1.35 && a >= pace * 0.9)
    return { mood: '😍', text: '버리세요! 좋은 패가 올 촉이에요!' };
  if (a > b * 1.1)
    return { mood: '😊', text: '버리면 조금 나아질 것 같아요~' };
  if (a < b * 0.85)
    return { mood: '😱', text: '잠깐! 버리면 더 안 좋아질지도…' };
  return { mood: '🤔', text: '비슷해요… 취향껏!' };
}

function setChunhyangHover(action) {
  state.hoverReact = chunhyangHoverPredict(action);
  renderChunhyang();
}
function clearChunhyangHover() {
  if (!state.hoverReact) return;
  state.hoverReact = null;
  renderChunhyang();
}

/* ================================================================
   렌더링 (상태 → DOM 단방향)
   ================================================================ */
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
const fmt = (n) => n.toLocaleString('ko-KR');
const fmtMult = (m) => (Number.isInteger(m) ? m : m.toFixed(2).replace(/0+$/, '').replace(/\.$/, ''));

const TTI_LABEL = { hongdan: '홍단', cheongdan: '청단', chodan: '초단', bi_tti: '비단' };

function cardHTML(card, opts = {}) {
  const M = MONTHS[card.month - 1];
  const discarding = state.discardAnimUids && state.discardAnimUids.includes(card.uid);
  const dd = discarding ? state.discardAnimUids.indexOf(card.uid) : -1;
  if (card.faceDown && !opts.reveal) {
    const selCls = opts.selectable && state.selected.includes(card.uid) && !discarding ? ' sel' : '';
    const discCls = discarding ? ' discarding' : '';
    const styleAttr = discarding ? ` style="--dd:${dd}"` : '';
    const click = opts.selectable && !discarding ? ` onclick="toggleSelect(${card.uid})"` : '';
    return `<div class="card facedown${selCls}${discCls}${opts.selectable && !discarding ? '' : ' static'}"${styleAttr}${click}><div class="back-q">?</div></div>`;
  }
  const t = effType(card);
  let cls = `card ${t === 'ssangpi' && card.type === 'yeol' ? 'ssangpi' : card.type}`;
  let body = '', tag = '', badge = '';
  if (card.type === 'kwang') {
    if (card.tags.includes('bikwang')) cls += ' rain';
    body = `<div class="art">${M.gwangArt}</div><div class="gwangmark">光</div>`;
    tag = card.tags.includes('bikwang') ? '비광' : '광';
  } else if (card.type === 'yeol') {
    body = `<div class="art">${M.yeolArt}</div>`;
    if (card.tags.includes('dual')) {
      tag = card.asPi ? '국진→쌍피' : '국진·열끗';
      badge = `<div class="gukjin-mode">${card.asPi ? '쌍피' : '열끗'}</div>`;
      if (card.asPi) cls = 'card ssangpi';
    } else {
      tag = card.tags.includes('godori') ? '열끗·새' : '열끗';
    }
  } else if (card.type === 'tti') {
    const color = card.tags.find((x) => TTI_LABEL[x]) || 'bi_tti';
    cls += ' ' + color;
    body = `<div class="ribbon">${color === 'chodan' ? '' : TTI_LABEL[color]}</div>`;
    tag = TTI_LABEL[color];
  } else {
    body = `<div class="art">${M.flower}</div>`;
    tag = card.type === 'ssangpi' ? '쌍피' : '피';
  }
  const chip = cardChip(card, scoreEnv());
  if (card.month === state.round) cls += ' season'; // 이달의 패 강조
  const selCls = opts.selectable && state.selected.includes(card.uid) && !discarding ? ' sel' : '';
  const dealCls = state.dealInUids && state.dealInUids.includes(card.uid) ? ' deal-in' : '';
  const discCls = discarding ? ' discarding' : '';
  const styleBits = [];
  if (dealCls) styleBits.push(`--di:${state.dealInUids.indexOf(card.uid)}`);
  if (discarding) styleBits.push(`--dd:${dd}`);
  const styleAttr = styleBits.length ? ` style="${styleBits.join(';')}"` : '';
  const click = opts.selectable && !discarding ? ` onclick="toggleSelect(${card.uid})"` : '';
  return `<div class="${cls}${selCls}${dealCls}${discCls}${opts.selectable && !discarding ? '' : ' static'}"${styleAttr}${click}>
    <div class="chipbadge">+${chip}</div>
    <div class="month">${card.month}月</div>
    <div class="mname">${M.name}</div>
    ${body}${badge}
    <div class="tag">${tag}</div>
  </div>`;
}

function render() {
  renderTopbar();
  renderSide();
  renderTable();
  renderChunhyang();
  renderModal();
}

function renderChunhyang() {
  const hint = chunhyangHint();
  const face = $('ch-face');
  const bubble = $('ch-bubble');
  if (state.tempReact && Date.now() < state.tempReact.expires) {
    face.textContent = state.tempReact.mood;
    bubble.textContent = state.tempReact.text;
  } else if (state.hoverReact) {
    face.textContent = state.hoverReact.mood;
    bubble.textContent = state.hoverReact.text;
  } else if (hint) {
    face.textContent = hint.mood;
    bubble.textContent = hint.text;
  } else if (state.drunk) {
    face.textContent = '😊';
    bubble.textContent = '이번 달 훈수 중이에요. 패 고르고 버튼에 올려보세요~';
  } else if (state.screen === 'prep' || state.screen === 'shop') {
    face.textContent = state.chunhyangNext ? '😄' : '😴';
    bubble.textContent = state.chunhyangNext
      ? '다음 달 훈수 예약됐어요! 잘 부탁드려요~'
      : '다음 달 훈수는 3냥이에요. 시작 전에 예약해 주세요.';
  } else {
    face.textContent = '😴';
    bubble.textContent = '이번 달은 훈수 없어요… (상점에서 다음 달 예약)';
  }
  const btn = $('ch-btn');
  if (state.screen === 'prep' || state.screen === 'shop') {
    btn.style.display = '';
    if (state.chunhyangNext) {
      btn.textContent = '✓ 다음 달 훈수 예약됨';
      btn.disabled = true;
    } else {
      btn.textContent = `🍶 다음 달 훈수 예약 (3냥)`;
      btn.disabled = state.money < 3;
    }
  } else if (state.drunk) {
    btn.style.display = '';
    btn.textContent = `🍶 ${state.round}월 훈수 중`;
    btn.disabled = true;
  } else {
    btn.style.display = '';
    btn.textContent = '🍶 훈수 없음';
    btn.disabled = true;
  }
}

function renderTopbar() {
  let slots = '';
  for (let i = 0; i < 5; i++) {
    const j = state.jokers[i];
    if (j) {
      const def = JOKER_BY_ID[j.id];
      slots += `<div class="jokerslot filled" title="${esc(def.desc)}">
        <div class="jname">${def.icon} ${def.name}</div>
        <div class="jdesc">${esc(def.kind)}${def.id === 'mitjang' ? ` · 현재 +${state.mitjangChips}칩` : ''}</div>
      </div>`;
    } else {
      slots += `<div class="jokerslot">특수패<br>빈 슬롯</div>`;
    }
  }
  $('jokerbar').innerHTML = slots;
  $('moneybox').textContent = `💰 ${state.money}냥`;
}

function renderSide() {
  const bossTag = isBossRound(state.round) ? ' <span class="bak">(박)</span>' : '';
  const M = MONTHS[state.round - 1];
  $('roundlabel').innerHTML = `${M.flower} ${state.round}월 · ${M.name} ${isNight() ? '🌙' : '☀️'}` +
    ` <span style="color:#94a3b8;font-size:11px">(판 ${state.round}/${ROUNDS})</span>${bossTag}`;
  $('seasonline').innerHTML = `이달의 패: <b style="color:#fde68a">${state.round}월 카드 칩 ×2</b><br>` +
    (isNight() ? '밤 🌙 — 띠·피·쌍피 칩 +2' : '낮 ☀️ — 광·열끗 칩 +2');

  const bb = $('bossbanner');
  if (state.boss) {
    const b = BOSS_BY_ID[state.boss];
    const nullified = hasJoker('pibak_boheom') && MILD_BOSSES.includes(state.boss);
    bb.style.display = 'block';
    bb.innerHTML = `⚠ <b>${b.name}</b> — ${esc(b.desc)}${nullified ? ' <span class="nullified">→ 피박보험으로 무효!</span>' : ''}`;
  } else bb.style.display = 'none';

  $('target-val').textContent = fmt(state.target);
  // 연출 중엔 사이드 점수를 연출 시작값으로 두고, juice가 DOM을 직접 롤업
  const displayScore = (state.juicing && state.lastPlay)
    ? state.lastPlay.scoreBefore
    : state.roundScore;
  $('score-val').textContent = fmt(displayScore);
  $('gauge-fill').style.width = Math.min(100, (displayScore / state.target) * 100) + '%';
  $('gauge-fill').classList.remove('overflow');
  $('gauge').classList.remove('overflow');

  const gl = $('golevel');
  if (state.goLevel > 0) {
    gl.style.display = 'block';
    gl.textContent = `🔥 ${state.goLevel}고! (목표 ×${goMult(state.goLevel)} · 성공 시 +${goBonus(state.goLevel)}냥)`;
  } else gl.style.display = 'none';

  // 프리뷰
  const pv = $('previewbox');
  const sel = selectedCards();
  if (sel.length === 0) {
    pv.innerHTML = `<div class="pv-empty">손패에서 카드를 1~5장 선택하면<br>족보와 예상 점수가 여기 표시됩니다.</div>`;
  } else if (sel.some((c) => c.faceDown)) {
    pv.innerHTML = `<div class="pv-hand">?</div><div class="pv-empty">뒷면 카드가 포함되어 있어<br>점수를 미리 볼 수 없습니다.</div>`;
  } else {
    const r = computeScore(sel, scoreEnv());
    pv.innerHTML = `
      <div class="pv-hand">${HAND_BY_ID[r.handId].name}</div>
      <div class="pv-formula"><span class="c">${fmt(r.chips)}칩</span> × <span class="m">${fmtMult(r.mult)}배</span>${r.flat ? ` + ${fmt(r.flat)}` : ''}</div>
      <div class="pv-score">= ${fmt(r.score)}점</div>`;
  }

  $('plays-val').textContent = `${state.playsLeft} / 4`;
  $('discards-val').textContent = state.boss === 'bibaram' ? '금지 (비바람)' : `${state.discardsLeft} / 4`;
  $('deck-val').textContent = `${state.deck.length}장`;

  const lp = $('playlog-panel');
  if (state.playLog.length > 0) {
    lp.style.display = 'block';
    $('playlog').innerHTML = state.playLog
      .map((p, i) => `<div><span><span class="lognum">${i + 1}.</span> ${esc(p.hand)}</span><b>${fmt(p.score)}</b></div>`)
      .join('');
  } else lp.style.display = 'none';

  $('seedinfo').textContent = `seed: ${runSeed}`;
}

function renderTable() {
  const pa = $('playedarea');
  if (state.juicing) {
    // playedarea는 juice/discard 시퀀스가 소유 — 손패·버튼만 갱신
  } else if (state.lastPlay) {
    // 카드 선택마다 innerHTML을 다시 그리면 점수 애니/깜빡임이 반복되므로 시그니처로 스킵
    const r = state.lastPlay.result;
    const sig = `${r.handId}:${r.score}:${state.lastPlay.cards.map((c) => c.uid).join(',')}`;
    if (pa.dataset.playSig !== sig) {
      pa.dataset.playSig = sig;
      pa.classList.remove('juice-stage');
      pa.innerHTML =
        state.lastPlay.cards.map((c) => cardHTML(c, { reveal: true })).join('') +
        `<div id="playresult">
          <div class="r-hand">${HAND_BY_ID[r.handId].name}</div>
          <div class="r-formula"><span class="c">${fmt(r.chips)}칩</span> × <span class="m">${fmtMult(r.mult)}배</span>${r.flat ? ` + ${fmt(r.flat)}` : ''}</div>
          <div class="r-score">+${fmt(r.score)}점</div>
        </div>`;
    }
  } else {
    pa.dataset.playSig = '';
    pa.classList.remove('juice-stage');
    pa.innerHTML = `<div class="hint">여기에 낸 패와 점수가 표시됩니다 — 카드를 선택하고 [내기]를 누르세요</div>`;
  }

  $('handarea').innerHTML = state.hand.map((c) => cardHTML(c, { selectable: true })).join('');

  const n = state.selected.length;
  const canAct = state.screen === 'play' && !state.juicing;
  $('btn-play').textContent = `내기 (${state.playsLeft}회 남음)`;
  $('btn-play').disabled = !canAct || n < 1 || n > 5 || state.playsLeft <= 0;
  $('btn-discard').textContent = `버리기 (${state.discardsLeft}회 남음)`;
  $('btn-discard').disabled = !canAct || n < 1 || n > 5 || state.discardsLeft <= 0;
  // 춘향 호버 예측 — 매 render마다 리스너 재바인딩
  $('btn-play').onmouseenter = () => setChunhyangHover('play');
  $('btn-play').onmouseleave = () => clearChunhyangHover();
  $('btn-discard').onmouseenter = () => setChunhyangHover('discard');
  $('btn-discard').onmouseleave = () => clearChunhyangHover();

  const g = state.hand.find((c) => c.tags.includes('dual') && !c.faceDown);
  const bg = $('btn-gukjin');
  if (g && canAct) {
    bg.style.display = 'inline-block';
    bg.textContent = `국진 모드: ${g.asPi ? '쌍피' : '열끗'} (전환)`;
  } else bg.style.display = 'none';
}

/* ================================================================
   주스 연출 (오버레이 — state 중간값 오염 금지, lastPlay 스냅샷만 재생)
   ================================================================ */
const JUICE = {
  skip: false,
  running: false,
  onSkip: null,
};

function juiceWait(ms) {
  return new Promise((resolve) => {
    if (JUICE.skip) { resolve(); return; }
    const t = setTimeout(resolve, ms);
    const prev = JUICE.onSkip;
    JUICE.onSkip = () => { clearTimeout(t); prev && prev(); resolve(); };
  });
}

function juiceTier(handId) {
  const i = HANDS.findIndex((h) => h.id === handId);
  if (i <= 1) return 'S';
  if (i <= 5) return 'A';
  if (i <= 8) return 'B';
  if (i <= 11) return 'C';
  return 'D';
}

function juiceBreakdown(snap) {
  const { cards, result, env } = snap;
  let { handId, core } = detectHandInfo(cards);
  if (env.boss === 'no_shake' && ['month2', 'month3', 'chongtong'].includes(handId)) {
    handId = 'none';
    core = [...cards];
  }
  const coreSet = new Set(core);
  const steps = cards.map((c) => ({
    card: c,
    chip: cardChip(c, env),
    isCore: coreSet.has(c),
  }));
  const coreSum = steps.filter((s) => s.isCore).reduce((a, s) => a + s.chip, 0);
  const flatSum = steps.filter((s) => !s.isCore).reduce((a, s) => a + s.chip, 0);
  const jokerChips = Math.max(0, result.chips - coreSum);
  return { handBase: 0, steps, jokerChips, flatSum, mult: result.mult, score: result.score, handId: result.handId };
}

// ── Web Audio 신스 (파일 없음) ─────────────────────────────
let _audioCtx = null;
function audioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function beep(freq, dur, type = 'square', gain = 0.04, slideTo = null) {
  try {
    const ctx = audioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, ctx.currentTime);
    if (slideTo != null) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), ctx.currentTime + dur);
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch (_) { /* autoplay 정책 등 */ }
}
function sfxChip() { beep(660 + Math.random() * 80, 0.07, 'square', 0.035); }
function sfxMult() { beep(180, 0.22, 'sawtooth', 0.05, 420); setTimeout(() => beep(520, 0.12, 'square', 0.04), 80); }
function sfxScore() { beep(392, 0.1, 'triangle', 0.04); setTimeout(() => beep(523, 0.12, 'triangle', 0.045), 70); setTimeout(() => beep(659, 0.18, 'triangle', 0.05), 140); }
function sfxBanner(tier) {
  const base = { S: 520, A: 440, B: 370, C: 330, D: 260 }[tier] || 300;
  beep(base, 0.15, 'sawtooth', 0.045); setTimeout(() => beep(base * 1.5, 0.2, 'triangle', 0.04), 90);
}
function sfxOverflow() { beep(200, 0.15, 'square', 0.04, 800); setTimeout(() => beep(900, 0.2, 'triangle', 0.05), 100); }
function sfxCoin() { beep(980, 0.06, 'square', 0.03); setTimeout(() => beep(1310, 0.08, 'square', 0.025), 40); }
function sfxDiscard() {
  beep(420, 0.08, 'triangle', 0.03, 180);
  setTimeout(() => beep(280, 0.1, 'sawtooth', 0.025, 120), 50);
}

function flyScoreToSide(fromEl, toEl, label) {
  return new Promise((resolve) => {
    if (JUICE.skip || !fromEl || !toEl) { resolve(); return; }
    const a = fromEl.getBoundingClientRect();
    const b = toEl.getBoundingClientRect();
    if (a.width < 1 || b.width < 1) { resolve(); return; }
    const ghost = document.createElement('div');
    ghost.className = 'score-fly';
    ghost.textContent = label;
    const fs = parseFloat(getComputedStyle(fromEl).fontSize) || 34;
    ghost.style.left = a.left + 'px';
    ghost.style.top = a.top + 'px';
    ghost.style.fontSize = fs + 'px';
    document.body.appendChild(ghost);
    fromEl.style.opacity = '0';
    void ghost.offsetWidth;
    const dx = (b.left + b.width / 2) - (a.left + a.width / 2);
    const dy = (b.top + b.height / 2) - (a.top + a.height / 2);
    ghost.style.transform = `translate(${dx}px, ${dy}px) scale(0.4)`;
    ghost.style.opacity = '0.35';
    const done = () => { ghost.remove(); resolve(); };
    ghost.addEventListener('transitionend', done, { once: true });
    setTimeout(done, 560);
  });
}

function animateNumber(el, from, to, ms, formatter = fmt) {
  return new Promise((resolve) => {
    if (JUICE.skip || ms <= 0 || from === to) {
      el.textContent = formatter(to);
      resolve();
      return;
    }
    const t0 = performance.now();
    const tick = (now) => {
      if (JUICE.skip) { el.textContent = formatter(to); resolve(); return; }
      const p = Math.min(1, (now - t0) / ms);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = formatter(Math.round(from + (to - from) * eased));
      if (p < 1) requestAnimationFrame(tick);
      else resolve();
    };
    requestAnimationFrame(tick);
  });
}

function armJuiceSkip() {
  const root = $('juice-root');
  root.classList.add('skipable');
  const handler = () => { JUICE.skip = true; JUICE.onSkip && JUICE.onSkip(); };
  root.addEventListener('click', handler, { once: true });
  const keyHandler = (e) => {
    if (e.code === 'Space' || e.code === 'Enter' || e.code === 'Escape') {
      e.preventDefault();
      JUICE.skip = true;
      JUICE.onSkip && JUICE.onSkip();
      window.removeEventListener('keydown', keyHandler);
    }
  };
  window.addEventListener('keydown', keyHandler);
  return () => {
    root.classList.remove('skipable');
    root.removeEventListener('click', handler);
    window.removeEventListener('keydown', keyHandler);
  };
}

async function playJuiceSequence(snap) {
  if (JUICE.running) return;
  JUICE.running = true;
  JUICE.skip = false;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const disarm = armJuiceSkip();
  const bd = juiceBreakdown(snap);
  const pa = $('playedarea');
  const banner = $('hand-banner');
  const hitTarget = snap.scoreBefore < state.target && state.roundScore >= state.target;
  const bigHand = HANDS.findIndex((h) => h.id === bd.handId) <= 4; // 삼광 이상 (배너 길이용)

  try {
    if (reduce) {
      // 접근성: 최종 결과만 즉시
      pa.classList.remove('juice-stage');
      return;
    }

    // 스테이지 세팅
    pa.classList.add('juice-stage');
    pa.dataset.playSig = '';
    pa.innerHTML = `
      <div id="juice-cards"></div>
      <div id="juice-tally">
        <span class="jt-chips" id="jt-chips">0</span>
        <span class="jt-times" id="jt-times">×</span>
        <span class="jt-mult" id="jt-mult">${fmtMult(bd.mult)}</span>
        <span class="jt-eq" id="jt-eq">=</span>
        <span class="jt-score" id="jt-score">0</span>
        <div class="jt-flat" id="jt-flat"></div>
      </div>`;
    const cardsEl = $('juice-cards');
    const wraps = bd.steps.map((s) => {
      const w = document.createElement('div');
      w.className = 'juice-card-wrap';
      w.innerHTML = cardHTML(s.card, { reveal: true }) +
        `<div class="chip-float${s.isCore ? '' : ' flat'}">${s.chip > 0 ? '+' + s.chip + '!' : '+0'}</div>`;
      cardsEl.appendChild(w);
      return w;
    });

    // 1) 족보 배너 슬램 — 낸 패 영역 상단에 띄워 카드/집계와 겹치지 않게
    const tier = juiceTier(bd.handId);
    const handName = HAND_BY_ID[bd.handId].name;
    const paRect = pa.getBoundingClientRect();
    banner.style.left = (paRect.left + paRect.width / 2) + 'px';
    banner.style.top = (paRect.top + 36) + 'px';
    banner.className = '';
    void banner.offsetWidth;
    banner.textContent = bd.handId === 'none' ? handName : handName + '!';
    banner.className = `tier-${tier} show`;
    sfxBanner(tier);
    await juiceWait(bigHand ? 520 : 380);
    banner.classList.add('hide');
    await juiceWait(180);
    banner.className = '';
    banner.textContent = '';
    banner.style.left = '';
    banner.style.top = '';

    // 2) 족보 기본칩 → 카드 한 장씩
    const chipsEl = $('jt-chips');
    let chips = 0;
    let flat = 0;

    if (bd.handBase > 0) {
      chips = bd.handBase;
      chipsEl.textContent = fmt(chips);
      chipsEl.style.transform = 'scale(1.2)';
      sfxChip();
      await juiceWait(160);
      chipsEl.style.transform = '';
    }

    for (const [i, step] of bd.steps.entries()) {
      if (JUICE.skip) break;
      const w = wraps[i];
      w.classList.add('show');
      const floater = w.querySelector('.chip-float');
      void floater.offsetWidth;
      floater.classList.add('go');
      sfxChip();
      if (step.isCore) {
        chips += step.chip;
        await animateNumber(chipsEl, chips - step.chip, chips, 120);
      } else {
        flat += step.chip;
      }
      await juiceWait(200);
    }

    if (bd.jokerChips > 0 && !JUICE.skip) {
      chips += bd.jokerChips;
      chipsEl.textContent = fmt(chips);
      sfxChip();
      await juiceWait(160);
    }

    // 스킵 시 카드·수치 최종 상태로
    if (JUICE.skip) {
      wraps.forEach((w) => w.classList.add('show'));
      chips = bd.handBase + bd.steps.filter((s) => s.isCore).reduce((a, s) => a + s.chip, 0) + bd.jokerChips;
      flat = bd.flatSum;
      chipsEl.textContent = fmt(chips);
    }

    // 3) 배수 슬램
    $('jt-times').classList.add('on');
    await juiceWait(80);
    const multEl = $('jt-mult');
    multEl.classList.add('slam');
    sfxMult();
    await juiceWait(320);

    // 4) 최종 점수 롤업
    $('jt-eq').classList.add('on');
    const scoreEl = $('jt-score');
    scoreEl.classList.add('on');
    if (flat > 0 || bd.flatSum > 0) {
      const fl = $('jt-flat');
      fl.textContent = `+ ${fmt(bd.flatSum)} (배수 밖)`;
      fl.classList.add('on');
    }
    sfxScore();
    const rollMs = Math.min(900, 280 + Math.abs(bd.score) * 1.2);
    await animateNumber(scoreEl, 0, bd.score, rollMs);
    // 가운데 점수에 + 붙여 보여주고 → 사이드 점수로 날아감
    scoreEl.textContent = '+' + fmt(bd.score);
    scoreEl.classList.add('punch');
    chunhyangReact(bd.score, bd.handId);
    maybeShake(bd.score);
    await juiceWait(280);

    const sideScore = $('score-val');
    const gauge = $('gauge-fill');
    const sideFrom = snap.scoreBefore;
    const sideTo = state.roundScore;
    await flyScoreToSide(scoreEl, sideScore, '+' + fmt(bd.score));

    // 도착 후 사이드 점수·게이지 롤업
    const landMs = Math.min(420, 180 + Math.abs(bd.score) * 0.6);
    await Promise.all([
      animateNumber(sideScore, sideFrom, sideTo, landMs),
      (async () => {
        const t0 = performance.now();
        await new Promise((resolve) => {
          const tick = (now) => {
            if (JUICE.skip) {
              gauge.style.width = Math.min(100, (sideTo / state.target) * 100) + '%';
              resolve(); return;
            }
            const p = Math.min(1, (now - t0) / landMs);
            const v = sideFrom + (sideTo - sideFrom) * (1 - Math.pow(1 - p, 3));
            gauge.style.width = Math.min(100, (v / state.target) * 100) + '%';
            if (p < 1) requestAnimationFrame(tick); else resolve();
          };
          requestAnimationFrame(tick);
        });
      })(),
    ]);

    // 5) 목표 돌파 시 게이지 오버플로우 → 모달 전 반 박자
    if (hitTarget) {
      $('gauge').classList.add('overflow');
      gauge.classList.add('overflow');
      gauge.style.width = '100%';
      sfxOverflow();
      maybeShake(bd.score, true);
      await juiceWait(480);
    } else {
      await juiceWait(220);
    }
  } finally {
    disarm();
    banner.className = '';
    banner.textContent = '';
    banner.style.left = '';
    banner.style.top = '';
    JUICE.running = false;
    JUICE.skip = false;
    JUICE.onSkip = null;
  }
}

// ── 시작 ───────────────────────────────────────────────────
restart(); // prep 화면부터 (1월 시작 전 훈수 예약 가능)
</script>
</body>
